<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Swinder - VIP Arkadaşlık</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=block" />
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

    <script>
        if(sessionStorage.getItem("swinder_splashed")) { document.write('<style>#splash-screen { display: none !important; }</style>'); }
        const savedTheme = localStorage.getItem('swinder_theme');
        if(savedTheme && savedTheme !== 'normal') { document.write(`<style>body { background: ${savedTheme === 'gold' ? 'radial-gradient(circle at top, #1a1400 0%, #050400 100%)' : '#000000'} !important; }</style>`); }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: pan-y; -webkit-tap-highlight-color: transparent;}
        :root { --primary-gold: #d4af37; --text-light: #f5f5f7; --glass-bg: rgba(20, 20, 25, 0.45); --glass-border: 1px solid rgba(255, 255, 255, 0.08); --body-bg: #050505; --ring-gradient: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); }
        body.theme-black { --primary-gold: #ffffff; --text-light: #e0e0e0; --glass-bg: rgba(10, 10, 10, 0.85); --glass-border: 1px solid rgba(255, 255, 255, 0.2); --body-bg: #000000; --ring-gradient: linear-gradient(45deg, #222, #fff, #555); }
        body.theme-gold { --primary-gold: #ffdf00; --text-light: #fff; --glass-bg: rgba(30, 25, 10, 0.7); --glass-border: 1px solid rgba(255, 223, 0, 0.45); --body-bg: radial-gradient(circle at top, #1a1400 0%, #050400 100%); --ring-gradient: linear-gradient(45deg, #ffdf00, #ffaa00, #f3e5ab, #ffdf00); }
        body { background: var(--body-bg); color: var(--text-light); overflow: hidden; overscroll-behavior-y: none; transition: background 0.5s;}

        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .splash-logo { font-family: 'Grand Hotel', cursive; font-size: 70px; color: var(--primary-gold); animation: splashPulse 1.5s infinite alternate; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
        @keyframes splashPulse { 0% { transform: scale(1); opacity: 0.8;} 100% { transform: scale(1.1); opacity: 1;} }

        header { position: fixed; top: 0; left: 0; width: 100%; padding: 10px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(20px); z-index: 100; border-bottom: var(--glass-border); padding-top: calc(10px + env(safe-area-inset-top)); transition: border-color 0.5s ease;}
        .logo { font-family: 'Grand Hotel', cursive; font-size: 36px; color: var(--text-light); text-decoration: none; justify-self: center; }
        .header-icon { color: var(--text-light); font-size: 28px; cursor: pointer; background: none; border: none; display: flex; align-items: center;}

        .stories-wrapper { position: absolute; top: calc(65px + env(safe-area-inset-top)); left: 0; width: 100%; padding: 10px 5%; display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; z-index: 50; -webkit-overflow-scrolling: touch; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; }
        .story-ring { width: 65px; height: 65px; border-radius: 50%; padding: 2px; background: var(--ring-gradient); display: flex; justify-content: center; align-items: center;}
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid var(--body-bg); background-size: cover; background-position: center;}
        .story-name { font-size: 11px; font-weight: 500;}

        /* SWIPE KARTLARI */
        .swipe-container { position: absolute; top: calc(165px + env(safe-area-inset-top)); bottom: 150px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        .swipe-card { position: absolute; width: 92%; height: 95%; background: var(--glass-bg); border: var(--glass-border); border-radius: 24px; overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; transition: transform 0.3s ease, opacity 0.3s ease; cursor: grab; z-index: 1; user-select: none; }
        .swipe-card.removed { pointer-events: none; } 
        .card-img-bg { position: absolute; inset: 0; background-size: cover; background-position: center; z-index: -1; }
        .card-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 40%); z-index: 0; }
        .card-info { position: relative; z-index: 2; padding: 20px; width: 100%; display: flex; justify-content: space-between; align-items: flex-end;}
        .card-name { font-size: 28px; font-weight: 700; color: white;}

        .action-buttons { position: absolute; bottom: calc(85px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); width: 100%; max-width: 350px; display: flex; justify-content: space-evenly; align-items: center; z-index: 90;}
        .action-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--glass-bg); backdrop-filter: blur(15px); border: var(--glass-border); display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;}

        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.95); padding: 10px 10px calc(8px + env(safe-area-inset-bottom)); border-top: var(--glass-border); z-index: 999;}
        .nav-icon-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn .material-symbols-outlined { font-size: 30px; }
        .nav-icon-btn.active { color: white; }
        .nav-icon-btn.add-btn { background: var(--ring-gradient); color: #000; width: 44px; height: 44px; border-radius: 12px;}

        /* ORTAK MODALLAR VE ULTRA PRO KAPATMA (X) BUTONU */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 1500; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        
        .close-btn { position: absolute; top: calc(15px + env(safe-area-inset-top)); right: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 5000; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        .close-btn:active { transform: scale(0.9); }
        .close-btn .material-symbols-outlined { font-size: 22px; }

        .bottom-sheet { background: var(--body-bg); width: 100%; height: 90vh; border-radius: 24px 24px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: transform 0.4s; display: flex; flex-direction: column; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        .sheet-header { padding: 20px; border-bottom: var(--glass-border); display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 600; background:rgba(10,10,12,0.95); z-index:10; flex-shrink: 0;}
        
        .glass-box { background: var(--glass-bg); border: var(--glass-border); border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; transform: scale(0.95); transition: transform 0.3s;}
        .modal-overlay.active .glass-box { transform: scale(1); }
        .form-group { margin-bottom: 15px; width: 100%;}
        .form-group input, .form-group textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: var(--glass-border); border-radius: 12px; color: white; outline: none; font-size: 14px;}
        .btn-premium { background: var(--primary-gold); color: #000; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; border: none; cursor: pointer; font-size: 15px;}

        /* REELS & GÖNDERİ EKRANI (Hata Giderildi) */
        .reels-box { background: #000; width: 100%; height: 100dvh; position: relative; overflow-y: scroll; scroll-snap-type: y mandatory; transform: translateY(100%); transition: transform 0.4s; }
        .modal-overlay.active .reels-box { transform: translateY(0); }
        .reel-item { width: 100%; height: 100dvh; scroll-snap-align: start; position: relative; display: flex; justify-content: center; align-items: center;}
        .reel-content { position: absolute; bottom: calc(90px + env(safe-area-inset-bottom)); left:0; padding:20px; z-index: 3; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .reel-action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));}
        .reel-action-btn.liked .material-symbols-outlined { color: #ff3040; font-variation-settings: 'FILL' 1; }

        .search-input { flex: 1; background: rgba(255,255,255,0.1); border: var(--glass-border); color: white; padding: 12px 20px; border-radius: 30px; outline: none;}
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 100%; }
        .grid-item { width: 100%; aspect-ratio: 1; position: relative; background-color: #1a1a1a; background-size: cover; background-position: center; cursor: pointer; }
        
        .list-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-bottom: var(--glass-border); cursor: pointer;}
        .list-avatar { width: 45px; height: 45px; border-radius: 50%; background-size: cover; background-position: center; border: 1px solid var(--primary-gold);}

        /* PROFİL AKIŞI (Üst üste binme çözümü) */
        .post-detail-box-inner { background: var(--body-bg); width: 100%; height: 100dvh; position: absolute; bottom: 0; display: flex; flex-direction: column; overflow: hidden; transform: translateY(100%); transition: transform 0.4s; }
        .modal-overlay.active .post-detail-box-inner { transform: translateY(0); }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="splash-logo">Swinder</div></div>
    <div class="ambient-bg"><div class="ambient-blob-1"></div><div class="ambient-blob-2"></div></div>

    <header>
        <div class="header-left"><button class="header-icon" onclick="openModal('notificationsModal')"><span class="material-symbols-outlined">favorite</span><span class="notification-dot" id="noti-dot"></span></button></div>
        <a href="index.html" class="logo">Swinder</a>
        <div class="header-right"><button class="header-icon" onclick="openModal('messagesModal')"><span class="material-symbols-outlined">send</span></button></div>
    </header>

    <div class="stories-wrapper" id="stories-container"></div>
    <div class="swipe-container" id="swipe-container"><div class="empty-state" id="empty-state" style="display:none; text-align:center; color:gray;">Kimse kalmadı.</div></div>

    <div class="action-buttons">
        <button class="action-btn" onclick="window.buttonSwipe('left')" style="color:#ff4757;"><span class="material-symbols-outlined">close</span></button>
        <button class="action-btn" onclick="window.buttonSwipe('super')" style="color:#3498db; width:50px; height:50px;"><span class="material-symbols-outlined">star</span></button>
        <button class="action-btn" onclick="window.buttonSwipe('right')" style="color:#2ecc71;"><span class="material-symbols-outlined">favorite</span></button>
    </div>

    <nav class="bottom-nav">
        <button class="nav-icon-btn active" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn" onclick="window.openExplore()"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn add-btn" onclick="openModal('addModal')"><span class="material-symbols-outlined">add</span></button>
        <button class="nav-icon-btn" onclick="window.openReels()"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn" onclick="window.location.assign('profil.html')"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="authModal" style="z-index: 9999; align-items:center;">
        <div class="glass-box" style="text-align:center;">
            <div class="splash-logo" style="font-size: 50px; margin-bottom: 20px;">Swinder</div>
            <div class="form-group"><input type="email" id="login-email" placeholder="E-posta Adresi"></div>
            <div class="form-group"><input type="password" id="login-pass" placeholder="Şifre"></div>
            <button class="btn-premium" id="btn-login">Giriş Yap</button>
        </div>
    </div>

    <div class="modal-overlay" id="messagesModal"><div class="bottom-sheet"><div class="sheet-header"><button class="header-icon" onclick="closeModal('messagesModal')"><span class="material-symbols-outlined">arrow_back</span></button>Mesajlar</div><div style="flex:1; overflow-y:auto;" id="dm-list-container"></div></div></div>

    <div class="modal-overlay" id="exploreModal">
        <div class="bottom-sheet">
            <div class="sheet-header" style="gap:10px;"><button class="header-icon" onclick="closeModal('exploreModal')"><span class="material-symbols-outlined">arrow_back</span></button><input type="text" class="search-input" id="search-input" placeholder="Ara..." onkeyup="window.performSearch()"></div>
            <div id="explore-users-list" style="display:none; max-height:200px; overflow-y:auto; border-bottom:1px solid rgba(255,255,255,0.1);"></div>
            <div style="flex:1; overflow-y:auto;"><div class="grid-view" id="explore-grid"></div></div>
        </div>
    </div>

    <div class="modal-overlay" id="reelsModal" style="padding:0; background:#000;">
        <button class="close-btn" onclick="closeModal('reelsModal')"><span class="material-symbols-outlined">close</span></button>
        <div class="reels-box" id="reels-container"></div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="glass-box">
            <button class="close-btn" onclick="closeModal('addModal')"><span class="material-symbols-outlined">close</span></button>
            <h2 style="color: white; margin-bottom: 20px; text-align: center;">Paylaş</h2>
            <div class="form-group"><input type="file" id="add-image-file" accept="image/*, video/*" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; color: white;"></div>
            <div class="form-group"><textarea id="add-caption" rows="3" placeholder="Açıklama..."></textarea></div>
            <button id="btn-submit-post" class="btn-premium">Gönder</button>
        </div>
    </div>

    <div class="modal-overlay" id="postDetailModal" style="z-index: 1600;">
        <div class="post-detail-box-inner">
            <div class="sheet-header">
                <button class="header-icon" onclick="closeModal('postDetailModal')"><span class="material-symbols-outlined">arrow_back</span></button> 
                Gönderiler
            </div>
            <div id="feed-scroll-container" style="flex: 1; overflow-y: auto; scroll-snap-type: y mandatory; display: flex; flex-direction: column; background: #000;"></div>
        </div>
    </div>

    <div class="modal-overlay" id="userProfileModal" style="z-index: 1550;">
        <div class="bottom-sheet">
            <div class="sheet-header"><button class="header-icon" onclick="closeModal('userProfileModal')"><span class="material-symbols-outlined">arrow_back</span></button><span id="up-title" style="font-weight:bold;">Profil</span></div>
            <div style="display: flex; align-items: center; padding: 20px; gap: 20px;">
                <div id="up-avatar" style="width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary-gold); background-size: cover; background-position: center; flex-shrink: 0;"></div>
                <div style="flex: 1; display: flex; justify-content: space-around; text-align: center; font-size: 13px; color: #ccc;">
                    <div><span id="up-post-count" style="display: block; font-size: 18px; font-weight: bold; color: white;">0</span>Gönderi</div>
                    <div><span id="up-follower-count" style="display: block; font-size: 18px; font-weight: bold; color: white;">0</span>Takipçi</div>
                </div>
            </div>
            <div style="padding: 0 20px 15px;"><strong id="up-name" style="font-size: 16px; color: white;">-</strong><br><span id="up-bio" style="color:gray; font-size: 14px;">-</span></div>
            <div style="padding: 0 20px 20px;"><button id="btn-follow-user" style="width:100%; background: transparent; border: 1px solid white; color: white; border-radius: 12px; padding: 10px 0; font-weight: bold; cursor: pointer;" onclick="window.toggleFollowDB(this)">Takip Et</button></div>
            <div style="flex:1; overflow-y:auto; border-top:1px solid rgba(255,255,255,0.1);"><div class="grid-view" id="up-grid"></div></div>
        </div>
    </div>

    <div class="modal-overlay" id="shareModal" style="z-index: 2500;">
        <div class="bottom-sheet" style="height: 60vh;">
            <div class="sheet-header"><button class="header-icon" onclick="closeModal('shareModal')"><span class="material-symbols-outlined">arrow_back</span></button> DM Gönder</div>
            <div id="share-list-container" style="flex:1; overflow-y:auto;"></div>
        </div>
    </div>

    <script>
        function openModal(id) { const m = document.getElementById(id); if(m){ m.classList.add('active'); document.body.style.overflow = 'hidden'; } }
        function closeModal(id) { const m = document.getElementById(id); if(m){ m.classList.remove('active'); document.body.style.overflow = 'auto'; m.querySelectorAll('video').forEach(vid => vid.pause()); } }
        
        window.openExplore = () => { openModal('exploreModal'); if(window.renderExploreGrid) window.renderExploreGrid(); }
        window.openReels = () => { openModal('reelsModal'); if(window.renderReels) window.renderReels(); }
        
        window.isVideo = url => url && (url.includes('video') || url.includes('.mp4') || url.includes('.mov'));
        window.getVideoThumbnail = url => url ? url.replace(/\.(mp4|webm|ogg|mov)(\?.*)?$/i, ".jpg$2") : '';

        setTimeout(() => { const s = document.getElementById('splash-screen'); if(s) { s.style.opacity = '0'; setTimeout(()=>s.style.display='none', 500); } }, 1500);
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, setDoc, query, where, addDoc, updateDoc, arrayUnion, arrayRemove, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0", authDomain: "swinder-79534.firebaseapp.com", projectId: "swinder-79534", storageBucket: "swinder-79534.firebasestorage.app", messagingSenderId: "704644873549", appId: "1:704644873549:web:d95f561ec912b94cf2cb04" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        window.globalPosts = []; window.globalUsersById = {}; window.globalUsersByName = {};
        window.activeShareUrl = null; window.activeInteractPostId = null;

        const CLOUD_NAME = "dv9c3ygco"; const UPLOAD_PRESET = "ntc9cq4y";
        window.uploadMedia = async function(file) { const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", UPLOAD_PRESET); const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData }); const data = await res.json(); return data.secure_url; }

        window.loadAllData = async function() {
            const uSnap = await getDocs(collection(db, "kullanicilar")); uSnap.forEach(d => { window.globalUsersById[d.id] = {uid:d.id, ...d.data()}; window.globalUsersByName[d.data().displayName] = {uid:d.id, ...d.data()}; });
            const pSnap = await getDocs(collection(db, "gonderiler")); window.globalPosts = []; pSnap.forEach(d => window.globalPosts.push({id:d.id, ...d.data()}));
            window.globalPosts.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
        }

        // 🔥 REELS (FOTOĞRAF GÖRÜNMEME HATASI DÜZELTİLDİ) 🔥
        window.renderReels = function() {
            const rc = document.getElementById('reels-container'); if(!rc) return; rc.innerHTML = '';
            const videos = window.globalPosts.filter(p => window.isVideo(p.imageUrl));
            if(videos.length === 0) { rc.innerHTML = '<div style="color:white; text-align:center; padding-top:50vh;">Video yok.</div>'; return; }
            
            videos.forEach(data => {
                const pInfo = window.globalUsersByName[data.username] || {};
                const av = pInfo.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100'; // DÜZELTİLDİ
                
                rc.insertAdjacentHTML('beforeend', `
                <div class="reel-item">
                    <video class="reel-video" src="${data.imageUrl}" loop playsinline style="width:100%; height:100%; object-fit:contain; background:black;" onclick="this.muted=!this.muted"></video>
                    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 35%); z-index:2; pointer-events:none;"></div>
                    <div class="reel-content">
                        <div>
                            <div class="reel-user" style="font-size:15px; font-weight:bold; cursor:pointer; display:flex; align-items:center; gap:8px;" onclick="closeModal('reelsModal'); window.openUserProfile('${data.username}')">
                                <div style="width:40px; height:40px; border-radius:50%; border:2px solid var(--primary-gold); background-size:cover; background-position:center; background-image:url('${av.replace(/'/g, "\\'")}');"></div>
                                @${data.username}
                            </div>
                            <div style="font-size:13px; color:#ddd;">${data.caption||''}</div>
                        </div>
                        <div class="reel-actions">
                            <button class="reel-action-btn" onclick="window.toggleLikeDB(this, '${data.id}')"><span class="material-symbols-outlined">favorite</span>${data.likesCount||0}</button>
                            <button class="reel-action-btn" onclick="window.openShareModal('${data.imageUrl}')"><span class="material-symbols-outlined">send</span></button>
                        </div>
                    </div>
                </div>`);
            });
            if(window.reelsObs) window.reelsObserver.disconnect();
            window.reelsObserver = new IntersectionObserver((entries) => { entries.forEach(e => { const v = e.target.querySelector('video'); if(v) e.isIntersecting ? v.play().catch(()=>{}) : v.pause(); }); }, {threshold:0.5});
            document.querySelectorAll('.reel-item').forEach(i => window.reelsObserver.observe(i));
        }

        // 🔥 KEŞFET MOTORU VE PROFİLE YÖNLENDİRME 🔥
        window.renderExploreGrid = async function() {
            const grid = document.getElementById('explore-grid'); if(!grid) return; grid.innerHTML = '';
            const filterText = document.getElementById('search-input').value.toLocaleLowerCase('tr-TR');
            const userList = document.getElementById('explore-users-list'); if(userList) userList.innerHTML = '';
            
            let matchedUsers = Object.values(window.globalUsersById).filter(u => u.displayName && u.displayName.toLocaleLowerCase('tr-TR').includes(filterText) && u.uid !== auth.currentUser.uid);
            if(filterText && matchedUsers.length > 0 && userList) { 
                userList.style.display = 'block'; 
                matchedUsers.forEach(u => { 
                    const av = u.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100'; 
                    userList.insertAdjacentHTML('beforeend', `<div class="list-item" onclick="closeModal('exploreModal'); window.openUserProfile('${u.displayName}')"><div class="list-avatar" style="background-image: url('${av}');"></div><strong style="color:white; font-size:15px;">${u.displayName}</strong></div>`); 
                }); 
            } else if(userList) { userList.style.display = 'none'; }

            let filteredPosts = window.globalPosts.filter(p => p.username !== auth.currentUser.displayName);
            if(filterText) filteredPosts = filteredPosts.filter(p => (p.caption||'').toLocaleLowerCase('tr-TR').includes(filterText) || (p.username||'').toLocaleLowerCase('tr-TR').includes(filterText));
            
            filteredPosts.forEach(p => { 
                const bg = window.isVideo(p.imageUrl) ? window.getVideoThumbnail(p.imageUrl) : p.imageUrl;
                grid.insertAdjacentHTML('beforeend', `<div class="grid-item" style="background-image: url('${bg}');" onclick="closeModal('exploreModal'); window.openPostDetail('${p.id}', '${p.username}')"></div>`); 
            });
        }
        window.performSearch = () => window.renderExploreGrid();

        // 🔥 PROFİL AÇMA (DİĞER KİŞİLER) 🔥
        window.openUserProfile = function(username) {
            let pInfo = window.globalUsersByName[username] || {}; 
            document.getElementById('up-title').innerText = username; 
            document.getElementById('up-name').innerText = username; 
            document.getElementById('up-bio').innerText = pInfo.bio || 'VIP Üye'; 
            document.getElementById('up-avatar').style.backgroundImage = `url('${pInfo.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=200'}')`;
            
            const userPosts = window.globalPosts.filter(p => p.username === username); 
            document.getElementById('up-post-count').innerText = userPosts.length; 
            document.getElementById('up-follower-count').innerText = (pInfo.followers || []).length; 
            document.getElementById('up-following-count').innerText = (pInfo.following || []).length;
            
            const upGrid = document.getElementById('up-grid'); upGrid.innerHTML = '';
            userPosts.forEach(p => { 
                const bg = window.isVideo(p.imageUrl) ? window.getVideoThumbnail(p.imageUrl) : p.imageUrl;
                upGrid.insertAdjacentHTML('beforeend', `<div class="grid-item" style="background-image: url('${bg}');" onclick="window.openPostDetail('${p.id}', '${p.username}')"></div>`); 
            });
            openModal('userProfileModal');
        }

        // 🔥 GÖNDERİ AKIŞI (ÜST ÜSTE BİNME ÇÖZÜLDÜ) 🔥
        window.openPostDetail = function(startPostId, targetUsername) {
            window.activeInteractPostId = startPostId; 
            const container = document.getElementById('feed-scroll-container'); if(!container) return;
            container.innerHTML = ''; 

            const userPosts = window.globalPosts.filter(p => p.username === targetUsername);
            
            userPosts.forEach(data => {
                let pInfo = window.globalUsersByName[data.username] || {}; 
                const avatarUrl = pInfo.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100';

                const mediaHtml = window.isVideo(data.imageUrl) 
                    ? `<video src="${data.imageUrl}" loop playsinline style="width:100%; height:100%; object-fit:contain; background:black;" onclick="this.muted = !this.muted"></video>` 
                    : `<img src="${data.imageUrl}" loading="lazy" style="width:100%; height:100%; object-fit:contain; background:black;" />`;

                container.insertAdjacentHTML('beforeend', `
                <div id="feed-post-${data.id}" style="width: 100%; height: calc(100dvh - 60px); scroll-snap-align: start; display: flex; flex-direction: column; border-bottom: 2px solid #111; flex-shrink: 0;">
                    <div style="display:flex; align-items:center; padding:12px 15px; gap:10px; flex-shrink:0;">
                        <div style="width:34px; height:34px; border-radius:50%; background-image:url('${avatarUrl}'); background-size:cover; border:1px solid var(--primary-gold);"></div>
                        <strong style="font-size:14px; color:white;">${data.username}</strong>
                    </div>
                    <div style="flex:1; position:relative; width:100%; background:black; display:flex; justify-content:center; align-items:center; overflow:hidden;">
                        ${mediaHtml}
                    </div>
                    <div style="padding: 15px 20px; flex-shrink:0;">
                        <div style="display:flex; gap:15px; margin-bottom:10px;">
                            <button class="header-icon" style="color:white; border:none; background:none; cursor:pointer;" onclick="window.toggleLikeDB(this, '${data.id}')"><span class="material-symbols-outlined">favorite</span></button>
                            <button class="header-icon" style="color:white; border:none; background:none; cursor:pointer;" onclick="window.openShareModal('${data.imageUrl}')"><span class="material-symbols-outlined">send</span></button>
                        </div>
                        <div style="font-weight:600; margin-bottom:5px; font-size:14px; color:white;"><span id="likes-${data.id}">${data.likesCount || 0}</span> beğenme</div>
                        <div style="font-size: 14px; color:white;"><strong>${data.username}</strong> <span style="color:rgba(255,255,255,0.8);">${data.caption || ''}</span></div>
                    </div>
                </div>`);
            });

            openModal('postDetailModal');
            setTimeout(() => { const targetEl = document.getElementById('feed-post-' + startPostId); if(targetEl) targetEl.scrollIntoView({behavior: 'instant'}); }, 50);
        }

        // 🔥 PAYLAŞ (DM) SİSTEMİ (ÇÖKME ENGELLENDİ) 🔥
        window.openShareModal = async function(url) {
            window.activeShareUrl = url; openModal('shareModal');
            const c = document.getElementById('share-list-container'); c.innerHTML = '<div style="padding:20px; text-align:center;">Yükleniyor...</div>';
            if(!auth.currentUser) return;
            const snap = await getDocs(query(collection(db, "eslesmeler"), where("users", "array-contains", auth.currentUser.uid)));
            c.innerHTML = '';
            if(snap.empty) { c.innerHTML = '<div style="padding:20px; text-align:center; color:gray;">Eşleşmen yok.</div>'; return; }
            snap.forEach(d => {
                const match = d.data(); const theirId = match.users.find(id => id !== auth.currentUser.uid);
                const theirName = window.globalUsersById[theirId]?.displayName || 'Kullanıcı';
                const theirImg = window.globalUsersById[theirId]?.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100';
                c.insertAdjacentHTML('beforeend', `
                    <div class="list-item" style="justify-content:space-between;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div class="list-avatar" style="background-image:url('${theirImg}')"></div> <strong style="color:white;">${theirName}</strong>
                        </div>
                        <button class="btn-premium" style="width:auto; padding:5px 15px;" onclick="window.sendShareDM('${d.id}', this)">Gönder</button>
                    </div>`);
            });
        }
        window.sendShareDM = async function(chatId, btn) {
            btn.innerText = "İletildi"; btn.style.background = "gray"; btn.disabled = true;
            await addDoc(collection(db, `eslesmeler/${chatId}/mesajlar`), { senderId: auth.currentUser.uid, text: "[PAYLAŞIM] " + window.activeShareUrl, timestamp: new Date(), read: false });
            await updateDoc(doc(db, "eslesmeler", chatId), { lastMessage: "🖼️ Gönderi paylaştı.", updatedAt: new Date() });
        }

        window.toggleLikeDB = async function(btn, postId) {
            const postRef = doc(db, "gonderiler", postId); const likeSpan = document.getElementById('likes-' + postId); const p = window.globalPosts.find(x=>x.id===postId); let c = p ? (p.likesCount||0) : 0;
            if(p.likedBy && p.likedBy.includes(auth.currentUser.displayName)) { btn.style.color='white'; if(likeSpan) likeSpan.innerText = c-1; await updateDoc(postRef, { likedBy: arrayRemove(auth.currentUser.displayName), likesCount: c-1 }); p.likesCount -= 1; p.likedBy = p.likedBy.filter(x=>x!==auth.currentUser.displayName); } 
            else { btn.style.color='#ff3040'; if(likeSpan) likeSpan.innerText = c+1; await updateDoc(postRef, { likedBy: arrayUnion(auth.currentUser.displayName), likesCount: c+1 }); p.likesCount += 1; if(!p.likedBy) p.likedBy=[]; p.likedBy.push(auth.currentUser.displayName); }
        }

        document.getElementById('btn-login')?.addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); window.location.reload(); } catch (err) { alert(err.message); }});
        
        document.getElementById('btn-submit-post')?.addEventListener('click', async () => { 
            const f = document.getElementById('add-image-file').files[0]; const cap = document.getElementById('add-caption').value; 
            if(!f) return; document.getElementById('btn-submit-post').innerText = "Yükleniyor...";
            const url = await window.uploadMedia(f); await addDoc(collection(db, "gonderiler"), { imageUrl: url, caption: cap, username: auth.currentUser.displayName, likesCount: 0, createdAt: new Date() });
            window.location.reload();
        });

        onAuthStateChanged(auth, async (user) => {
            if(user) { 
                closeModal('authModal'); 
                await window.loadAllData(); 
            } else { openModal('authModal'); }
        });
    </script>
</body>
</html>
