<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swinder - Lüks Yaşam & Otomobil Ağı</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --bg-dark: #0a0a0c; --surface: #1a1a1f; --primary-gold: #d4af37; --gold-hover: #f3e5ab; --text-light: #f5f5f7; --text-muted: #8e8e93; --glass-bg: rgba(26, 26, 31, 0.85); }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* ÜST MENÜ */
        header { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--glass-bg); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.4s ease; }
        header.header-hidden { transform: translateY(-100%); }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .logo span { color: var(--primary-gold); }
        
        .header-actions { display: flex; gap: 18px; align-items: center;}
        .header-icon { color: var(--text-light); font-size: 26px; cursor: pointer; transition: 0.3s; background: none; border: none; position: relative;}
        .header-icon:hover { color: var(--primary-gold); }
        .notification-dot { position: absolute; top: -2px; right: -2px; width: 10px; height: 10px; background: #ff3040; border-radius: 50%; border: 2px solid var(--bg-dark); display: none;}

        /* HİKAYELER */
        .stories-wrapper { margin-top: 60px; padding: 20px 5% 10px; display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--bg-dark); }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; }
        .story-ring { width: 70px; height: 70px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); display: flex; justify-content: center; align-items: center; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--bg-dark); background-size: cover; background-position: center; }
        .story-name { font-size: 11px; color: var(--text-light); }
        .story-ring.add-story { background: transparent; border: 1px dashed rgba(255,255,255,0.3); color: var(--text-light); }

        /* AKIŞ (FEED) */
        .feed-container { max-width: 470px; margin: 0 auto; padding: 20px 0 80px; display: flex; flex-direction: column; gap: 25px; }
        .post { background: var(--bg-dark); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .post-user-info { display: flex; align-items: center; gap: 10px; cursor: pointer;}
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); }
        .post-username { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px;}
        .gold-tick { width: 12px; height: 12px; background: var(--primary-gold); border-radius: 50%; color: #000; font-size: 8px; font-weight: bold; display: flex; justify-content: center; align-items: center;}
        .post-options { color: var(--text-muted); cursor: pointer; background: none; border: none;}
        .post-image { width: 100%; aspect-ratio: 4 / 5; background-size: cover; background-position: center; border-radius: 4px;}
        .post-actions { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px 8px; }
        .action-left { display: flex; gap: 16px; }
        .action-icon { color: var(--text-light); font-size: 26px; cursor: pointer; transition: 0.2s; background: none; border: none; display: flex; align-items: center;}
        .action-icon.liked { color: #ff3040; font-variation-settings: 'FILL' 1; } 
        .action-icon.saved { color: var(--primary-gold); font-variation-settings: 'FILL' 1; } 
        .post-likes { padding: 0 15px; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .post-caption-box { padding: 0 15px; font-size: 14px; line-height: 1.4; }
        .post-caption-box span { font-weight: 600; margin-right: 5px; cursor: pointer;}
        .post-comments-link { padding: 0 15px; font-size: 13px; color: var(--text-muted); margin-top: 5px; cursor: pointer;}
        .post-time { padding: 0 15px; font-size: 11px; color: var(--text-muted); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px;}

        /* ALT MENÜ */
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(15px); padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.05); z-index: 999; }
        .nav-icon-btn { background: none; border: none; color: var(--text-light); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn .material-symbols-outlined { font-size: 28px; }
        .nav-icon-btn.active { color: var(--primary-gold); font-variation-settings: 'FILL' 1; }
        .nav-icon-btn.add-btn { background: var(--text-light); color: var(--bg-dark); width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; }
        .nav-icon-btn.add-btn .material-symbols-outlined { font-size: 24px; font-weight: 600; }

        /* MODALLAR GENEL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; z-index: 20; display: flex; align-items: center; justify-content: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; transition: 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-gold); background: rgba(0,0,0,0.5); }
        .btn-premium { background: var(--primary-gold); color: #000 !important; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; border: none;}
        
        .auth-box, .add-box { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; position: relative; transform: scale(0.95); transition: all 0.3s ease; }
        .modal-overlay.active .auth-box, .modal-overlay.active .add-box { transform: scale(1); }
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 10px 0; font-size: 16px; cursor: pointer; transition: 0.3s; position: relative; }
        .tab-btn.active { color: var(--text-light); font-weight: 600; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--text-light); }
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        /* YORUMLAR MODALI */
        .comments-box { background: var(--surface); width: 100%; max-width: 500px; height: 75vh; border-radius: 20px 20px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.3s ease; display: flex; flex-direction: column; }
        .modal-overlay.active .comments-box { transform: translateY(0); }
        .comments-header { padding: 15px; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.05); font-weight: 600; font-size: 16px;}
        .comments-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px;}
        .comment-item { display: flex; gap: 10px; font-size: 14px;}
        .comment-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--primary-gold); flex-shrink: 0;}
        .comment-content { flex: 1; }
        .comment-content strong { color: var(--text-light); margin-right: 5px;}
        .comment-content span { color: var(--text-muted); }
        .comment-input-area { padding: 15px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; gap: 10px; background: var(--bg-dark); }
        .comment-input-area input { flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 15px; border-radius: 30px; outline: none;}
        .comment-input-area button { background: none; border: none; color: var(--primary-gold); font-weight: 600; cursor: pointer; padding: 0 10px;}

        /* BİLDİRİMLER (KALP) MODALI */
        .notifications-box { background: var(--surface); width: 100%; max-width: 500px; height: 80vh; border-radius: 20px 20px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.3s ease; display: flex; flex-direction: column; }
        .modal-overlay.active .notifications-box { transform: translateY(0); }
        .noti-item { display: flex; align-items: center; gap: 15px; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .noti-avatar { width: 44px; height: 44px; border-radius: 50%; background: #333; background-size: cover; background-position: center;}
        .noti-text { flex: 1; font-size: 14px; line-height: 1.4;}
        .noti-text strong { color: var(--text-light); }

        /* MESAJLAR (DM) MODALI */
        .messages-box { background: var(--bg-dark); width: 100%; height: 100dvh; max-width: 500px; position: absolute; right: 0; transform: translateX(100%); transition: 0.3s ease; display: flex; flex-direction: column; }
        .modal-overlay.active .messages-box { transform: translateX(0); }
        .msg-header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 15px; font-size: 18px; font-weight: 600; margin-top: 20px;}
        .msg-list { flex: 1; overflow-y: auto; }
        .msg-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; cursor: pointer; transition: 0.2s;}
        .msg-item:hover { background: rgba(255,255,255,0.05); }

        /* ARAMA & REELS */
        .explore-box { background: var(--bg-dark); width: 100%; height: 85vh; border-radius: 20px 20px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.3s ease; display: flex; flex-direction: column; padding: 20px 0;}
        .modal-overlay.active .explore-box { transform: translateY(0); }
        .explore-header { padding: 0 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px;}
        .explore-search-input { flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 14px;}
        .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex: 1; }
        .explore-item { aspect-ratio: 1 / 1; background-size: cover; background-position: center; cursor: pointer; }

        .reels-box { background: #000; width: 100%; height: 100dvh; max-width: 450px; position: relative; transform: translateY(100%); transition: 0.3s ease; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reels-box::-webkit-scrollbar { display: none; }
        .modal-overlay.active .reels-box { transform: translateY(0); }
        .reel-item { width: 100%; height: 100dvh; scroll-snap-align: start; background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; padding-bottom: 90px; }
        .reel-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%, rgba(0,0,0,0.3) 100%); pointer-events: none;}
        .reel-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .reel-info { flex: 1; padding-right: 15px; }
        .reel-user { display: flex; align-items: center; gap: 10px; color: white; font-weight: 600; font-size: 15px; margin-bottom: 10px;}
        .reel-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center;}
        .reel-caption { color: white; font-size: 14px; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .reel-actions { display: flex; flex-direction: column; gap: 20px; align-items: center; padding-bottom: 10px;}
        .reel-action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer;}

        @media (max-width: 768px) { 
            body { padding-bottom: 60px; } 
            .feed-container { max-width: 100%; padding: 0 0 60px; gap: 15px;}
            header { padding: 10px 15px; }
            .modal-overlay { padding: 0; align-items: flex-end; z-index: 1001;} 
            .auth-box, .add-box { margin: 0; max-width: 100%; border-radius: 25px 25px 0 0; transform: translateY(100%); border-bottom: none; padding: 25px 20px;}
            .modal-overlay.active .auth-box, .modal-overlay.active .add-box { transform: translateY(0); }
            .reels-box { height: 100dvh; max-width: 100%; border-radius: 0; }
            .messages-box { height: 100dvh; border-radius: 0; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <a href="index.html" class="logo">Swinder<span>.</span></a>
        <div class="header-actions">
            <button class="header-icon" onclick="openNotifications()">
                <span class="material-symbols-outlined">favorite</span>
                <span class="notification-dot" id="noti-dot"></span>
            </button>
            <button class="header-icon" onclick="openMessages()">
                <span class="material-symbols-outlined">send</span>
            </button>
        </div>
    </header>

    <div class="stories-wrapper" id="stories-container">
        <div class="story-item" onclick="openAddStoryModal()">
            <div class="story-ring add-story"><div class="story-img" style="background-color: #2a2a30; display:flex; justify-content:center; align-items:center; color: var(--text-light);"><span class="material-symbols-outlined">add</span></div></div>
            <span class="story-name">Hikayen</span>
        </div>
    </div>

    <main class="feed-container" id="feed-container">
        <div style="text-align: center; color: var(--text-muted); padding: 40px;">Gönderiler yükleniyor...</div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-icon-btn active" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn" onclick="openExplore()"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn add-btn" onclick="openAddModal()"><span class="material-symbols-outlined">add</span></button>
        <button class="nav-icon-btn" onclick="openReels()"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn" id="mobile-profile-btn" onclick="openAuthModal('login')"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="commentsModal">
        <div class="comments-box">
            <button class="close-btn" onclick="closeModal('commentsModal')" style="top: -50px; right: 10px;"><span class="material-symbols-outlined">close</span></button>
            <div class="comments-header">Yorumlar</div>
            <div class="comments-list" id="comments-list">
                <div style="text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 20px;">Yorumlar yükleniyor...</div>
            </div>
            <div class="comment-input-area">
                <input type="text" id="new-comment-input" placeholder="Yorum ekle...">
                <button onclick="submitComment()">Paylaş</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="notificationsModal">
        <div class="notifications-box">
            <button class="close-btn" onclick="closeModal('notificationsModal')" style="top: -50px; right: 10px;"><span class="material-symbols-outlined">close</span></button>
            <div class="comments-header">Bildirimler</div>
            <div style="overflow-y: auto; flex: 1;" id="noti-list">
                <div style="text-align: center; color: var(--text-muted); font-size: 13px; padding: 30px;">Henüz yeni bildirim yok.</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="messagesModal" style="justify-content: flex-end;">
        <div class="messages-box">
            <div class="msg-header">
                <button class="header-icon" onclick="closeModal('messagesModal')"><span class="material-symbols-outlined">arrow_back</span></button>
                <span id="dm-username">Mesajlar</span>
            </div>
            <div class="msg-list" id="dm-list">
                <div class="msg-item" onclick="alert('Bu bir sistem mesajıdır.')">
                    <div class="noti-avatar" style="background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100'); border: 2px solid var(--primary-gold);"></div>
                    <div class="noti-text">
                        <strong>Swinder Premium</strong><br>
                        <span style="color: var(--text-muted); font-size: 12px;">Swinder 2.0'a hoş geldin! ✨</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="exploreModal"><div class="explore-box"><div class="explore-header"><button class="header-icon" onclick="closeModal('exploreModal')" style="margin-right: 10px;"><span class="material-symbols-outlined">arrow_back</span></button><input type="text" class="explore-search-input" id="search-input" placeholder="Araç, marka veya kullanıcı ara..." onkeyup="performSearch()"></div><div class="explore-grid" id="explore-grid"></div></div></div>
    <div class="modal-overlay" id="reelsModal" style="padding:0; background: #000;"><button class="close-btn" onclick="closeModal('reelsModal')" style="z-index: 1000; top: 20px; right: 20px; background: rgba(0,0,0,0.5);"><span class="material-symbols-outlined">close</span></button><div class="reels-box" id="reels-container"></div></div>
    <div class="modal-overlay" id="addModal"><div class="add-box"><button class="close-btn" onclick="closeModal('addModal')"><span class="material-symbols-outlined">close</span></button><h2 style="color: var(--text-light); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; text-align: center; font-size: 16px;">Yeni Gönderi Oluştur</h2><form><div class="form-group"><label>Fotoğraf Linki</label><input type="text" id="add-image"></div><div class="form-group"><label>Açıklama</label><textarea id="add-caption" rows="4"></textarea></div><button type="button" id="btn-submit-post" class="btn-premium">Paylaş</button></form></div></div>
    <div class="modal-overlay" id="authModal"><div class="auth-box"><button class="close-btn" onclick="closeModal('authModal')"><span class="material-symbols-outlined">close</span></button><h2 style="text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px;">Swinder<span>.</span></h2><div class="auth-tabs"><button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Giriş Yap</button><button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Kayıt Ol</button></div><div class="auth-form active" id="form-login"><div class="form-group"><input type="email" id="login-email" placeholder="E-posta Adresi"></div><div class="form-group"><input type="password" id="login-pass" placeholder="Şifre"></div><button class="btn-premium" id="btn-login" style="margin-top: 10px;">Giriş Yap</button></div><div class="auth-form" id="form-register"><div class="form-group"><input type="text" id="reg-name" placeholder="Kullanıcı Adı"></div><div class="form-group"><input type="email" id="reg-email" placeholder="E-posta Adresi"></div><div class="form-group"><input type="password" id="reg-pass" placeholder="Şifre"></div><button class="btn-premium" id="btn-register" style="margin-top: 10px;">Kayıt Ol</button></div></div></div>

    <script>
        let lastScrollTop = 0; const header = document.getElementById('main-header');
        window.addEventListener('scroll', () => { let st = window.pageYOffset || document.documentElement.scrollTop; if (st > lastScrollTop && st > 80) header.classList.add('header-hidden'); else header.classList.remove('header-hidden'); lastScrollTop = st; });
        
        function openModal(id) { document.getElementById(id).classList.add('active'); document.body.style.overflow = 'hidden'; }
        window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); document.body.style.overflow = 'auto'; }
        
        window.openAuthModal = (tab) => { openModal('authModal'); switchAuthTab(tab); }
        window.openAddModal = () => openModal('addModal');
        window.openExplore = () => { openModal('exploreModal'); if(window.renderExploreGrid) window.renderExploreGrid(); }
        window.openReels = () => { openModal('reelsModal'); if(window.renderReels) window.renderReels(); }
        
        // Yeni UI Fonksiyonları
        window.openNotifications = () => { openModal('notificationsModal'); if(window.loadNotifications) window.loadNotifications(); document.getElementById('noti-dot').style.display='none';}
        window.openMessages = () => { openModal('messagesModal'); if(window.loadDMs) window.loadDMs(); }
        
        window.visualShare = () => { alert("🔗 Gönderi linki panoya kopyalandı!"); }
        window.visualSave = (btn) => { btn.classList.toggle('saved'); }

        document.querySelectorAll('.modal-overlay').forEach(m => { m.addEventListener('click', (e) => { if(e.target === m) closeModal(m.id); }); });
        function switchAuthTab(tab) { document.getElementById('tab-login').classList.remove('active'); document.getElementById('tab-register').classList.remove('active'); document.getElementById('tab-' + tab).classList.add('active'); document.getElementById('form-login').classList.remove('active'); document.getElementById('form-register').classList.remove('active'); document.getElementById('form-' + tab).classList.add('active'); }
    </script>

    <script type="module">

        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, setDoc, updateDoc, arrayUnion, arrayRemove, getDoc, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0", authDomain: "swinder-79534.firebaseapp.com", projectId: "swinder-79534", storageBucket: "swinder-79534.firebasestorage.app", messagingSenderId: "704644873549", appId: "1:704644873549:web:d95f561ec912b94cf2cb04" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        // KESİN KURALLAR
        const adminEmail = "kcagatay239@gmail.com"; 
        window.globalPosts = []; window.globalUsers = {};
        let activeCommentPostId = null;

        // AUTH
        document.getElementById('btn-login').addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); window.location.reload(); } catch (err) { alert(err.message); }});
        document.getElementById('btn-register').addEventListener('click', async () => { try { const uc = await createUserWithEmailAndPassword(auth, document.getElementById('reg-email').value, document.getElementById('reg-pass').value); await updateProfile(uc.user, { displayName: document.getElementById('reg-name').value }); window.location.reload(); } catch (err) { alert(err.message); }});
        
        onAuthStateChanged(auth, async (user) => {
            const btn = document.getElementById('mobile-profile-btn'); 
            if (user) {
                await setDoc(doc(db, "kullanicilar", user.uid), { displayName: user.displayName, email: user.email }, { merge: true });
                btn.onclick = () => window.location.href = "profil.html";
                const uSnap = await getDoc(doc(db, "kullanicilar", user.uid));
                if(uSnap.exists() && uSnap.data().avatar) btn.innerHTML = `<div style="width: 28px; height: 28px; border-radius: 50%; background: url('${uSnap.data().avatar}') center/cover; border: 2px solid var(--text-light);"></div>`;
            } else { btn.onclick = () => window.openAuthModal('login'); }
        });

        // 🔥 1. CANLI BEĞENİ SİSTEMİ 🔥
        window.toggleLikeDB = async function(btnElement, postId, postOwner) {
            const user = auth.currentUser;
            if(!user) return window.openAuthModal('login');

            const isLiked = btnElement.classList.contains('liked');
            const postRef = doc(db, "gonderiler", postId);
            const likesDisplay = document.getElementById(`like-count-${postId}`);
            let currentLikes = parseInt(likesDisplay.innerText);

            if(isLiked) {
                // Beğeniyi Çek
                btnElement.classList.remove('liked');
                likesDisplay.innerText = currentLikes - 1;
                await updateDoc(postRef, { likedBy: arrayRemove(user.displayName), likesCount: currentLikes - 1 });
            } else {
                // Beğen ve Bildirim Gönder
                btnElement.classList.add('liked');
                likesDisplay.innerText = currentLikes + 1;
                await updateDoc(postRef, { likedBy: arrayUnion(user.displayName), likesCount: currentLikes + 1 });
                
                // Bildirim Tablosuna Yaz (Kendi kendine bildirim atma)
                if(user.displayName !== postOwner) {
                    await addDoc(collection(db, "bildirimler"), {
                        to: postOwner, from: user.displayName, type: 'like', text: 'gönderini beğendi.', createdAt: new Date()
                    });
                }
            }
        }

        // 🔥 2. YORUMLAR SİSTEMİ 🔥
        window.openCommentsDB = async function(postId) {
            activeCommentPostId = postId;
            document.getElementById('commentsModal').classList.add('active');
            document.body.style.overflow = 'hidden';
            const list = document.getElementById('comments-list');
            list.innerHTML = '<div style="text-align:center; color:gray; font-size:13px; margin-top:20px;">Yorumlar yükleniyor...</div>';
            
            try {
                // Yorumları alt koleksiyondan (subcollection) çek
                const snap = await getDocs(query(collection(db, `gonderiler/${postId}/yorumlar`), orderBy("createdAt", "asc")));
                list.innerHTML = '';
                if(snap.empty) { list.innerHTML = '<div style="text-align:center; color:gray; font-size:13px;">İlk yorumu sen yap!</div>'; return;}
                
                snap.forEach(d => {
                    const data = d.data();
                    const avatar = window.globalUsers[data.username]?.avatar || '';
                    const avatarHtml = avatar ? `background-image:url('${avatar}'); background-size:cover;` : '';
                    list.insertAdjacentHTML('beforeend', `
                        <div class="comment-item">
                            <div class="comment-avatar" style="${avatarHtml}"></div>
                            <div class="comment-content"><strong>${data.username}</strong><span>${data.text}</span></div>
                        </div>
                    `);
                });
            } catch(e) { list.innerHTML = '<div style="text-align:center; color:red;">Hata</div>'; }
        }

        window.submitComment = async function() {
            const user = auth.currentUser;
            if(!user) return alert("Giriş yapmalısın!");
            const text = document.getElementById('new-comment-input').value.trim();
            if(!text || !activeCommentPostId) return;

            document.getElementById('new-comment-input').value = ""; // Kutuyu temizle
            try {
                // Yorumu kaydet
                await addDoc(collection(db, `gonderiler/${activeCommentPostId}/yorumlar`), {
                    username: user.displayName, text: text, createdAt: new Date()
                });
                
                // Gönderi sahibini bul ve ona Bildirim At
                const postInfo = window.globalPosts.find(p => p.id === activeCommentPostId);
                if(postInfo && postInfo.username !== user.displayName) {
                    await addDoc(collection(db, "bildirimler"), {
                        to: postInfo.username, from: user.displayName, type: 'comment', text: `yorum yaptı: "${text}"`, createdAt: new Date()
                    });
                }
                window.openCommentsDB(activeCommentPostId); // Listeyi yenile
            } catch(e) { alert("Yorum gönderilemedi."); }
        }

        // 🔥 3. BİLDİRİM MERKEZİ 🔥
        window.loadNotifications = async function() {
            const user = auth.currentUser;
            if(!user) { document.getElementById('noti-list').innerHTML = '<div style="padding:20px; text-align:center; color:gray;">Giriş yapmalısın.</div>'; return; }
            
            const list = document.getElementById('noti-list');
            try {
                const snap = await getDocs(query(collection(db, "bildirimler"), where("to", "==", user.displayName)));
                list.innerHTML = '';
                if(snap.empty) { list.innerHTML = '<div style="padding:30px; text-align:center; color:gray;">Henüz bildirim yok.</div>'; return;}
                
                // Bildirimleri en yeni üstte olacak şekilde dizeceğiz (Geçici Array ile)
                let notis = [];
                snap.forEach(d => notis.push(d.data()));
                notis.sort((a,b) => b.createdAt.seconds - a.createdAt.seconds);

                notis.forEach(data => {
                    const avatar = window.globalUsers[data.from]?.avatar || '';
                    const avatarHtml = avatar ? `background-image:url('${avatar}');` : '';
                    list.insertAdjacentHTML('beforeend', `
                        <div class="noti-item">
                            <div class="noti-avatar" style="${avatarHtml}"></div>
                            <div class="noti-text"><strong>${data.from}</strong> ${data.text}</div>
                        </div>
                    `);
                });
            } catch(e) { list.innerHTML = '<div style="color:red; text-align:center;">Hata</div>'; }
        }

        // 🔥 4. DM (GELEN KUTUSU) LİSTESİ 🔥
        window.loadDMs = async function() {
            const user = auth.currentUser;
            if(!user) return;
            const list = document.getElementById('dm-list');
            
            // Sistemdeki diğer kullanıcıları DM listesinde göster
            try {
                const snap = await getDocs(collection(db, "kullanicilar"));
                let html = list.innerHTML; // Sabit mesajı tut
                snap.forEach(d => {
                    const u = d.data();
                    if(u.displayName && u.displayName !== user.displayName) {
                        const av = u.avatar ? `background-image:url('${u.avatar}');` : '';
                        html += `
                        <div class="msg-item" onclick="alert('${u.displayName} ile sohbet yakında eklenecek!')">
                            <div class="noti-avatar" style="${av}"></div>
                            <div class="noti-text"><strong>${u.displayName}</strong><br><span style="color:gray; font-size:12px;">Mesaj göndermek için dokun</span></div>
                        </div>`;
                    }
                });
                list.innerHTML = html;
            } catch(e){}
        }

        // ANA AKIŞI (FEED) ÇEK
        async function loadPosts() {
            const feedContainer = document.getElementById('feed-container');
            const currentUser = auth.currentUser ? auth.currentUser.displayName : null;

            try {
                const usersSnap = await getDocs(collection(db, "kullanicilar"));
                usersSnap.forEach(uDoc => { const uData = uDoc.data(); if(uData.displayName) window.globalUsers[uData.displayName] = uData; });

                const snapshot = await getDocs(query(collection(db, "gonderiler"), orderBy("createdAt", "desc")));
                window.globalPosts = [];
                snapshot.forEach(doc => { window.globalPosts.push({ id: doc.id, ...doc.data() }); });

                feedContainer.innerHTML = ''; 
                if (window.globalPosts.length === 0) return;

                window.globalPosts.forEach((data) => {
                    const posterInfo = window.globalUsers[data.username] || {};
                    const isVerified = posterInfo.isVerified || (data.username && data.username.toLowerCase().includes('çağatay'));
                    const goldTickHtml = isVerified ? '<span class="gold-tick">✓</span>' : '';
                    const avatarStyle = posterInfo.avatar ? `background-image: url('${posterInfo.avatar}');` : `background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100&q=80');`;

                    // Beğeni kontrolü
                    let likedClass = '';
                    if(currentUser && data.likedBy && data.likedBy.includes(currentUser)) likedClass = 'liked';

                    feedContainer.insertAdjacentHTML('beforeend', `
                        <article class="post">
                            <div class="post-header">
                                <div class="post-user-info"><div class="post-avatar" style="${avatarStyle}"></div><span class="post-username">${data.username} ${goldTickHtml}</span></div>
                                <button class="post-options"><span class="material-symbols-outlined">more_horiz</span></button>
                            </div>
                            
                            <div class="post-image" style="background-image: url('${data.imageUrl}');" ondblclick="toggleLikeDB(this.nextElementSibling.querySelector('.action-icon'), '${data.id}', '${data.username}')"></div>
                            
                            <div class="post-actions">
                                <div class="action-left">
                                    <button class="action-icon ${likedClass}" onclick="toggleLikeDB(this, '${data.id}', '${data.username}')"><span class="material-symbols-outlined">favorite</span></button>
                                    <button class="action-icon" onclick="openCommentsDB('${data.id}')"><span class="material-symbols-outlined">chat_bubble</span></button>
                                    <button class="action-icon" onclick="visualShare()"><span class="material-symbols-outlined">send</span></button>
                                </div>
                                <button class="action-icon" onclick="visualSave(this)"><span class="material-symbols-outlined">bookmark</span></button>
                            </div>
                            
                            <div class="post-likes"><span id="like-count-${data.id}">${data.likesCount || 0}</span> beğenme</div>
                            
                            ${data.caption ? `<div class="post-caption-box"><span>${data.username}</span> ${data.caption}</div>` : ''}
                            
                            <div class="post-comments-link" onclick="openCommentsDB('${data.id}')">Yorumları gör ve ekle...</div>
                        </article>
                    `);
                });
            } catch (err) { console.error(err); }
        }

        document.getElementById('btn-submit-post').addEventListener('click', async () => {
            const user = auth.currentUser; if (!user) return;
            const imageUrl = document.getElementById('add-image').value; const caption = document.getElementById('add-caption').value;
            if (!imageUrl) return; document.getElementById('btn-submit-post').innerText = "Paylaşılıyor...";
            try { await addDoc(collection(db, "gonderiler"), { imageUrl: imageUrl, caption: caption, username: user.displayName, likesCount: 0, likedBy: [], createdAt: new Date() }); window.closeModal('addModal'); loadPosts(); } catch (err) {} finally { document.getElementById('btn-submit-post').innerText = "Paylaş"; }
        });
        
        loadPosts();
    </script>
</body>
</html>
