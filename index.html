<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium İlan Platformu</title>
    <style>
        /* --- Temel Ayarlar --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-dark: #0a0a0c;
            --surface: #1a1a1f;
            --primary-gold: #d4af37;
            --text-light: #f5f5f7;
            --text-muted: #8e8e93;
            --glass-bg: rgba(26, 26, 31, 0.7);
        }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* --- Üst Menü --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 20px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            z-index: 100; border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        }
        .logo { font-size: 24px; font-weight: bold; letter-spacing: 2px; color: var(--primary-gold); text-decoration: none; }
        .nav-links button {
            background: transparent; border: none; color: var(--text-light);
            margin-left: 25px; font-size: 14px; cursor: pointer; transition: color 0.3s ease;
        }
        .nav-links button:hover { color: var(--primary-gold); }
        .btn-premium {
            background: linear-gradient(45deg, #d4af37, #aa8529); color: #000 !important;
            padding: 10px 24px; border-radius: 30px; font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease; cursor: pointer; border: none;
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3); }

        /* --- Karşılama Ekranı --- */
        .hero {
            height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center;
            text-align: center; background: radial-gradient(circle at center, #1a1a1f 0%, #0a0a0c 100%);
            padding: 0 20px; margin-top: 50px;
        }
        .hero h1 { font-size: 3.5rem; font-weight: 300; margin-bottom: 20px; letter-spacing: 1px; }
        .hero h1 span { color: var(--primary-gold); font-weight: 600; }

        /* --- Vitrin İlanları --- */
        .showcase { padding: 50px 5% 100px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; }
        .card {
            background: var(--surface); border-radius: 16px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s ease; cursor: pointer;
        }
        .card:hover { transform: translateY(-10px); border-color: rgba(212, 175, 55, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .card-img { height: 220px; background-size: cover; background-position: center; position: relative; }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--primary-gold); color: #000; padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .card-content { padding: 24px; }
        .card-title { font-size: 1.25rem; margin-bottom: 12px; font-weight: 500; }
        .card-price { color: var(--primary-gold); font-size: 1.5rem; font-weight: 700; margin-bottom: 20px; }

        /* --- HIZLI BAKIŞ MODALI (BUĞULU CAM EFEKTİ) --- */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); /* Buğulu cam efekti */
            -webkit-backdrop-filter: blur(15px);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.4s ease; z-index: 1000; padding: 20px;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .detail-modal-box {
            background: rgba(26, 26, 31, 0.85); border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 20px; width: 100%; max-width: 1000px; max-height: 90vh;
            display: flex; overflow: hidden; transform: scale(0.95); transition: all 0.4s ease;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative;
        }
        .modal-overlay.active .detail-modal-box { transform: scale(1); }

        .close-detail-btn {
            position: absolute; top: 15px; right: 20px; background: rgba(0,0,0,0.5); border: none;
            color: white; font-size: 24px; width: 40px; height: 40px; border-radius: 50%;
            cursor: pointer; z-index: 10; transition: all 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .close-detail-btn:hover { background: var(--primary-gold); color: black; }

        .detail-img { flex: 1.2; background-size: cover; background-position: center; min-height: 400px; }
        
        .detail-content { flex: 1; padding: 40px; overflow-y: auto; display: flex; flex-direction: column; }
        .detail-content h2 { font-size: 2rem; margin-bottom: 10px; font-weight: 300; }
        .detail-content .price { font-size: 2rem; color: var(--primary-gold); font-weight: 700; margin-bottom: 25px; }
        
        .specs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .spec-item { border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; font-size: 14px; }
        .spec-item span { color: var(--text-muted); display: block; font-size: 12px; margin-bottom: 2px; }

        .seller-info { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); margin-top: auto; }
        .seller-info h4 { margin-bottom: 15px; color: var(--primary-gold); }

        /* Mobil Düzen */
        @media (max-width: 768px) {
            .detail-modal-box { flex-direction: column; overflow-y: auto; }
            .detail-img { min-height: 250px; flex: none; }
            .detail-content { padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">ELITE VİTRİN</a>
        <div class="nav-links">
            <button class="btn-premium">+ İlan Ver</button>
        </div>
    </header>

    <section class="hero">
        <h1>Aradığın Lüksü <span>Keşfet</span></h1>
    </section>

    <section class="showcase">
        <div class="grid">
            
            <div class="card" onclick="openDetailModal('BMW 420i Cabrio M Sport', '3.250.000 TL', '2022', '15.000', 'Benzin', 'Otomatik', 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80')">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');">
                    <span class="badge">PREMIUM</span>
                </div>
                <div class="card-content">
                    <h3 class="card-title">BMW 420i Cabrio M Sport</h3>
                    <div class="card-price">3.250.000 TL</div>
                </div>
            </div>

            <div class="card" onclick="openDetailModal('BMW F30 320i M Sport', '1.850.000 TL', '2018', '65.000', 'Benzin', 'Otomatik', 'https://images.unsplash.com/photo-1556189250-72ba954cfc2b?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80')">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1556189250-72ba954cfc2b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');">
                </div>
                <div class="card-content">
                    <h3 class="card-title">BMW F30 320i M Sport</h3>
                    <div class="card-price">1.850.000 TL</div>
                </div>
            </div>

        </div>
    </section>

    <div class="modal-overlay" id="detailModal">
        <div class="detail-modal-box">
            <button class="close-detail-btn" id="closeDetailBtn">&times;</button>
            
            <div class="detail-img" id="modalImg"></div>
            
            <div class="detail-content">
                <h2 id="modalTitle">Araç Başlığı</h2>
                <div class="price" id="modalPrice">0 TL</div>
                
                <div class="specs">
                    <div class="spec-item"><span>Model Yılı</span><strong id="modalYear">-</strong></div>
                    <div class="spec-item"><span>Kilometre</span><strong id="modalKm">-</strong></div>
                    <div class="spec-item"><span>Yakıt</span><strong id="modalFuel">-</strong></div>
                    <div class="spec-item"><span>Vites</span><strong id="modalGear">-</strong></div>
                </div>

                <div class="seller-info">
                    <h4>Satıcı Bilgileri</h4>
                    <p style="font-weight: bold; margin-bottom: 10px;">Çağatay Motors</p>
                    <button class="btn-premium" style="width: 100%; border-radius: 8px;">İletişime Geç</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const detailModal = document.getElementById('detailModal');
        const closeDetailBtn = document.getElementById('closeDetailBtn');

        // Modalı açan fonksiyon (Dinamik olarak verileri doldurur)
        function openDetailModal(title, price, year, km, fuel, gear, imgUrl) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalPrice').innerText = price;
            document.getElementById('modalYear').innerText = year;
            document.getElementById('modalKm').innerText = km;
            document.getElementById('modalFuel').innerText = fuel;
            document.getElementById('modalGear').innerText = gear;
            document.getElementById('modalImg').style.backgroundImage = `url('${imgUrl}')`;
            
            detailModal.classList.add('active');
            document.body.style.overflow = 'hidden'; // Arka planın kaymasını engelle
        }

        // Kapatma İşlemleri
        closeDetailBtn.addEventListener('click', () => {
            detailModal.classList.remove('active');
            document.body.style.overflow = 'auto'; // Kaydırmayı geri aç
        });

        // Pencere dışına tıklayınca kapatma
        detailModal.addEventListener('click', (e) => {
            if(e.target === detailModal) {
                detailModal.classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        });
    </script>
</body>
</html>
