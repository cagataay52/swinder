<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swinder - Lüks Yaşam & Otomobil Ağı</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --bg-dark: #0a0a0c; --surface: #1a1a1f; --primary-gold: #d4af37; --gold-hover: #f3e5ab; --text-light: #f5f5f7; --text-muted: #8e8e93; --glass-bg: rgba(26, 26, 31, 0.85); }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* ÜST MENÜ */
        header { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--glass-bg); backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid rgba(255, 255, 255, 0.05); transition: transform 0.4s ease; }
        header.header-hidden { transform: translateY(-100%); }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 8px;}
        .logo span { color: var(--primary-gold); }
        
        .header-actions { display: flex; gap: 15px; align-items: center;}
        .header-icon { color: var(--text-light); font-size: 24px; cursor: pointer; transition: 0.3s; background: none; border: none; display: flex; align-items: center; justify-content: center;}
        .header-icon:hover { color: var(--primary-gold); }

        /* HİKAYELER */
        .stories-wrapper { margin-top: 60px; padding: 20px 5% 10px; display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; border-bottom: 1px solid rgba(255,255,255,0.05); background: var(--bg-dark); }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 6px; cursor: pointer; flex-shrink: 0; }
        .story-ring { width: 70px; height: 70px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); display: flex; justify-content: center; align-items: center; }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--bg-dark); background-size: cover; background-position: center; }
        .story-name { font-size: 11px; color: var(--text-light); }
        .story-ring.add-story { background: transparent; border: 1px dashed rgba(255,255,255,0.3); color: var(--text-light); }

        /* INSTAGRAM AKIŞI (FEED) */
        .feed-container { max-width: 470px; margin: 0 auto; padding: 20px 0 80px; display: flex; flex-direction: column; gap: 25px; }
        .post { background: var(--bg-dark); border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 15px; }
        .post-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; }
        .post-user-info { display: flex; align-items: center; gap: 10px; cursor: pointer;}
        .post-avatar { width: 32px; height: 32px; border-radius: 50%; background-size: cover; background-position: center; border: 1px solid rgba(255,255,255,0.1); }
        .post-username { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 4px;}
        .gold-tick { width: 12px; height: 12px; background: var(--primary-gold); border-radius: 50%; color: #000; font-size: 8px; font-weight: bold; display: flex; justify-content: center; align-items: center;}
        .post-options { color: var(--text-muted); cursor: pointer; background: none; border: none;}
        .post-image { width: 100%; aspect-ratio: 4 / 5; background-size: cover; background-position: center; border-radius: 4px;}
        .post-actions { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px 8px; }
        .action-left { display: flex; gap: 16px; }
        .action-icon { color: var(--text-light); font-size: 26px; cursor: pointer; transition: 0.2s; background: none; border: none; display: flex; align-items: center;}
        .action-icon.liked { color: #ff3040; font-variation-settings: 'FILL' 1; } 
        .post-likes { padding: 0 15px; font-size: 14px; font-weight: 600; margin-bottom: 5px; }
        .post-caption-box { padding: 0 15px; font-size: 14px; line-height: 1.4; }
        .post-caption-box span { font-weight: 600; margin-right: 5px; cursor: pointer;}
        .post-time { padding: 0 15px; font-size: 11px; color: var(--text-muted); margin-top: 5px; text-transform: uppercase; letter-spacing: 0.5px;}

        /* ALT MENÜ (Navigasyon) */
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(15px); padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.05); z-index: 999; }
        .nav-icon-btn { background: none; border: none; color: var(--text-light); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn .material-symbols-outlined { font-size: 28px; }
        .nav-icon-btn.active { color: var(--primary-gold); font-variation-settings: 'FILL' 1; }
        .nav-icon-btn.add-btn { background: var(--text-light); color: var(--bg-dark); width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; }
        .nav-icon-btn.add-btn .material-symbols-outlined { font-size: 24px; font-weight: 600; }

        /* MODALLAR GENEL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; z-index: 20; display: flex; align-items: center; justify-content: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; transition: 0.3s; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-gold); background: rgba(0,0,0,0.5); }
        .btn-premium { background: var(--primary-gold); color: #000 !important; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; border: none;}
        
        .auth-box, .add-box { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 100%; max-width: 450px; position: relative; transform: scale(0.95); transition: all 0.3s ease; }
        .modal-overlay.active .auth-box, .modal-overlay.active .add-box { transform: scale(1); }
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 10px 0; font-size: 16px; cursor: pointer; transition: 0.3s; position: relative; }
        .tab-btn.active { color: var(--text-light); font-weight: 600; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--text-light); }
        .auth-form { display: none; }
        .auth-form.active { display: block; }

        /* YENİ: KEŞFET (ARAMA) MODALI */
        .explore-box { background: var(--bg-dark); width: 100%; height: 85vh; border-radius: 20px 20px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.3s ease; display: flex; flex-direction: column; padding: 20px 0;}
        .modal-overlay.active .explore-box { transform: translateY(0); }
        .explore-header { padding: 0 20px 15px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; gap: 10px;}
        .explore-search-input { flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 10px 15px; border-radius: 20px; outline: none; font-size: 14px;}
        .explore-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex: 1; }
        .explore-item { aspect-ratio: 1 / 1; background-size: cover; background-position: center; cursor: pointer; }

        /* YENİ: SWINDER REELS MODALI */
        .reels-box { background: #000; width: 100%; height: 100dvh; max-width: 450px; position: relative; transform: translateY(100%); transition: 0.3s ease; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reels-box::-webkit-scrollbar { display: none; }
        .modal-overlay.active .reels-box { transform: translateY(0); }
        
        .reel-item { width: 100%; height: 100dvh; scroll-snap-align: start; background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; padding-bottom: 90px; }
        .reel-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 50%, rgba(0,0,0,0.3) 100%); pointer-events: none;}
        
        .reel-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .reel-info { flex: 1; padding-right: 15px; }
        .reel-user { display: flex; align-items: center; gap: 10px; color: white; font-weight: 600; font-size: 15px; margin-bottom: 10px; text-shadow: 0 1px 3px rgba(0,0,0,0.8);}
        .reel-avatar { width: 36px; height: 36px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center;}
        .btn-follow-reel { background: transparent; border: 1px solid white; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 5px; cursor: pointer;}
        .reel-caption { color: white; font-size: 14px; line-height: 1.4; margin-bottom: 10px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        
        .reel-music { display: flex; align-items: center; gap: 8px; color: white; font-size: 13px; font-weight: 500;}
        .reel-music-icon { animation: spin 3s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .reel-actions { display: flex; flex-direction: column; gap: 20px; align-items: center; padding-bottom: 10px;}
        .reel-action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; text-shadow: 0 2px 5px rgba(0,0,0,0.8);}
        .reel-action-btn .material-symbols-outlined { font-size: 32px; transition: 0.2s;}
        .reel-action-btn.liked .material-symbols-outlined { color: #ff3040; font-variation-settings: 'FILL' 1; }
        .reel-action-text { font-size: 13px; font-weight: 600;}

        /* HİKAYE İZLEME */
        .story-view-box { background: #000; width: 100%; max-width: 450px; height: 85vh; border-radius: 20px; position: relative; overflow: hidden; transform: scale(0.95); transition: 0.3s ease; display: flex; flex-direction: column; }
        .modal-overlay.active .story-view-box { transform: scale(1); }
        .story-view-img { width: 100%; flex: 1; background-size: cover; background-position: center; }
        .story-view-header { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; align-items: center; gap: 12px; z-index: 2; }
        .story-view-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center; }
        .story-view-username { color: #fff; font-weight: 600; font-size: 15px; display: flex; align-items: center;}

        @media (max-width: 768px) { 
            body { padding-bottom: 60px; } 
            .feed-container { max-width: 100%; padding: 0 0 60px; gap: 15px;}
            header { padding: 10px 15px; }
            .logo { font-size: 20px; }
            .post-image { border-radius: 0; }
            .stories-wrapper { margin-top: 55px; padding: 15px 15px 5px; }
            
            .modal-overlay { padding: 0; align-items: flex-end; z-index: 1001;} 
            .auth-box, .add-box { margin: 0; max-width: 100%; border-radius: 25px 25px 0 0; transform: translateY(100%); border-bottom: none; padding: 25px 20px;}
            .modal-overlay.active .auth-box, .modal-overlay.active .add-box { transform: translateY(0); }
            
            .story-view-box { height: 100dvh; max-height: 100dvh; width: 100%; border-radius: 0; transform: translateY(100%); }
            .modal-overlay.active .story-view-box { transform: translateY(0); }
            
            /* Reels Mobile Adjustments */
            .reels-box { height: 100dvh; max-width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <a href="index.html" class="logo">Swinder<span>.</span></a>
        <div class="header-actions">
            <button class="header-icon"><span class="material-symbols-outlined">favorite</span></button>
            <button class="header-icon"><span class="material-symbols-outlined">send</span></button>
        </div>
    </header>

    <div class="stories-wrapper" id="stories-container">
        <div class="story-item" onclick="openAddStoryModal()">
            <div class="story-ring add-story"><div class="story-img" style="background-color: #2a2a30; display:flex; justify-content:center; align-items:center; color: var(--text-light);"><span class="material-symbols-outlined">add</span></div></div>
            <span class="story-name">Hikayen</span>
        </div>
    </div>

    <main class="feed-container" id="feed-container">
        <div style="text-align: center; color: var(--text-muted); padding: 40px;">Gönderiler yükleniyor...</div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-icon-btn active" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn" onclick="openExplore()"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn add-btn" onclick="openAddModal()"><span class="material-symbols-outlined">add</span></button>
        <button class="nav-icon-btn" onclick="openReels()"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn" id="mobile-profile-btn" onclick="openAuthModal('login')"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="exploreModal">
        <div class="explore-box">
            <div class="explore-header">
                <button class="header-icon" onclick="closeExplore()" style="margin-right: 10px;"><span class="material-symbols-outlined">arrow_back</span></button>
                <input type="text" class="explore-search-input" id="search-input" placeholder="Araç, marka veya kullanıcı ara..." onkeyup="performSearch()">
            </div>
            <div class="explore-grid" id="explore-grid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="reelsModal" style="padding:0; background: #000;">
        <button class="close-btn" onclick="closeReels()" style="z-index: 1000; top: 20px; right: 20px; background: rgba(0,0,0,0.5);"><span class="material-symbols-outlined">close</span></button>
        <div class="reels-box" id="reels-container">
            <div style="color: white; text-align: center; padding-top: 50vh;">Reels Yükleniyor...</div>
        </div>
    </div>

    <div class="modal-overlay" id="addModal">
        <div class="add-box">
            <button class="close-btn" onclick="closeAddModal()"><span class="material-symbols-outlined">close</span></button>
            <h2 style="color: var(--text-light); font-weight: 600; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; text-align: center; font-size: 16px;">Yeni Gönderi Oluştur</h2>
            <form>
                <div class="form-group"><label>Fotoğraf Linki (URL)</label><input type="text" id="add-image" placeholder="Örn: https://images.unsplash.com/..."></div>
                <div class="form-group"><label>Açıklama Yaz</label><textarea id="add-caption" rows="4" placeholder="Takipçilerinle bir şeyler paylaş..."></textarea></div>
                <button type="button" id="btn-submit-post" class="btn-premium">Paylaş</button>
            </form>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="auth-box">
            <button class="close-btn" onclick="closeAuthModal()"><span class="material-symbols-outlined">close</span></button>
            <h2 style="text-align: center; margin-bottom: 20px; font-weight: 800; letter-spacing: 1px;">Swinder<span>.</span></h2>
            <div class="auth-tabs"><button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Giriş Yap</button><button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Kayıt Ol</button></div>
            <div class="auth-form active" id="form-login">
                <div class="form-group"><input type="email" id="login-email" placeholder="E-posta Adresi"></div>
                <div class="form-group"><input type="password" id="login-pass" placeholder="Şifre"></div>
                <button class="btn-premium" id="btn-login" style="margin-top: 10px;">Giriş Yap</button>
            </div>
            <div class="auth-form" id="form-register">
                <div class="form-group"><input type="text" id="reg-name" placeholder="Kullanıcı Adı"></div>
                <div class="form-group"><input type="email" id="reg-email" placeholder="E-posta Adresi"></div>
                <div class="form-group"><input type="password" id="reg-pass" placeholder="Şifre"></div>
                <button class="btn-premium" id="btn-register" style="margin-top: 10px;">Kayıt Ol</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="addStoryModal"><div class="add-box"><button class="close-btn" onclick="closeAddStoryModal()"><span class="material-symbols-outlined">close</span></button><h2 style="color: var(--text-light); font-weight: 600; margin-bottom: 20px; text-align: center; font-size: 16px;">Hikayene Ekle</h2><div class="form-group"><input type="text" id="story-img-url" placeholder="Görsel URL'si yapıştır..."></div><button class="btn-premium" id="btn-submit-story">Hikayede Paylaş</button></div></div>
    
    <div class="modal-overlay" id="viewStoryModal"><div class="story-view-box"><button class="story-view-close" onclick="closeViewStoryModal()"><span class="material-symbols-outlined">close</span></button><div class="story-view-header"><div class="story-view-avatar" id="view-story-avatar"></div><div class="story-view-username" id="view-story-username">-</div></div><div class="story-view-img" id="view-story-img"></div><div style="position: absolute; bottom: 20px; left: 15px; right: 15px; display: flex; gap: 10px;"><input type="text" placeholder="Mesaj gönder..." style="flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.3); border-radius: 30px; padding: 10px 15px; color: white; outline: none;"><button class="action-icon"><span class="material-symbols-outlined">favorite</span></button><button class="action-icon"><span class="material-symbols-outlined">send</span></button></div></div></div>

    <script>
        let lastScrollTop = 0;
        const header = document.getElementById('main-header');
        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 80) { header.classList.add('header-hidden'); } 
            else { header.classList.remove('header-hidden'); } 
            lastScrollTop = scrollTop;
        });

        function closeAuthModal() { document.getElementById('authModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        function closeAddModal() { document.getElementById('addModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        window.openAuthModal = function(tab) { document.getElementById('authModal').classList.add('active'); document.body.style.overflow = 'hidden'; switchAuthTab(tab); }
        window.openAddModal = function() { document.getElementById('addModal').classList.add('active'); document.body.style.overflow = 'hidden'; }
        window.openAddStoryModal = function() { document.getElementById('addStoryModal').classList.add('active'); document.body.style.overflow = 'hidden'; }
        window.closeAddStoryModal = function() { document.getElementById('addStoryModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        window.closeViewStoryModal = function() { document.getElementById('viewStoryModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        
        // YENİ: Arama ve Reels Modalları
        window.openExplore = function() { document.getElementById('exploreModal').classList.add('active'); document.body.style.overflow = 'hidden'; renderExploreGrid(); }
        window.closeExplore = function() { document.getElementById('exploreModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        window.openReels = function() { document.getElementById('reelsModal').classList.add('active'); document.body.style.overflow = 'hidden'; renderReels(); }
        window.closeReels = function() { document.getElementById('reelsModal').classList.remove('active'); document.body.style.overflow = 'auto'; }

        document.querySelectorAll('.modal-overlay').forEach(modal => { modal.addEventListener('click', (e) => { if(e.target === modal) { modal.classList.remove('active'); document.body.style.overflow = 'auto'; }}); });
        
        function switchAuthTab(tab) {
            document.getElementById('tab-login').classList.remove('active'); document.getElementById('tab-register').classList.remove('active'); document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('form-login').classList.remove('active'); document.getElementById('form-register').classList.remove('active'); document.getElementById('form-' + tab).classList.add('active');
        }

        window.toggleLike = function(btn) { btn.classList.toggle('liked'); }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, orderBy, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0",
            authDomain: "swinder-79534.firebaseapp.com",
            projectId: "swinder-79534",
            storageBucket: "swinder-79534.firebasestorage.app",
            messagingSenderId: "704644873549",
            appId: "1:704644873549:web:d95f561ec912b94cf2cb04"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // 🔥 GLOBAL VERİ HAFIZASI (Arama ve Reels Hızlı Çalışsın Diye) 🔥
        window.globalPosts = []; 
        window.globalUsers = {};

        // GİRİŞ KONTROLLERİ
        document.getElementById('btn-login').addEventListener('click', async () => {
            const email = document.getElementById('login-email').value; const pass = document.getElementById('login-pass').value;
            if(!email || !pass) return; document.getElementById('btn-login').innerText = "Giriş Yapılıyor...";
            try { await signInWithEmailAndPassword(auth, email, pass); window.location.reload(); } catch (err) { alert("Hata: " + err.message); }
        });
        document.getElementById('btn-register').addEventListener('click', async () => {
            const name = document.getElementById('reg-name').value; const email = document.getElementById('reg-email').value; const pass = document.getElementById('reg-pass').value;
            if(!name || !email || !pass) return; document.getElementById('btn-register').innerText = "Kayıt Yapılıyor...";
            try { const userCred = await createUserWithEmailAndPassword(auth, email, pass); await updateProfile(userCred.user, { displayName: name }); window.location.reload(); } catch (err) { alert("Hata: " + err.message); }
        });

        onAuthStateChanged(auth, async (user) => {
            const mobileProfileBtn = document.getElementById('mobile-profile-btn'); 
            if (user) {
                await setDoc(doc(db, "kullanicilar", user.uid), { displayName: user.displayName, email: user.email }, { merge: true });
                mobileProfileBtn.onclick = function() { window.location.href = "profil.html"; };
                const userSnap = await getDocs(query(collection(db, "kullanicilar")));
                userSnap.forEach(uDoc => { if(uDoc.id === user.uid && uDoc.data().avatar) { mobileProfileBtn.innerHTML = `<div style="width: 28px; height: 28px; border-radius: 50%; background: url('${uDoc.data().avatar}') center/cover; border: 2px solid var(--text-light);"></div>`; }});
            } else { mobileProfileBtn.onclick = function() { window.openAuthModal('login'); }; }
        });

        // 🔥 ANA AKIŞI ÇEK VE HAFIZAYA AL 🔥
        async function loadPosts() {
            const feedContainer = document.getElementById('feed-container');
            try {
                // Kullanıcıları hafızaya al
                const usersSnap = await getDocs(collection(db, "kullanicilar"));
                usersSnap.forEach(uDoc => { const uData = uDoc.data(); if(uData.displayName) window.globalUsers[uData.displayName] = uData; });

                // Gönderileri çek ve global diziye at
                const snapshot = await getDocs(query(collection(db, "gonderiler"), orderBy("createdAt", "desc")));
                window.globalPosts = [];
                snapshot.forEach(doc => { window.globalPosts.push({ id: doc.id, ...doc.data() }); });

                feedContainer.innerHTML = ''; 
                if (window.globalPosts.length === 0) { feedContainer.innerHTML = `<div style="text-align: center; padding: 50px;">Akış boş. Paylaşım yap!</div>`; return; }

                // Ekrana bas
                window.globalPosts.forEach((data) => {
                    const posterInfo = window.globalUsers[data.username] || {};
                    const isVerified = posterInfo.isVerified || (data.username && data.username.toLowerCase().includes('çağatay'));
                    const goldTickHtml = isVerified ? '<span class="gold-tick">✓</span>' : '';
                    const avatarStyle = posterInfo.avatar ? `background-image: url('${posterInfo.avatar}');` : `background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100&q=80');`;

                    feedContainer.insertAdjacentHTML('beforeend', `
                        <article class="post">
                            <div class="post-header">
                                <div class="post-user-info"><div class="post-avatar" style="${avatarStyle}"></div><span class="post-username">${data.username} ${goldTickHtml}</span></div>
                                <button class="post-options"><span class="material-symbols-outlined">more_horiz</span></button>
                            </div>
                            <div class="post-image" style="background-image: url('${data.imageUrl}');" ondblclick="toggleLike(this.nextElementSibling.querySelector('.action-icon'))"></div>
                            <div class="post-actions">
                                <div class="action-left"><button class="action-icon" onclick="toggleLike(this)"><span class="material-symbols-outlined">favorite</span></button><button class="action-icon"><span class="material-symbols-outlined">chat_bubble</span></button><button class="action-icon"><span class="material-symbols-outlined">send</span></button></div>
                                <button class="action-icon"><span class="material-symbols-outlined">bookmark</span></button>
                            </div>
                            <div class="post-likes">${data.likesCount} beğenme</div>
                            ${data.caption ? `<div class="post-caption-box"><span>${data.username}</span> ${data.caption}</div>` : ''}
                            <div class="post-time">YENİ</div>
                        </article>
                    `);
                });
            } catch (err) { console.error(err); }
        }

        // =========================================================
        // 🔥 YENİ: ARAMA MOTORU (KEŞFET) MANTIĞI 🔥
        // =========================================================
        window.renderExploreGrid = function(filterText = "") {
            const exploreGrid = document.getElementById('explore-grid');
            exploreGrid.innerHTML = '';
            
            const filteredPosts = window.globalPosts.filter(post => {
                const search = filterText.toLowerCase();
                const caption = post.caption ? post.caption.toLowerCase() : "";
                const user = post.username ? post.username.toLowerCase() : "";
                return caption.includes(search) || user.includes(search);
            });

            if(filteredPosts.length === 0) { exploreGrid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px;">Sonuç bulunamadı.</div>'; return;}

            filteredPosts.forEach(post => {
                exploreGrid.insertAdjacentHTML('beforeend', `<div class="explore-item" style="background-image: url('${post.imageUrl}');" onclick="closeExplore(); window.scrollTo({top: 0, behavior: 'smooth'})"></div>`);
            });
        }
        window.performSearch = function() {
            const val = document.getElementById('search-input').value;
            window.renderExploreGrid(val);
        }

        // =========================================================
        // 🔥 YENİ: REELS MOTORU MANTIĞI 🔥
        // =========================================================
        window.renderReels = function() {
            const reelsContainer = document.getElementById('reels-container');
            reelsContainer.innerHTML = '';

            if (window.globalPosts.length === 0) { reelsContainer.innerHTML = '<div style="color: white; text-align: center; padding-top: 50vh;">Reels bulunamadı.</div>'; return; }

            // Gönderileri Tam Ekran Reels Formatına Çevir
            window.globalPosts.forEach(data => {
                const posterInfo = window.globalUsers[data.username] || {};
                const isVerified = posterInfo.isVerified || (data.username && data.username.toLowerCase().includes('çağatay'));
                const goldTickHtml = isVerified ? '<span class="gold-tick" style="width:14px; height:14px; font-size:9px; margin-left:4px;">✓</span>' : '';
                const avatarStyle = posterInfo.avatar ? `background-image: url('${posterInfo.avatar}');` : `background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100&q=80');`;

                const reelHtml = `
                <div class="reel-item" style="background-image: url('${data.imageUrl}');" ondblclick="toggleLike(this.querySelector('.btn-like'))">
                    <div class="reel-overlay"></div>
                    <div class="reel-content">
                        <div class="reel-info">
                            <div class="reel-user">
                                <div class="reel-avatar" style="${avatarStyle}"></div>
                                ${data.username} ${goldTickHtml}
                                <button class="btn-follow-reel">Takip Et</button>
                            </div>
                            <div class="reel-caption">${data.caption || 'Swinder Premium Gönderisi ✨'}</div>
                            <div class="reel-music">
                                <span class="material-symbols-outlined reel-music-icon">graphic_eq</span> Orijinal Ses - ${data.username}
                            </div>
                        </div>
                        
                        <div class="reel-actions">
                            <button class="reel-action-btn btn-like" onclick="toggleLike(this)">
                                <span class="material-symbols-outlined">favorite</span>
                                <span class="reel-action-text">${data.likesCount || Math.floor(Math.random() * 100)}</span>
                            </button>
                            <button class="reel-action-btn">
                                <span class="material-symbols-outlined">chat_bubble</span>
                                <span class="reel-action-text">${Math.floor(Math.random() * 20)}</span>
                            </button>
                            <button class="reel-action-btn">
                                <span class="material-symbols-outlined">send</span>
                            </button>
                            <button class="reel-action-btn">
                                <span class="material-symbols-outlined">more_vert</span>
                            </button>
                        </div>
                    </div>
                </div>`;
                reelsContainer.insertAdjacentHTML('beforeend', reelHtml);
            });
        }

        // --- GÖNDERİ & HİKAYE PAYLAŞMA ---
        document.getElementById('btn-submit-post').addEventListener('click', async () => {
            const user = auth.currentUser;
            if (!user) return window.openAuthModal('login');
            const imageUrl = document.getElementById('add-image').value;
            const caption = document.getElementById('add-caption').value;
            if (!imageUrl) return alert("Fotoğraf linki zorunlu!");
            document.getElementById('btn-submit-post').innerText = "Paylaşılıyor...";
            try {
                await addDoc(collection(db, "gonderiler"), { imageUrl: imageUrl, caption: caption, username: user.displayName, likesCount: Math.floor(Math.random() * 50) + 1, createdAt: new Date() });
                closeAddModal(); document.getElementById('add-image').value = ""; document.getElementById('add-caption').value = ""; loadPosts();
            } catch (err) {} finally { document.getElementById('btn-submit-post').innerText = "Paylaş"; }
        });

        async function loadStories() {
            const stContainer = document.getElementById('stories-container');
            stContainer.innerHTML = `<div class="story-item" onclick="openAddStoryModal()"><div class="story-ring add-story"><div class="story-img" style="background-color: #2a2a30; display:flex; justify-content:center; align-items:center; color: var(--text-light);"><span class="material-symbols-outlined">add</span></div></div><span class="story-name">Hikayen</span></div>`;
            try {
                const snapshot = await getDocs(query(collection(db, "hikayeler"), orderBy("createdAt", "desc")));
                snapshot.forEach(doc => {
                    const data = doc.data(); const pInfo = window.globalUsers[data.username] || {}; const sAvatar = pInfo.avatar || '';
                    stContainer.insertAdjacentHTML('beforeend', `<div class="story-item" onclick="window.openViewStoryModal('${doc.id}', '${data.imageUrl}', '${data.username}', '${sAvatar}')"><div class="story-ring"><div class="story-img" style="background-image: url('${data.imageUrl}');"></div></div><span class="story-name">${data.username.split(' ')[0]}</span></div>`);
                });
            } catch(e){}
        }

        window.openViewStoryModal = function(id, imgUrl, username, avatarUrl) {
            document.getElementById('view-story-img').style.backgroundImage = `url('${imgUrl}')`; document.getElementById('view-story-username').innerText = username;
            document.getElementById('view-story-avatar').style.backgroundImage = `url('${avatarUrl || "https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100&q=80"}')`;
            document.getElementById('viewStoryModal').classList.add('active'); document.body.style.overflow = 'hidden';
        }

        document.getElementById('btn-submit-story').addEventListener('click', async () => {
            const user = auth.currentUser; if (!user) return;
            const imageUrl = document.getElementById('story-img-url').value; if (!imageUrl) return;
            document.getElementById('btn-submit-story').innerText = "Yükleniyor...";
            try { await addDoc(collection(db, "hikayeler"), { imageUrl: imageUrl, username: user.displayName, createdAt: new Date() }); closeAddStoryModal(); loadStories(); } 
            catch (e) {} finally { document.getElementById('btn-submit-story').innerText = "Hikayede Paylaş"; }
        });
        
        loadPosts(); loadStories();
    </script>
</body>
</html>
