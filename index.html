<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swinder - Premium İlan Platformu</title>
    <style>
        /* --- Temel Ayarlar --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root {
            --bg-dark: #0a0a0c; --surface: #1a1a1f; --primary-gold: #d4af37; --gold-hover: #f3e5ab;
            --text-light: #f5f5f7; --text-muted: #8e8e93; --glass-bg: rgba(26, 26, 31, 0.75);
        }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* --- Üst Menü (Optimize Edilmiş) --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
            background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100; border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--primary-gold); text-decoration: none; text-shadow: 0 2px 10px rgba(212,175,55,0.3); }
        
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-links button.text-btn { background: transparent; border: none; color: var(--text-light); font-size: 15px; cursor: pointer; transition: color 0.3s ease; font-weight: 500; }
        .nav-links button.text-btn:hover { color: var(--primary-gold); }
        
        /* Düzeltilmiş Görünür İlan Ver Butonu */
        .btn-premium {
            background: linear-gradient(135deg, #d4af37 0%, #b58500 100%);
            color: #fff !important; /* Metin rengi kesinlikle beyaz */
            padding: 10px 24px; border-radius: 30px; font-weight: 700; font-size: 15px;
            border: 1px solid #d4af37; cursor: pointer;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }
        .btn-premium:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(212, 175, 55, 0.7); background: linear-gradient(135deg, #f3e5ab 0%, #d4af37 100%); color: #000 !important; text-shadow: none; }

        /* --- Karşılama Ekranı --- */
        .hero { height: 60vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: radial-gradient(circle at center, #1a1a1f 0%, #0a0a0c 100%); padding: 0 20px; margin-top: 60px; }
        .hero h1 { font-size: clamp(2rem, 5vw, 4rem); font-weight: 300; margin-bottom: 20px; letter-spacing: 1px; }
        .hero h1 span { color: var(--primary-gold); font-weight: 600; }
        .search-box { margin-top: 20px; display: flex; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 6px; border-radius: 50px; width: 100%; max-width: 600px; backdrop-filter: blur(5px); }
        .search-box input { flex: 1; background: transparent; border: none; color: white; padding: 12px 20px; font-size: 16px; outline: none; }
        .search-box input::placeholder { color: var(--text-muted); }

        /* --- Kategoriler --- */
        .categories { display: flex; justify-content: center; gap: 10px; padding: 20px 5%; overflow-x: auto; white-space: nowrap; margin-bottom: 20px; }
        .categories::-webkit-scrollbar { display: none; }
        .category-btn { background: var(--surface); border: 1px solid rgba(255,255,255,0.05); color: var(--text-light); padding: 10px 20px; border-radius: 30px; font-size: 14px; cursor: pointer; transition: all 0.3s ease; }
        .category-btn:hover, .category-btn.active { background: rgba(212, 175, 55, 0.1); border-color: var(--primary-gold); color: var(--primary-gold); }

        /* --- Vitrin İlanları --- */
        .showcase { padding: 0 5% 50px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 25px; }
        .card { background: var(--surface); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); transition: all 0.4s ease; cursor: pointer; }
        .card:hover { transform: translateY(-8px); border-color: rgba(212, 175, 55, 0.5); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }
        .card-img { height: 200px; background-size: cover; background-position: center; position: relative; }
        .badge { position: absolute; top: 12px; right: 12px; background: var(--primary-gold); color: #000; padding: 5px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; }
        .card-content { padding: 20px; }
        .card-title { font-size: 1.1rem; margin-bottom: 8px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card-price { color: var(--primary-gold); font-size: 1.3rem; font-weight: 700; margin-bottom: 10px; }
        .card-details { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); border-top: 1px solid rgba(255,255,255,0.05); padding-top: 12px; }

        /* Yükleniyor Spinner */
        .loader-container { display: none; justify-content: center; padding: 30px 0 60px 0; }
        .loader-container.active { display: flex; }
        .spinner { width: 35px; height: 35px; border: 3px solid rgba(212, 175, 55, 0.2); border-top: 3px solid var(--primary-gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- ORTAK MODAL YAPISI --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 20px; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .close-btn:hover { background: var(--primary-gold); color: #000; }

        /* GİRİŞ/KAYIT MODALI (Geliştirilmiş) */
        .auth-box { background: var(--surface); border: 1px solid rgba(212, 175, 55, 0.3); padding: 30px; border-radius: 20px; width: 100%; max-width: 400px; position: relative; transform: scale(0.95); transition: all 0.3s ease; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .modal-overlay.active .auth-box { transform: scale(1); }
        
        /* Sekmeler (Tabs) */
        .auth-tabs { display: flex; margin-bottom: 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 10px 0; font-size: 16px; cursor: pointer; transition: 0.3s; position: relative; }
        .tab-btn.active { color: var(--primary-gold); font-weight: 600; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 2px; background: var(--primary-gold); }
        
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; transition: border 0.3s; }
        .form-group input:focus { border-color: var(--primary-gold); }
        .auth-form { display: none; }
        .auth-form.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* MOBİL OPTİMİZASYON (Responsive) */
        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) {
            .grid { grid-template-columns: repeat(2, 1fr); }
            header { padding: 15px 20px; }
            .nav-links button.text-btn { display: none; } /* Mobilde Giriş/Kayıt yazılarını gizle, sadece ilan ver kalsın */
            .logo { font-size: 20px; }
            .btn-premium { padding: 8px 16px; font-size: 13px; }
        }
        @media (max-width: 480px) {
            .grid { grid-template-columns: 1fr; }
            .hero { height: 50vh; }
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">SWINDER</a>
        <div class="nav-links">
            <button class="text-btn" onclick="openAuthModal('login')">Giriş Yap</button>
            <button class="text-btn" onclick="openAuthModal('register')">Kayıt Ol</button>
            <button class="btn-premium" onclick="window.location.href='panel.html'">+ İlan Ver</button>
        </div>
    </header>

    <section class="hero">
        <h1>Lüksün Yeni <span>Adresi</span></h1>
        <div class="search-box">
            <input type="text" placeholder="Marka, model veya anahtar kelime...">
            <button class="btn-premium" style="border-radius: 40px; padding: 10px 30px;">Ara</button>
        </div>
    </section>

    <div class="categories">
        <button class="category-btn active">🚗 Araçlar</button>
        <button class="category-btn">🏠 Emlak</button>
        <button class="category-btn">⌚ Saat</button>
        <button class="category-btn">🛥️ Tekne</button>
    </div>

    <section class="showcase">
        <div class="grid" id="ilanIzgarasi">
            
            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');"><span class="badge">PREMIUM</span></div>
                <div class="card-content">
                    <h3 class="card-title">BMW 420i Cabrio M Sport</h3>
                    <div class="card-price">3.250.000 TL</div>
                    <div class="card-details"><span>2022</span><span>15.000 km</span></div>
                </div>
            </div>

            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1556189250-72ba954cfc2b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');"></div>
                <div class="card-content">
                    <h3 class="card-title">BMW F30 320i M Sport</h3>
                    <div class="card-price">1.850.000 TL</div>
                    <div class="card-details"><span>2018</span><span>65.000 km</span></div>
                </div>
            </div>

            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1601158935942-52255782d322?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');"><span class="badge">ÖZEL</span></div>
                <div class="card-content">
                    <h3 class="card-title">Rolex Submariner Date</h3>
                    <div class="card-price">485.000 TL</div>
                    <div class="card-details"><span>2023</span><span>Sıfır</span></div>
                </div>
            </div>

            <div class="card">
                <div class="card-img" style="background-image: url('https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80');"></div>
                <div class="card-content">
                    <h3 class="card-title">Boğaz Manzaralı Yalı</h3>
                    <div class="card-price">245.000.000 TL</div>
                    <div class="card-details"><span>8+2</span><span>Sarıyer</span></div>
                </div>
            </div>
            
        </div>
    </section>

    <div class="loader-container" id="loader"><div class="spinner"></div></div>

    <div class="modal-overlay" id="authModal">
        <div class="auth-box">
            <button class="close-btn" onclick="closeAuthModal()">&times;</button>
            
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Giriş Yap</button>
                <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Kayıt Ol</button>
            </div>

            <div class="auth-form active" id="form-login">
                <div class="form-group"><input type="email" placeholder="E-posta Adresi"></div>
                <div class="form-group"><input type="password" placeholder="Şifre"></div>
                <div style="text-align: right; margin-bottom: 15px;"><a href="#" style="color: var(--text-muted); font-size: 12px; text-decoration: none;">Şifremi Unuttum</a></div>
                <button class="btn-premium" style="width: 100%; border-radius: 10px;">Giriş Yap</button>
            </div>

            <div class="auth-form" id="form-register">
                <div class="form-group"><input type="text" placeholder="Ad Soyad veya Mağaza Adı"></div>
                <div class="form-group"><input type="email" placeholder="E-posta Adresi"></div>
                <div class="form-group"><input type="password" placeholder="Şifre Belirleyin"></div>
                <button class="btn-premium" style="width: 100%; border-radius: 10px;">Hesap Oluştur</button>
            </div>
        </div>
    </div>

    <script>
        // --- AUTH MODAL (GİRİŞ/KAYIT) KONTROLLERİ ---
        const authModal = document.getElementById('authModal');
        
        function openAuthModal(tab) {
            authModal.classList.add('active');
            document.body.style.overflow = 'hidden';
            switchAuthTab(tab); // Hangi butona tıklandıysa o sekmeyi aç
        }

        function closeAuthModal() {
            authModal.classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Sekme (Tab) Değiştirme Fonksiyonu
        function switchAuthTab(tab) {
            // Butonların aktifliğini ayarla
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('tab-' + tab).classList.add('active');

            // Formların görünürlüğünü ayarla
            document.getElementById('form-login').classList.remove('active');
            document.getElementById('form-register').classList.remove('active');
            document.getElementById('form-' + tab).classList.add('active');
        }

        // Modal dışına tıklayınca kapatma
        authModal.addEventListener('click', (e) => {
            if(e.target === authModal) closeAuthModal();
        });

        // --- SINIRSIZ KAYDIRMA (Mobilde de test edebilirsin) ---
        const grid = document.getElementById('ilanIzgarasi');
        const loader = document.getElementById('loader');
        let isLoading = false;

        const dummyVeriler = [
            { title: "Porsche 911 Carrera S", price: "18.200.000 TL", year: "2022", km: "12.000 km", img: "https://images.unsplash.com/photo-1503376760367-112cb1bf2363?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" },
            { title: "Audemars Piguet", price: "2.100.000 TL", year: "2021", km: "Kutulu", img: "https://images.unsplash.com/photo-1548171915-e79a380a2a4b?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80" }
        ];

        window.addEventListener('scroll', () => {
            if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 100 && !isLoading) {
                isLoading = true; loader.classList.add('active');
                setTimeout(() => { yeniIlanlariYukle(); loader.classList.remove('active'); isLoading = false; }, 1200);
            }
        });

        function yeniIlanlariYukle() {
            dummyVeriler.forEach(ilan => {
                grid.insertAdjacentHTML('beforeend', `
                <div class="card">
                    <div class="card-img" style="background-image: url('${ilan.img}');"></div>
                    <div class="card-content">
                        <h3 class="card-title">${ilan.title}</h3>
                        <div class="card-price">${ilan.price}</div>
                        <div class="card-details"><span>${ilan.year}</span><span>${ilan.km}</span></div>
                    </div>
                </div>`);
            });
        }
    </script>
</body>
</html>
