<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swinder - Lüks Arkadaşlık & Sosyal Ağ</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

    <style>
        /* --- TEMEL & GLASSMORPHISM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: pan-y; }
        :root { 
            --primary-gold: #d4af37; --gold-hover: #f3e5ab; 
            --text-light: #f5f5f7; --text-muted: rgba(255,255,255,0.6); 
            --glass-bg: rgba(20, 20, 25, 0.45); --glass-border: 1px solid rgba(255, 255, 255, 0.08); --glass-blur: blur(24px); --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        body { background: #050505; color: var(--text-light); overflow: hidden; /* Swipe için scroll kapalı */ }

        /* AMBİANS IŞIKLARI */
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .ambient-blob-1 { position: absolute; top: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float1 20s infinite alternate ease-in-out; }
        .ambient-blob-2 { position: absolute; bottom: 10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(255,48,64,0.1) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float2 25s infinite alternate ease-in-out; }
        @keyframes float1 { 100% { transform: translate(10vw, 10vh); } }
        @keyframes float2 { 100% { transform: translate(-10vw, -10vh); } }

        /* ÜST MENÜ */
        header { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 12, 0.5); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); z-index: 100; border-bottom: var(--glass-border); }
        .logo { font-size: 24px; font-weight: 800; letter-spacing: 1px; color: var(--text-light); text-decoration: none; display: flex; align-items: center; gap: 5px; text-shadow: 0 2px 10px rgba(255,255,255,0.1);}
        .logo span { color: var(--primary-gold); font-size: 28px;}
        .header-actions { display: flex; gap: 15px; align-items: center;}
        .header-icon { color: var(--text-light); font-size: 26px; cursor: pointer; transition: 0.3s; background: none; border: none; position: relative;}
        .notification-dot { position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: #ff3040; border-radius: 50%; display: none; box-shadow: 0 0 8px rgba(255,48,64,0.8);}

        /* HİKAYELER (Instagram Etkisi) */
        .stories-wrapper { position: absolute; top: 70px; left: 0; width: 100%; padding: 10px 5%; display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; z-index: 50; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; }
        .story-ring { width: 60px; height: 60px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 10px rgba(212,175,55,0.3); }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #0a0a0c; background-size: cover; background-position: center; }
        .story-name { font-size: 11px; color: var(--text-light); font-weight: 500;}

        /* 🔥 SWIPE (TİNDER) KARTLARI BÖLÜMÜ 🔥 */
        .swipe-container { position: absolute; top: 160px; bottom: 150px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        
        .swipe-card { position: absolute; width: 90%; height: 95%; background: var(--glass-bg); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); border: var(--glass-border); border-radius: 24px; box-shadow: var(--glass-shadow); overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; transform-origin: 50% 100%; transition: transform 0.3s ease, opacity 0.3s ease; cursor: grab; z-index: 1; user-select: none;}
        .swipe-card.moving { transition: none; cursor: grabbing; } /* Kaydırırken transition iptal */
        
        .card-img-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 40%, transparent 100%); z-index: 0; }
        
        /* Sağ-Sol Etiketleri (LIKE / NOPE) */
        .swipe-stamp { position: absolute; top: 40px; padding: 5px 15px; border-radius: 10px; font-weight: 800; font-size: 32px; text-transform: uppercase; letter-spacing: 2px; opacity: 0; z-index: 10; border: 4px solid; }
        .stamp-like { right: 30px; color: #2ecc71; border-color: #2ecc71; transform: rotate(15deg); }
        .stamp-nope { left: 30px; color: #ff4757; border-color: #ff4757; transform: rotate(-15deg); }

        .card-info { position: relative; z-index: 2; padding: 20px; width: 100%; display: flex; justify-content: space-between; align-items: flex-end;}
        .card-details { flex: 1; }
        .card-name { font-size: 28px; font-weight: 700; color: white; display: flex; align-items: center; gap: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
        .card-age { font-weight: 400; font-size: 24px; opacity: 0.9;}
        .card-bio { font-size: 15px; color: rgba(255,255,255,0.8); margin-top: 5px; display: flex; align-items: center; gap: 5px; text-shadow: 0 1px 5px rgba(0,0,0,0.8);}
        .btn-info { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; border: var(--glass-border); color: white; cursor: pointer; transition: 0.2s;}

        /* BOŞ KALIRSA ÇIKACAK MESAJ */
        .empty-state { position: absolute; text-align: center; color: var(--text-muted); font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 0;}
        .empty-state .material-symbols-outlined { font-size: 60px; color: var(--primary-gold); animation: pulse 2s infinite alternate;}
        @keyframes pulse { 0% { transform: scale(1); opacity:0.6;} 100% { transform: scale(1.1); opacity:1;} }

        /* AKSİYON BUTONLARI (Tinder Butonları) */
        .action-buttons { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 350px; display: flex; justify-content: space-evenly; align-items: center; z-index: 90; padding: 0 20px;}
        .action-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(20,20,25,0.6); backdrop-filter: blur(20px); border: var(--glass-border); display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: 0.2s; position: relative; overflow: hidden;}
        .action-btn::after { content: ''; position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(255,255,255,0.1); opacity:0; transition:0.2s; }
        .action-btn:active::after { opacity: 1; }
        
        .btn-dislike { color: #ff4757; }
        .btn-dislike .material-symbols-outlined { font-size: 34px; font-weight: 600;}
        
        .btn-superlike { width: 50px; height: 50px; color: #3498db; }
        .btn-superlike .material-symbols-outlined { font-size: 28px; font-variation-settings: 'FILL' 1;}
        
        .btn-like { color: #2ecc71; }
        .btn-like .material-symbols-outlined { font-size: 34px; font-weight: 600; font-variation-settings: 'FILL' 1;}

        /* ALT MENÜ (Navigasyon) */
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.7); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 12px 10px calc(12px + env(safe-area-inset-bottom)); border-top: var(--glass-border); z-index: 999; box-shadow: 0 -5px 25px rgba(0,0,0,0.5);}
        .nav-icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn .material-symbols-outlined { font-size: 28px; }
        .nav-icon-btn.active { color: var(--primary-gold); font-variation-settings: 'FILL' 1; filter: drop-shadow(0 0 8px rgba(212,175,55,0.4));}
        .nav-icon-btn.active-logo { font-size: 28px; font-weight: 800; color: var(--primary-gold); font-style: italic; filter: drop-shadow(0 0 8px rgba(212,175,55,0.6));}

        /* EŞLEŞME (MATCH) EKRANI */
        .match-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s ease;}
        .match-overlay.active { opacity: 1; visibility: visible; }
        .match-title { font-size: 45px; font-style: italic; font-weight: 900; color: var(--primary-gold); text-shadow: 0 0 20px rgba(212,175,55,0.8); margin-bottom: 40px; letter-spacing: 2px; transform: scale(0.5); opacity: 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .match-overlay.active .match-title { transform: scale(1); opacity: 1; }
        .match-avatars { display: flex; gap: 20px; margin-bottom: 40px; }
        .m-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary-gold); background-size: cover; background-position: center; box-shadow: 0 0 30px rgba(212,175,55,0.5); transform: translateX(100px); opacity: 0; transition: 0.6s ease; }
        .m-avatar.left { transform: translateX(-100px); }
        .match-overlay.active .m-avatar { transform: translateX(0); opacity: 1; }
        .match-btns { display: flex; flex-direction: column; gap: 15px; width: 80%; max-width: 300px;}
        .btn-msg { background: linear-gradient(135deg, #d4af37, #aa8529); color: black; padding: 15px; border-radius: 30px; font-weight: 700; border: none; font-size: 16px; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;}
        .btn-keep { background: transparent; border: 2px solid rgba(255,255,255,0.3); color: white; padding: 15px; border-radius: 30px; font-weight: 600; font-size: 16px; cursor: pointer;}

        /* MODALLAR GENEL */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1500; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center;}
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group input { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; font-size: 14px;}
        .btn-premium { background: var(--primary-gold); color: #000; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; border: none; cursor: pointer;}

        .glass-box { background: rgba(25, 25, 30, 0.4); backdrop-filter: blur(30px); border: var(--glass-border); border-radius: 24px; box-shadow: var(--glass-shadow); padding: 30px; width: 100%; max-width: 400px; transform: scale(0.95); transition: 0.3s ease;}
        .modal-overlay.active .glass-box { transform: scale(1); }

    </style>
</head>
<body>

    <div class="ambient-bg"><div class="ambient-blob-1"></div><div class="ambient-blob-2"></div></div>

    <header>
        <div class="logo">S<span style="color:var(--primary-gold); font-size:24px;">.</span></div>
        <div class="header-actions">
            <button class="header-icon"><span class="material-symbols-outlined">notifications</span><span class="notification-dot" id="noti-dot"></span></button>
            <button class="header-icon" onclick="openModal('messagesModal')"><span class="material-symbols-outlined">forum</span></button>
        </div>
    </header>

    <div class="stories-wrapper" id="stories-container">
        <div class="story-item" onclick="alert('Hikaye ekleme özelliği yakında!')">
            <div class="story-ring add-story"><div class="story-img" style="display:flex; justify-content:center; align-items:center;"><span class="material-symbols-outlined">add</span></div></div>
            <span class="story-name">Sen</span>
        </div>
    </div>

    <div class="swipe-container" id="swipe-container">
        <div class="empty-state" id="empty-state" style="display: none;">
            <span class="material-symbols-outlined">radar</span>
            <p>Yakınlarda başka<br>kimse kalmadı.</p>
        </div>
        </div>

    <div class="action-buttons">
        <button class="action-btn btn-dislike" onclick="buttonSwipe('left')">
            <span class="material-symbols-outlined">close</span>
        </button>
        <button class="action-btn btn-superlike" onclick="buttonSwipe('super')">
            <span class="material-symbols-outlined">star</span>
        </button>
        <button class="action-btn btn-like" onclick="buttonSwipe('right')">
            <span class="material-symbols-outlined">favorite</span>
        </button>
    </div>

    <nav class="bottom-nav">
        <button class="nav-icon-btn active-logo" onclick="window.location.reload()">S.</button>
        <button class="nav-icon-btn"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn"><span class="material-symbols-outlined">chat_bubble</span></button>
        <button class="nav-icon-btn" onclick="window.location.href='profil.html'"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="match-overlay" id="matchOverlay">
        <div class="match-title">EŞLEŞTİNİZ!</div>
        <div class="match-avatars">
            <div class="m-avatar left" id="match-my-avatar" style="background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=200');"></div>
            <div class="m-avatar right" id="match-their-avatar" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200');"></div>
        </div>
        <div style="color: white; font-size: 15px; margin-bottom: 30px;" id="match-text">Sen ve Masha birbirinizi beğendiniz.</div>
        <div class="match-btns">
            <button class="btn-msg" onclick="closeMatch()"><span class="material-symbols-outlined">send</span> Mesaj Gönder</button>
            <button class="btn-keep" onclick="closeMatch()">Kaydırmaya Devam Et</button>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="glass-box">
            <h2 style="text-align: center; margin-bottom: 20px; font-weight: 800; font-size: 26px;">Swinder<span style="color:var(--primary-gold);">.</span></h2>
            <div style="display:flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <button style="flex:1; background:none; border:none; color:var(--primary-gold); padding:10px; font-weight:bold; border-bottom: 2px solid var(--primary-gold);">Giriş</button>
            </div>
            <div class="form-group"><input type="email" id="login-email" placeholder="E-posta Adresi"></div>
            <div class="form-group"><input type="password" id="login-pass" placeholder="Şifre"></div>
            <button class="btn-premium" id="btn-login">Sisteme Gir</button>
        </div>
    </div>

    <div class="modal-overlay" id="messagesModal">
        <div class="glass-box" style="height:80vh; max-width:400px; display:flex; flex-direction:column;">
            <button class="close-btn" onclick="closeModal('messagesModal')"><span class="material-symbols-outlined">close</span></button>
            <h3 style="margin-bottom:20px; text-align:center;">Eşleşmelerin & Mesajlar</h3>
            <div style="text-align:center; color:gray; margin-top:50px;">Eşleştiğin kişiler burada görünecek.</div>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.add('active'); }
        function closeModal(id) { document.getElementById(id).classList.remove('active'); }
        
        // EŞLEŞME EKRANINI KAPAT
        function closeMatch() {
            document.getElementById('matchOverlay').classList.remove('active');
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0", authDomain: "swinder-79534.firebaseapp.com", projectId: "swinder-79534", storageBucket: "swinder-79534.firebasestorage.app", messagingSenderId: "704644873549", appId: "1:704644873549:web:d95f561ec912b94cf2cb04" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const adminEmail = "kcagatay239@gmail.com"; 

        // GİRİŞ
        document.getElementById('btn-login').addEventListener('click', async () => {
            try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); window.location.reload(); } 
            catch (err) { alert("Hata: " + err.message); }
        });

        let currentUserProfile = null;

        onAuthStateChanged(auth, async (user) => {
            if (!user) { openModal('authModal'); return; }
            closeModal('authModal');
            
            // Kendi profilimi çek (Eşleşme ekranında fotoğrafım çıksın diye)
            const snap = await getDoc(doc(db, "kullanicilar", user.uid));
            if(snap.exists()) currentUserProfile = snap.data();
            
            loadProfilesForDeck();
        });

        // 🔥 TINDER KARTLARINI VERİTABANINDAN ÇEK VE OLUŞTUR 🔥
        const swipeContainer = document.getElementById('swipe-container');
        let cards = [];

        async function loadProfilesForDeck() {
            // Önce statik/kaliteli manken/örnek profiller ekleyelim ki ilk girişte boş kalmasın
            const dummyProfiles = [
                { name: "Masha", age: 24, bio: "Moda, Seyahat ve Lüks Araçlar ✨", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=800", isVerified: true },
                { name: "Lara", age: 26, bio: "Sanat galerisi işletiyorum. Kahve?", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800", isVerified: false },
                { name: "Elena", age: 23, bio: "Sadece ciddi yatırımcılar ve vizyonerler. 📈", img: "https://images.unsplash.com/photo-1531746020798-e6953c6e8e04?w=800", isVerified: true }
            ];

            try {
                // Firebase'deki gerçek kullanıcıları da çek (Kendimiz hariç)
                const usersSnap = await getDocs(collection(db, "kullanicilar"));
                usersSnap.forEach(uDoc => {
                    const uData = uDoc.data();
                    if(uData.displayName && uData.displayName !== auth.currentUser.displayName) {
                        dummyProfiles.push({
                            name: uData.displayName,
                            age: uData.age || "25",
                            bio: uData.bio || "Swinder Premium Üyesi",
                            img: uData.avatar || "https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=800",
                            isVerified: uData.isVerified || false
                        });
                    }
                });
            } catch(e) {}

            // Kartları DOM'a bas (Ters sırayla ekliyoruz ki ilk eleman en üstte kalsın)
            dummyProfiles.reverse().forEach((profile, index) => {
                const gt = profile.isVerified ? '<span class="gold-tick">✓</span>' : '';
                const cardHTML = `
                    <div class="swipe-card" style="z-index: ${index};">
                        <div class="card-img-bg" style="background-image: url('${profile.img}');"></div>
                        <div class="card-overlay"></div>
                        <div class="swipe-stamp stamp-like">LIKE</div>
                        <div class="swipe-stamp stamp-nope">NOPE</div>
                        
                        <div class="card-info">
                            <div class="card-details">
                                <div class="card-name">${profile.name} <span class="card-age">${profile.age}</span> ${gt}</div>
                                <div class="card-bio"><span class="material-symbols-outlined" style="font-size:16px;">work</span> ${profile.bio}</div>
                            </div>
                            <button class="btn-info" onclick="alert('Instagram ızgarası yakında!')"><span class="material-symbols-outlined">arrow_upward</span></button>
                        </div>
                    </div>
                `;
                swipeContainer.insertAdjacentHTML('afterbegin', cardHTML);
            });

            initSwipeLogic();
        }

        // ========================================================
        // 🔥 JAVASCRIPT SWIPE (KAYDIRMA) MOTORU 🔥
        // ========================================================
        function initSwipeLogic() {
            cards = Array.from(document.querySelectorAll('.swipe-card'));
            if(cards.length === 0) document.getElementById('empty-state').style.display = 'flex';
            
            cards.forEach(card => {
                let isDragging = false;
                let startX = 0, currentX = 0;
                
                const likeStamp = card.querySelector('.stamp-like');
                const nopeStamp = card.querySelector('.stamp-nope');

                // Dokunma Başladı
                const startDrag = (e) => {
                    isDragging = true;
                    startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                    card.classList.add('moving');
                };

                // Kaydırılıyor
                const onDrag = (e) => {
                    if (!isDragging) return;
                    const x = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX;
                    currentX = x - startX;
                    
                    // Rotasyon matematiği (x eksenine göre hafif dönme)
                    const rotate = currentX * 0.05;
                    card.style.transform = `translateX(${currentX}px) rotate(${rotate}deg)`;

                    // Etiketlerin opaklığı (Ne kadar çekilirse o kadar belirgin)
                    if (currentX > 0) {
                        likeStamp.style.opacity = currentX / 100;
                        nopeStamp.style.opacity = 0;
                    } else {
                        nopeStamp.style.opacity = Math.abs(currentX) / 100;
                        likeStamp.style.opacity = 0;
                    }
                };

                // Bırakıldı
                const endDrag = (e) => {
                    if (!isDragging) return;
                    isDragging = false;
                    card.classList.remove('moving');

                    const threshold = 120; // Kaydırma eşiği
                    
                    if (currentX > threshold) {
                        animateOut(card, 'right');
                    } else if (currentX < -threshold) {
                        animateOut(card, 'left');
                    } else {
                        // Eşiği geçmedi, geri yaylan (Snap back)
                        card.style.transform = `translateX(0px) rotate(0deg)`;
                        likeStamp.style.opacity = 0;
                        nopeStamp.style.opacity = 0;
                    }
                    currentX = 0;
                };

                // Event Listenerlar (Mouse + Touch)
                card.addEventListener('mousedown', startDrag);
                card.addEventListener('touchstart', startDrag, {passive: true});
                
                document.addEventListener('mousemove', onDrag);
                document.addEventListener('touchmove', onDrag, {passive: false});
                
                document.addEventListener('mouseup', endDrag);
                document.addEventListener('touchend', endDrag);
            });
        }

        // KARTIN EKRANDAN UÇMA ANİMASYONU VE EŞLEŞME MANTIĞI
        function animateOut(card, direction) {
            const endX = direction === 'right' ? window.innerWidth : -window.innerWidth;
            const rotate = direction === 'right' ? 30 : -30;
            
            card.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
            card.style.transform = `translateX(${endX}px) rotate(${rotate}deg)`;
            card.style.opacity = '0';
            
            // Eğer Sağa kaydırıldıysa (LIKE) ve %30 ihtimal tutarsa MATCH (Eşleşme) ekranını aç!
            if (direction === 'right' || direction === 'super') {
                const isMatch = Math.random() < 0.3; // %30 Şans
                if (isMatch) {
                    const theirName = card.querySelector('.card-name').childNodes[0].nodeValue.trim();
                    const theirImg = card.querySelector('.card-img-bg').style.backgroundImage.slice(5, -2);
                    showMatchScreen(theirName, theirImg);
                }
            }

            setTimeout(() => {
                card.remove();
                cards = Array.from(document.querySelectorAll('.swipe-card'));
                if(cards.length === 0) document.getElementById('empty-state').style.display = 'flex';
            }, 400);
        }

        // ALttaki Butonlara Basılınca Kartı Kaydırma
        window.buttonSwipe = function(direction) {
            cards = Array.from(document.querySelectorAll('.swipe-card'));
            if(cards.length === 0) return;
            const topCard = cards[cards.length - 1]; // En üstteki (HTML'de son eklenen z-index sebebiyle)
            
            if(direction === 'right') { topCard.querySelector('.stamp-like').style.opacity = 1; animateOut(topCard, 'right'); }
            if(direction === 'left') { topCard.querySelector('.stamp-nope').style.opacity = 1; animateOut(topCard, 'left'); }
            if(direction === 'super') { topCard.querySelector('.stamp-like').style.opacity = 1; animateOut(topCard, 'super'); }
        }

        // EŞLEŞME (IT'S A MATCH) EKRANINI GÖSTER
        function showMatchScreen(theirName, theirImg) {
            const myAvatar = currentUserProfile?.avatar || "https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=200";
            document.getElementById('match-my-avatar').style.backgroundImage = `url('${myAvatar}')`;
            document.getElementById('match-their-avatar').style.backgroundImage = `url('${theirImg}')`;
            document.getElementById('match-text').innerHTML = `Sen ve <strong>${theirName}</strong> birbirinizi beğendiniz.`;
            
            document.getElementById('matchOverlay').classList.add('active');
        }

    </script>
</body>
</html>
