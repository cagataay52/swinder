<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Swinder - Lüks Arkadaşlık & Sosyal Ağ</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

    <style>
        /* --- TEMEL & GLASSMORPHISM --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; touch-action: pan-y; }
        :root { 
            --primary-gold: #d4af37; --gold-hover: #f3e5ab; 
            --text-light: #f5f5f7; --text-muted: rgba(255,255,255,0.6); 
            --glass-bg: rgba(20, 20, 25, 0.45); --glass-border: 1px solid rgba(255, 255, 255, 0.08); --glass-blur: blur(24px); --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        body { background: #050505; color: var(--text-light); overflow: hidden; }

        /* AMBİANS IŞIKLARI */
        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .ambient-blob-1 { position: absolute; top: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float1 20s infinite alternate ease-in-out; }
        .ambient-blob-2 { position: absolute; bottom: 10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(255,48,64,0.1) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float2 25s infinite alternate ease-in-out; }
        @keyframes float1 { 100% { transform: translate(10vw, 10vh); } }
        @keyframes float2 { 100% { transform: translate(-10vw, -10vh); } }

        /* YENİ ÜST MENÜ (Instagram Tarzı) */
        header { position: fixed; top: 0; left: 0; width: 100%; padding: 10px 20px; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; background: rgba(10, 10, 12, 0.6); backdrop-filter: var(--glass-blur); -webkit-backdrop-filter: var(--glass-blur); z-index: 100; border-bottom: var(--glass-border); }
        .header-left { display: flex; justify-content: flex-start; }
        .header-right { display: flex; justify-content: flex-end; position: relative;}
        
        .logo { font-family: 'Grand Hotel', cursive; font-size: 36px; color: var(--text-light); text-decoration: none; text-shadow: 0 2px 10px rgba(255,255,255,0.2); justify-self: center; letter-spacing: 1px;}
        
        .header-icon { color: var(--text-light); font-size: 28px; cursor: pointer; transition: 0.3s; background: none; border: none; position: relative; display: flex; align-items: center;}
        .header-icon:hover { color: var(--primary-gold); transform: scale(1.1);}
        .notification-dot { position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: #ff3040; border-radius: 50%; display: none; box-shadow: 0 0 8px rgba(255,48,64,0.8);}

        /* HİKAYELER */
        .stories-wrapper { position: absolute; top: 65px; left: 0; width: 100%; padding: 10px 5%; display: flex; gap: 15px; overflow-x: auto; scroll-behavior: smooth; z-index: 50; }
        .stories-wrapper::-webkit-scrollbar { display: none; }
        .story-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; flex-shrink: 0; }
        .story-ring { width: 65px; height: 65px; border-radius: 50%; padding: 2px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); display: flex; justify-content: center; align-items: center; box-shadow: 0 2px 10px rgba(212,175,55,0.3); }
        .story-img { width: 100%; height: 100%; border-radius: 50%; border: 2px solid #0a0a0c; background-size: cover; background-position: center; }
        .story-name { font-size: 11px; color: var(--text-light); font-weight: 500;}

        /* SWIPE (TİNDER) KARTLARI */
        .swipe-container { position: absolute; top: 165px; bottom: 150px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 400px; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        .swipe-card { position: absolute; width: 92%; height: 95%; background: var(--glass-bg); backdrop-filter: blur(30px); border: var(--glass-border); border-radius: 24px; box-shadow: var(--glass-shadow); overflow: hidden; display: flex; flex-direction: column; justify-content: flex-end; transform-origin: 50% 100%; transition: transform 0.3s ease, opacity 0.3s ease; cursor: grab; z-index: 1; user-select: none;}
        .swipe-card.moving { transition: none; cursor: grabbing; }
        .card-img-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: -1; }
        .card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 40%, transparent 100%); z-index: 0; }
        
        .swipe-stamp { position: absolute; top: 40px; padding: 5px 15px; border-radius: 10px; font-weight: 800; font-size: 32px; text-transform: uppercase; letter-spacing: 2px; opacity: 0; z-index: 10; border: 4px solid; }
        .stamp-like { right: 30px; color: #2ecc71; border-color: #2ecc71; transform: rotate(15deg); }
        .stamp-nope { left: 30px; color: #ff4757; border-color: #ff4757; transform: rotate(-15deg); }

        .card-info { position: relative; z-index: 2; padding: 20px; width: 100%; display: flex; justify-content: space-between; align-items: flex-end;}
        .card-name { font-size: 28px; font-weight: 700; color: white; display: flex; align-items: center; gap: 8px; text-shadow: 0 2px 10px rgba(0,0,0,0.8);}
        .card-age { font-weight: 400; font-size: 24px; opacity: 0.9;}
        .card-bio { font-size: 15px; color: rgba(255,255,255,0.8); margin-top: 5px; display: flex; align-items: center; gap: 5px; text-shadow: 0 1px 5px rgba(0,0,0,0.8);}
        .gold-tick { width: 14px; height: 14px; background: var(--primary-gold); border-radius: 50%; color: #000; font-size: 10px; font-weight: bold; display: flex; justify-content: center; align-items: center;}
        .btn-info { width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.2); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; border: var(--glass-border); color: white; cursor: pointer; transition: 0.2s;}
        .btn-info:hover { transform: scale(1.1); background: var(--primary-gold); color: black;}

        .empty-state { position: absolute; text-align: center; color: var(--text-muted); font-size: 18px; display: flex; flex-direction: column; align-items: center; gap: 15px; z-index: 0;}
        .empty-state .material-symbols-outlined { font-size: 60px; color: var(--primary-gold); animation: pulse 2s infinite alternate;}
        @keyframes pulse { 0% { transform: scale(1); opacity:0.6;} 100% { transform: scale(1.1); opacity:1;} }

        /* AKSİYON BUTONLARI (Tinder Butonları) */
        .action-buttons { position: absolute; bottom: 85px; left: 50%; transform: translateX(-50%); width: 100%; max-width: 350px; display: flex; justify-content: space-evenly; align-items: center; z-index: 90; padding: 0 20px;}
        .action-btn { width: 65px; height: 65px; border-radius: 50%; background: rgba(20,20,25,0.6); backdrop-filter: blur(20px); border: var(--glass-border); display: flex; justify-content: center; align-items: center; cursor: pointer; box-shadow: 0 10px 25px rgba(0,0,0,0.4); transition: 0.2s;}
        .action-btn:hover { transform: scale(1.1); }
        .btn-dislike { color: #ff4757; } .btn-dislike .material-symbols-outlined { font-size: 34px; font-weight: 600;}
        .btn-superlike { width: 50px; height: 50px; color: #3498db; } .btn-superlike .material-symbols-outlined { font-size: 28px; font-variation-settings: 'FILL' 1;}
        .btn-like { color: #2ecc71; } .btn-like .material-symbols-outlined { font-size: 34px; font-weight: 600; font-variation-settings: 'FILL' 1;}

        /* YENİ STANDART ALT MENÜ */
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: 12px 10px calc(12px + env(safe-area-inset-bottom)); border-top: var(--glass-border); z-index: 999; box-shadow: 0 -5px 25px rgba(0,0,0,0.5);}
        .nav-icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn .material-symbols-outlined { font-size: 30px; transition: 0.2s;}
        .nav-icon-btn.active { color: var(--text-light); font-variation-settings: 'FILL' 1; filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));}
        .nav-icon-btn.add-btn { background: var(--text-light); color: var(--bg-dark); width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(255,255,255,0.2);}
        .nav-icon-btn.add-btn .material-symbols-outlined { font-size: 26px; font-weight: 600; color: #000;}

        /* MODALLAR VE CAM KUTULAR */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1500; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: var(--glass-border); color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center;}
        .close-btn:hover { background: var(--primary-gold); color: black;}
        
        .glass-box { background: rgba(25, 25, 30, 0.4); backdrop-filter: blur(30px); border: var(--glass-border); border-radius: 24px; box-shadow: var(--glass-shadow); padding: 30px; width: 100%; max-width: 400px; transform: scale(0.95); transition: 0.3s ease; display: flex; flex-direction: column;}
        .modal-overlay.active .glass-box { transform: scale(1); }

        .form-group { margin-bottom: 15px; text-align: left; width: 100%;}
        .form-group label { display: block; margin-bottom: 5px; font-size: 13px; color: var(--text-light); padding-left: 5px;}
        .form-group input, .form-group textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; font-size: 14px; font-family: inherit;}
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-gold); }
        .btn-premium { background: var(--primary-gold); color: #000; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; border: none; cursor: pointer; font-size: 15px; transition: 0.3s;}
        .btn-premium:hover { background: var(--gold-hover); transform: translateY(-2px);}

        /* EŞLEŞME (MATCH) */
        .match-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.5s ease;}
        .match-overlay.active { opacity: 1; visibility: visible; }
        .match-title { font-family: 'Grand Hotel', cursive; font-size: 60px; color: var(--primary-gold); text-shadow: 0 0 20px rgba(212,175,55,0.8); margin-bottom: 40px; transform: scale(0.5); opacity: 0; transition: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .match-overlay.active .match-title { transform: scale(1); opacity: 1; }
        .match-avatars { display: flex; gap: 20px; margin-bottom: 40px; }
        .m-avatar { width: 120px; height: 120px; border-radius: 50%; border: 4px solid var(--primary-gold); background-size: cover; background-position: center; box-shadow: 0 0 30px rgba(212,175,55,0.5); transform: translateX(100px); opacity: 0; transition: 0.6s ease; }
        .m-avatar.left { transform: translateX(-100px); }
        .match-overlay.active .m-avatar { transform: translateX(0); opacity: 1; }
        .btn-msg { background: linear-gradient(135deg, #d4af37, #aa8529); color: black; padding: 15px 30px; border-radius: 30px; font-weight: 700; border: none; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 8px; margin-bottom: 15px; width: 250px; justify-content: center;}
        .btn-keep { background: transparent; border: 2px solid rgba(255,255,255,0.3); color: white; padding: 15px 30px; border-radius: 30px; font-weight: 600; font-size: 16px; cursor: pointer; width: 250px;}

        /* ARAMA & REELS & DİĞER EKRANLAR (Aşağıdan açılan) */
        .bottom-sheet { background: var(--bg-dark); width: 100%; height: 85vh; border-radius: 24px 24px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 1, 0.3, 1); display: flex; flex-direction: column; }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        
        .sheet-header { padding: 20px; border-bottom: var(--glass-border); display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 600;}
        .search-input { flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 14px;}
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex: 1; }
        .grid-item { aspect-ratio: 1 / 1; background-size: cover; background-position: center; cursor: pointer; }

        /* REELS TAM EKRAN */
        .reels-box { background: #000; width: 100%; height: 100dvh; max-width: 450px; position: relative; transform: translateY(100%); transition: 0.4s cubic-bezier(0.1, 1, 0.3, 1); overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reels-box::-webkit-scrollbar { display: none; }
        .modal-overlay.active .reels-box { transform: translateY(0); }
        .reel-item { width: 100%; height: 100dvh; scroll-snap-align: start; background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; padding-bottom: 90px; }
        .reel-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, transparent 40%, rgba(0,0,0,0.2) 100%); pointer-events: none;}
        .reel-content { position: relative; z-index: 2; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .reel-info { flex: 1; padding-right: 15px; }
        .reel-user { display: flex; align-items: center; gap: 10px; color: white; font-weight: 600; font-size: 15px; margin-bottom: 12px;}
        .reel-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center;}
        .btn-follow-reel { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.5); color: white; padding: 4px 14px; border-radius: 20px; font-size: 12px; margin-left: 5px; cursor: pointer; font-weight: 600;}
        .reel-caption { color: rgba(255,255,255,0.9); font-size: 14px; line-height: 1.5; margin-bottom: 12px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .reel-actions { display: flex; flex-direction: column; gap: 20px; align-items: center; padding-bottom: 15px;}
        .reel-action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));}
        .reel-action-btn .material-symbols-outlined { font-size: 34px; transition: 0.2s;}
        .reel-action-btn.liked .material-symbols-outlined { color: #ff3040; font-variation-settings: 'FILL' 1; }

        /* HİKAYE İZLEME (STORY VIEW) */
        .story-view-box { background: #000; width: 100%; max-width: 450px; height: 85vh; border-radius: 24px; position: relative; overflow: hidden; transform: scale(0.95); transition: 0.3s ease; display: flex; flex-direction: column; }
        .modal-overlay.active .story-view-box { transform: scale(1); }
        .story-view-img { width: 100%; flex: 1; background-size: cover; background-position: center; }
        .story-view-header { position: absolute; top: 0; left: 0; width: 100%; padding: 20px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); display: flex; align-items: center; gap: 12px; z-index: 2; }
        .story-view-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center; }
        .story-view-username { color: #fff; font-weight: 600; font-size: 15px; display: flex; align-items: center;}

        /* KULLANICI PROFİLİ GÖRÜNTÜLEME MODALI */
        .user-profile-header { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05);}
        .up-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center; flex-shrink: 0;}
        .up-info { flex: 1;}
        .up-name { font-size: 20px; font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 5px;}
        .up-bio { font-size: 13px; color: var(--text-muted); line-height: 1.4;}

        /* BİLDİRİM & MESAJ LİSTELERİ */
        .list-item { display: flex; align-items: center; gap: 15px; padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: 0.2s;}
        .list-item:hover { background: rgba(255,255,255,0.05); }
        .list-avatar { width: 48px; height: 48px; border-radius: 50%; background: #222; background-size: cover; background-position: center; flex-shrink: 0;}
        .list-text { flex: 1; font-size: 14px; line-height: 1.4;}
        .list-text strong { color: var(--text-light); }

        @media (max-width: 768px) {
            .bottom-sheet { height: 90vh; border-radius: 20px 20px 0 0; }
            .reels-box { height: 100dvh; max-width: 100%; border-radius: 0; }
            .modal-overlay { padding: 0; align-items: flex-end;}
            .glass-box { margin: 0; max-width: 100%; border-radius: 25px 25px 0 0; transform: translateY(100%); border-bottom: none;}
            .modal-overlay.active .glass-box { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"><div class="ambient-blob-1"></div><div class="ambient-blob-2"></div></div>

    <header>
        <div class="header-left">
            <button class="header-icon" onclick="openMessages()"><span class="material-symbols-outlined">send</span></button>
        </div>
        <a href="index.html" class="logo">Swinder</a>
        <div class="header-right">
            <button class="header-icon" onclick="openNotifications()">
                <span class="material-symbols-outlined">favorite</span>
                <span class="notification-dot" id="noti-dot"></span>
            </button>
        </div>
    </header>

    <div class="stories-wrapper" id="stories-container">
        </div>

    <div class="swipe-container" id="swipe-container">
        <div class="empty-state" id="empty-state" style="display: none;">
            <span class="material-symbols-outlined">radar</span>
            <p>Yakınlarda başka<br>kimse kalmadı.</p>
        </div>
    </div>

    <div class="action-buttons">
        <button class="action-btn btn-dislike" onclick="buttonSwipe('left')"><span class="material-symbols-outlined">close</span></button>
        <button class="action-btn btn-superlike" onclick="buttonSwipe('super')"><span class="material-symbols-outlined">star</span></button>
        <button class="action-btn btn-like" onclick="buttonSwipe('right')"><span class="material-symbols-outlined">favorite</span></button>
    </div>

    <nav class="bottom-nav">
        <button class="nav-icon-btn active" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn" onclick="openExplore()"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn add-btn" onclick="openModal('addModal')"><span class="material-symbols-outlined">add</span></button>
        <button class="nav-icon-btn" onclick="openReels()"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn" id="mobile-profile-btn" onclick="openAuthModal('login')"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="authModal">
        <div class="glass-box">
            <button class="close-btn" onclick="closeModal('authModal')"><span class="material-symbols-outlined">close</span></button>
            <h2 style="text-align: center; margin-bottom: 25px; font-family: 'Grand Hotel', cursive; font-size: 40px; color: var(--text-light); font-weight: normal;">Swinder</h2>
            <div style="display:flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                <button style="flex:1; background:none; border:none; color:var(--primary-gold); padding:10px; font-weight:bold; border-bottom: 2px solid var(--primary-gold);">Giriş Yap</button>
            </div>
            <div class="form-group"><input type="email" id="login-email" placeholder="E-posta Adresi"></div>
            <div class="form-group"><input type="password" id="login-pass" placeholder="Şifre"></div>
            <button class="btn-premium" id="btn-login">Sisteme Gir</button>
        </div>
    </div>

    <div class="modal-overlay" id="messagesModal">
        <div class="bottom-sheet">
            <div class="sheet-header">
                <button class="header-icon" onclick="closeModal('messagesModal')"><span class="material-symbols-outlined">arrow_back</span></button>
                Mesajlar
            </div>
            <div style="flex:1; overflow-y:auto;" id="dm-list">
                <div class="list-item" onclick="customAlert('Bu bir sistem mesajıdır.')">
                    <div class="list-avatar" style="background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100'); border: 2px solid var(--primary-gold);"></div>
                    <div class="list-text"><strong>Swinder Concierge</strong> <span class="gold-tick" style="display:inline-flex;">✓</span><br><span style="color: gray; font-size: 12px;">Swinder 2.0'a hoş geldin! ✨</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="notificationsModal">
        <div class="bottom-sheet">
            <div class="sheet-header">
                <button class="header-icon" onclick="closeModal('notificationsModal')"><span class="material-symbols-outlined">arrow_back</span></button>
                Bildirimler
            </div>
            <div style="flex:1; overflow-y:auto;" id="noti-list">
                <div style="text-align:center; padding:40px; color:gray;">Bildirimler yükleniyor...</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="exploreModal">
        <div class="bottom-sheet">
            <div class="sheet-header" style="gap:10px;">
                <button class="header-icon" onclick="closeModal('exploreModal')"><span class="material-symbols-outlined">arrow_back</span></button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

        const firebaseConfig = { apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0", authDomain: "swinder-79534.firebaseapp.com", projectId: "swinder-79534", storageBucket: "swinder-79534.firebasestorage.app", messagingSenderId: "704644873549", appId: "1:704644873549:web:d95f561ec912b94cf2cb04" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const adminEmail = "kcagatay239@gmail.com"; 
        window.globalPosts = []; window.globalUsers = {};
        let currentUserProfile = null;

        // AUTH
        document.getElementById('btn-login').addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); window.location.reload(); } catch (err) { alert(err.message); }});
        
        onAuthStateChanged(auth, async (user) => {
            const btn = document.getElementById('mobile-profile-btn'); 
            if (user) {
                await setDoc(doc(db, "kullanicilar", user.uid), { displayName: user.displayName, email: user.email }, { merge: true });
                btn.onclick = () => window.location.href = "profil.html";
                
                const snap = await getDoc(doc(db, "kullanicilar", user.uid));
                if(snap.exists()) {
                    currentUserProfile = snap.data();

                }

        async function loadAllData() {

        // 🔥 HİKAYELERİ ÇEK VE DİZ 🔥
        async function loadStories() {
            const stContainer = document.getElementById('stories-container');
            stContainer.innerHTML = `<div class="story-item" onclick="openModal('addStoryModal')"><div class="story-ring add-story"><div class="story-img" style="display:flex; justify-content:center; align-items:center; color: var(--text-muted);"><span class="material-symbols-outlined">add</span></div></div><span class="story-name">Sen</span></div>`;
            try {
                const snapshot = await getDocs(query(collection(db, "hikayeler"), orderBy("createdAt", "desc")));

                    <div class="story-item" onclick="viewStory('${doc.id}', '${data.imageUrl}', '${data.username}', '${sAvatar}')">
                        <div class="story-ring"><div class="story-img" style="background-image: url('${data.imageUrl}');"></div></div>
                        <span class="story-name">${data.username.split(' ')[0]}</span>
                    </div>`);
                });
            } catch(e){}
        }

        window.viewStory = function(id, imgUrl, username, avatarUrl) {
            document.getElementById('view-story-img').style.backgroundImage = `url('${imgUrl}')`;

        document.getElementById('btn-submit-story').addEventListener('click', async () => {
            const user = auth.currentUser; if (!user) return openModal('authModal');

        // 🔥 GÖNDERİ PAYLAŞ (+) 🔥
        document.getElementById('btn-submit-post').addEventListener('click', async () => {
            const user = auth.currentUser; if (!user) { openModal('authModal'); return; }

            if (!imageUrl) return; document.getElementById('btn-submit-post').innerText = "Paylaşılıyor...";
            try { await addDoc(collection(db, "gonderiler"), { imageUrl, caption, username: user.displayName, likesCount: 0, likedBy: [], createdAt: new Date() }); closeModal('addModal'); document.getElementById('add-image').value = ''; document.getElementById('add-caption').value=''; await loadAllData(); } 
            catch (err) {} finally { document.getElementById('btn-submit-post').innerText = "Akışta Paylaş"; }
        });

        // 🔥 TINDER KARTLARI 🔥
        const swipeContainer = document.getElementById('swipe-container');
        let cards = [];

        function loadProfilesForDeck() {
            const dummyProfiles = [
                { username: "Masha", age: 24, bio: "Moda, Seyahat ve Lüks Araçlar ✨", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=800", isVerified: true },
                { username: "Lara", age: 26, bio: "Sanat galerisi işletiyorum. Kahve?", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=800", isVerified: false }
            ];

            Object.values(window.globalUsers).forEach(u => {
                if(u.displayName && (!auth.currentUser || u.displayName !== auth.currentUser.displayName)) {
                    dummyProfiles.push({
                        username: u.displayName, age: u.age || "25", bio: u.bio || "Swinder Üyesi", img: u.avatar || "https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=800",
                        isVerified: u.isVerified || u.displayName.toLowerCase().includes('çağatay')
                    });
                }
            });

            dummyProfiles.reverse().forEach((profile, index) => {
                const gt = profile.isVerified ? '<span class="gold-tick">✓</span>' : '';
                const cardHTML = `
                    <div class="swipe-card" style="z-index: ${index};">
                        <div class="card-img-bg" style="background-image: url('${profile.img}');"></div>
                        <div class="card-overlay"></div>
                        <div class="swipe-stamp stamp-like">LIKE</div><div class="swipe-stamp stamp-nope">NOPE</div>
                        <div class="card-info">
                            <div class="card-details">
                                <div class="card-name">${profile.username} <span class="card-age">${profile.age}</span> ${gt}</div>
                                <div class="card-bio">${profile.bio}</div>
                            </div>
                            <button class="btn-info" onclick="openUserProfile('${profile.username}')"><span class="material-symbols-outlined">arrow_upward</span></button>
                        </div>
                    </div>`;
                swipeContainer.insertAdjacentHTML('afterbegin', cardHTML);
            });
            initSwipeLogic();
        }

        function initSwipeLogic() {
            cards = Array.from(document.querySelectorAll('.swipe-card'));
            if(cards.length === 0) document.getElementById('empty-state').style.display = 'flex';
            cards.forEach(card => {
                let isDragging = false; let startX = 0, currentX = 0;
                const likeStamp = card.querySelector('.stamp-like'); const nopeStamp = card.querySelector('.stamp-nope');

                const startDrag = (e) => { isDragging = true; startX = e.type.includes('mouse') ? e.pageX : e.touches[0].clientX; card.classList.add('moving'); };
                const onDrag = (e) => {
                    if (!isDragging) return;
                    currentX = (e.type.includes('mouse') ? e.pageX : e.touches[0].clientX) - startX;
                    card.style.transform = `translateX(${currentX}px) rotate(${currentX * 0.05}deg)`;
                    if (currentX > 0) { likeStamp.style.opacity = currentX / 100; nopeStamp.style.opacity = 0; } 
                    else { nopeStamp.style.opacity = Math.abs(currentX) / 100; likeStamp.style.opacity = 0; }
                };
                const endDrag = (e) => {
                    if (!isDragging) return;
                    isDragging = false; card.classList.remove('moving');
                    if (currentX > 120) animateOut(card, 'right');
                    else if (currentX < -120) animateOut(card, 'left');
                    else { card.style.transform = `translateX(0px) rotate(0deg)`; likeStamp.style.opacity = 0; nopeStamp.style.opacity = 0; }
                    currentX = 0;
                };

                card.addEventListener('mousedown', startDrag); card.addEventListener('touchstart', startDrag, {passive: true});
                document.addEventListener('mousemove', onDrag); document.addEventListener('touchmove', onDrag, {passive: false});
                document.addEventListener('mouseup', endDrag); document.addEventListener('touchend', endDrag);
            });
        }

        function animateOut(card, direction) {
            const endX = direction === 'right' ? window.innerWidth : -window.innerWidth;
            card.style.transition = 'transform 0.4s ease-out, opacity 0.4s ease-out';
            card.style.transform = `translateX(${endX}px) rotate(${direction === 'right' ? 30 : -30}deg)`;
            card.style.opacity = '0';
            
            if (direction === 'right' || direction === 'super') {
                if (Math.random() < 0.3) { 
                    const tName = card.querySelector('.card-name').childNodes[0].nodeValue.trim();
                    const tImg = card.querySelector('.card-img-bg').style.backgroundImage.slice(5, -2);
                    showMatchScreen(tName, tImg);
                }
            }
            setTimeout(() => { card.remove(); cards = Array.from(document.querySelectorAll('.swipe-card')); if(cards.length === 0) document.getElementById('empty-state').style.display = 'flex'; }, 400);
        }

        window.buttonSwipe = function(direction) {
            cards = Array.from(document.querySelectorAll('.swipe-card')); if(cards.length === 0) return;
            const topCard = cards[cards.length - 1]; 
            if(direction === 'right') { topCard.querySelector('.stamp-like').style.opacity = 1; animateOut(topCard, 'right'); }
            if(direction === 'left') { topCard.querySelector('.stamp-nope').style.opacity = 1; animateOut(topCard, 'left'); }
            if(direction === 'super') { topCard.querySelector('.stamp-like').style.opacity = 1; animateOut(topCard, 'super'); }
        }

        function showMatchScreen(theirName, theirImg) {
            const myAvatar = currentUserProfile?.avatar || "https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=200";

            document.getElementById('matchOverlay').classList.add('active');
        }

        // 🔥 KULLANICI PROFİLİ GÖRÜNTÜLEME 🔥
        window.openUserProfile = function(username) {
            const pInfo = window.globalUsers[username] || {};
            const isV = pInfo.isVerified || username.toLowerCase().includes('çağatay');

            document.getElementById('up-avatar').style.backgroundImage = pInfo.avatar ? `url('${pInfo.avatar}')` : `url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=200')`;
            
            const upGrid = document.getElementById('up-grid'); upGrid.innerHTML = '';
            const userPosts = window.globalPosts.filter(p => p.username === username);

        }

        // BİLDİRİM VE MESAJLAR
        window.loadNotifications = async function() {
            const user = auth.currentUser; if(!user) return;
            const list = document.getElementById('noti-list');
            const snap = await getDocs(query(collection(db, "bildirimler"), where("to", "==", user.displayName)));

            let notis = []; snap.forEach(d => notis.push(d.data())); notis.sort((a,b) => b.createdAt.seconds - a.createdAt.seconds);

                const avatar = window.globalUsers[data.from]?.avatar || '';

            Object.values(window.globalUsers).forEach(u => {

        // KEŞFET & REELS
        window.renderExploreGrid = function(filterText = "") {
            const grid = document.getElementById('explore-grid'); grid.innerHTML = '';
            const cName = auth.currentUser ? auth.currentUser.displayName : "";

            if(filterText) filtered = filtered.filter(p => (p.caption||'').toLowerCase().includes(filterText.toLowerCase()) || (p.username||'').toLowerCase().includes(filterText.toLowerCase()));
            if(filtered.length === 0) { grid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: gray; padding: 40px; font-size: 13px;">Sonuç bulunamadı.</div>'; return;}

        window.renderReels = function() {

                        </div>

        window.toggleLikeDB = async function(btn, postId, owner) {
            const user = auth.currentUser; if(!user) return openModal('authModal');
            const isLiked = btn.classList.contains('liked'); const ref = doc(db, "gonderiler", postId);
            const countSpan = document.getElementById(`like-count-${postId}`); let count = parseInt(countSpan.innerText);
            if(isLiked) { btn.classList.remove('liked'); countSpan.innerText = count - 1; await updateDoc(ref, { likedBy: arrayRemove(user.displayName), likesCount: count - 1 }); } 
            else { btn.classList.add('liked'); countSpan.innerText = count + 1; await updateDoc(ref, { likedBy: arrayUnion(user.displayName), likesCount: count + 1 }); if(user.displayName !== owner) await addDoc(collection(db, "bildirimler"), { to: owner, from: user.displayName, text: 'gönderini beğendi.', createdAt: new Date() }); }
        }
    </script>
</body>
</html>
