<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profilim - Swinder</title>
    
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --bg-dark: #0a0a0c; --surface: #1a1a1f; --primary-gold: #d4af37; --gold-hover: #f3e5ab; --text-light: #f5f5f7; --text-muted: #8e8e93; --glass-bg: rgba(26, 26, 31, 0.85); }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; padding-bottom: 70px; } /* Alt menü boşluğu */

        /* ÜST MENÜ (Sadece Kullanıcı Adı ve Ayarlar) */
        header { position: sticky; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--bg-dark); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .header-username { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 5px; color: var(--text-light); }
        .gold-tick { width: 14px; height: 14px; background: var(--primary-gold); border-radius: 50%; color: #000; font-size: 10px; font-weight: bold; display: none; justify-content: center; align-items: center;}
        .header-icon { color: var(--text-light); font-size: 28px; cursor: pointer; background: none; border: none; }

        .profile-container { max-width: 600px; margin: 0 auto; padding: 20px 0; }

        /* INSTAGRAM TARZI PROFIL ÜSTÜ */
        .profile-header-top { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 15px; }
        
        .profile-avatar-container { position: relative; }
        .profile-ring { width: 85px; height: 85px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--bg-dark); background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=400&q=80'); background-size: cover; background-position: center; }
        
        .profile-stats { display: flex; gap: 20px; flex: 1; justify-content: space-evenly; margin-left: 20px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 13px; }
        .stat-item span { font-weight: 700; font-size: 18px; margin-bottom: 2px; }

        .profile-bio { padding: 0 20px; font-size: 14px; line-height: 1.4; color: var(--text-light); margin-bottom: 15px; }
        .bio-name { font-weight: 600; margin-bottom: 2px; color: var(--text-light); }
        .bio-category { color: var(--text-muted); font-size: 13px; margin-bottom: 2px; }
        .bio-link { color: #e0f2fe; text-decoration: none; font-weight: 500; font-size: 13px; display: inline-block; margin-top: 3px;}

        .profile-actions { padding: 0 20px; margin-bottom: 20px; }
        .btn-edit { background: var(--surface); border: 1px solid rgba(255,255,255,0.1); color: var(--text-light); padding: 8px 0; border-radius: 8px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; }
        .btn-edit:hover { background: rgba(255,255,255,0.1); }

        /* SEKMELER */
        .profile-tabs { display: flex; justify-content: space-around; border-top: 1px solid rgba(255,255,255,0.1); }
        .tab-item { flex: 1; text-align: center; padding: 12px 0; color: var(--text-muted); cursor: pointer; transition: 0.3s; border-bottom: 2px solid transparent; display: flex; justify-content: center;}
        .tab-item.active { color: var(--text-light); border-bottom: 2px solid var(--text-light); }

        /* GRID (IZGARA) GÖNDERİLER */
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { position: relative; aspect-ratio: 1 / 1; background-size: cover; background-position: center; cursor: pointer; }
        
        /* ALT MENÜ */
        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.95); backdrop-filter: blur(15px); padding: 10px 10px calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.05); z-index: 999; }
        .nav-icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn .material-symbols-outlined { font-size: 28px; }
        .nav-icon-btn.active { color: var(--text-light); font-variation-settings: 'FILL' 1; }
        .nav-icon-btn.add-btn { background: var(--text-light); color: var(--bg-dark); width: 40px; height: 40px; border-radius: 12px; display: flex; justify-content: center; align-items: center; }
        .nav-icon-btn.add-btn .material-symbols-outlined { font-size: 24px; font-weight: 600; }

        /* MODALLAR */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); border: none; color: white; font-size: 20px; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; z-index: 20;}
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 13px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; transition: 0.3s; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-gold); }
        .btn-premium { background: var(--primary-gold); color: #000; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; border: none;}
        .btn-delete { background: rgba(255,71,87,0.1); border: 1px solid #ff4757; color: #ff4757; padding: 12px; border-radius: 10px; cursor: pointer; width: 100%; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 600;}

        .edit-box { background: var(--surface); padding: 30px 20px; border-radius: 20px; width: 100%; max-width: 500px; position: relative; transform: scale(0.95); transition: 0.3s ease; }
        .post-detail-box { background: var(--bg-dark); width: 100%; max-width: 450px; border-radius: 20px; overflow: hidden; transform: scale(0.95); transition: 0.3s ease; display: flex; flex-direction: column; max-height: 90vh;}
        .modal-overlay.active .edit-box, .modal-overlay.active .post-detail-box { transform: scale(1); }
        
        .post-detail-img { width: 100%; aspect-ratio: 4/5; background-size: cover; background-position: center; }
        .post-detail-info { padding: 20px; overflow-y: auto; }
        .post-detail-caption { font-size: 14px; color: var(--text-light); margin-bottom: 20px; line-height: 1.4; }

        @media (max-width: 768px) {
            .modal-overlay { padding: 0; align-items: flex-end; }
            .edit-box, .post-detail-box { border-radius: 25px 25px 0 0; transform: translateY(100%); margin: 0; border: none; border-top: 1px solid rgba(255,255,255,0.1); }
            .modal-overlay.active .edit-box, .modal-overlay.active .post-detail-box { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-username">
            <span id="header-username-text">Yükleniyor...</span>
            <span class="gold-tick" id="gold-tick">✓</span>
        </div>
        <button class="header-icon"><span class="material-symbols-outlined">menu</span></button>
    </header>

    <main class="profile-container">
        <div class="profile-header-top">
            <div class="profile-avatar-container">
                <div class="profile-ring"><div class="profile-avatar" id="display-avatar"></div></div>
            </div>
            <div class="profile-stats">
                <div class="stat-item"><span id="post-count">0</span>Gönderi</div>
                <div class="stat-item"><span>12.4B</span>Takipçi</div>
                <div class="stat-item"><span>45</span>Takip</div>
            </div>
        </div>

        <div class="profile-bio">
            <div class="bio-name" id="display-name">-</div>
            <div class="bio-category" id="role-text">Otomotiv • Lüks Yaşam</div>
            <div id="bio-text">Lüks araç ve yaşam tarzı.</div>
            <a href="#" id="bio-link" class="bio-link" target="_blank"></a>
        </div>

        <div class="profile-actions">
            <button class="btn-edit" onclick="openProfileEditModal()">Profili Düzenle</button>
        </div>

        <div class="profile-tabs">
            <div class="tab-item active" id="tab-my" onclick="switchTab('my')"><span class="material-symbols-outlined">grid_on</span></div>
            <div class="tab-item" id="tab-admin" style="display: none;" onclick="switchTab('all')"><span class="material-symbols-outlined">admin_panel_settings</span></div>
        </div>

        <div class="profile-grid" id="my-posts">
            </div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-icon-btn" onclick="window.location.href='index.html'"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn add-btn" onclick="window.location.href='index.html'"><span class="material-symbols-outlined">add</span></button>
        <button class="nav-icon-btn"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn active"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="postDetailModal">
        <div class="post-detail-box">
            <button class="close-btn" onclick="closePostDetailModal()"><span class="material-symbols-outlined">close</span></button>
            <div class="post-detail-img" id="modalPostImg"></div>
            <div class="post-detail-info">
                <div class="post-detail-caption" id="modalPostCaption">-</div>
                <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px;"><span id="modalPostLikes">0</span> beğenme</div>
                
                <div id="admin-controls" style="display: none;">
                    <button id="btn-delete-post" class="btn-delete"><span class="material-symbols-outlined">delete</span> Gönderiyi Sil</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileEditModal">
        <div class="edit-box">
            <button class="close-btn" onclick="closeProfileEditModal()"><span class="material-symbols-outlined">close</span></button>
            <h2 style="color: var(--text-light); font-weight: 600; margin-bottom: 20px; text-align: center; font-size: 16px;">Profili Düzenle</h2>
            <div class="form-group"><label>Profil Fotoğrafı (URL)</label><input type="text" id="edit-avatar"></div>
            <div class="form-group"><label>Biyografi</label><textarea id="edit-bio" rows="3"></textarea></div>
            <div class="form-group"><label>Web Sitesi</label><input type="text" id="edit-website"></div>
            <button class="btn-premium" id="btn-save-profile" style="margin-top: 10px;">Kaydet</button>
        </div>
    </div>

    <script>
        function openProfileEditModal() { document.getElementById('profileEditModal').classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeProfileEditModal() { document.getElementById('profileEditModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        function closePostDetailModal() { document.getElementById('postDetailModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        document.querySelectorAll('.modal-overlay').forEach(modal => { modal.addEventListener('click', (e) => { if(e.target === modal) { modal.classList.remove('active'); document.body.style.overflow = 'auto'; }}); });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0",
            authDomain: "swinder-79534.firebaseapp.com",
            projectId: "swinder-79534",
            storageBucket: "swinder-79534.firebasestorage.app",
            messagingSenderId: "704644873549",
            appId: "1:704644873549:web:d95f561ec912b94cf2cb04"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;
        let isAdmin = false; 
        let currentTab = 'my';
        let activePostId = null;

        // =================================================================
        // DİKKAT: BURAYA KENDİ E-POSTANI YAZ! (Admin yetkisi için)
        // =================================================================
        const adminEmail = "kcagatay239@gmail.com"; 

        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "index.html"; return; }
            
            currentUserId = user.uid;
            
            // Kullanıcı adı başlığa
            const usernameLower = user.displayName ? user.displayName.toLowerCase() : "kullanıcı";
            document.getElementById('header-username-text').innerText = user.displayName;
            document.getElementById('display-name').innerText = user.displayName;
            
            // Admin Kontrolü
            if(user.email && user.email.toLowerCase() === adminEmail.toLowerCase()) {
                isAdmin = true;
                document.getElementById('tab-admin').style.display = 'flex'; 
                document.getElementById('role-text').innerText = "Kurucu • Sistem Yöneticisi";
            }

            // Profili Veritabanından Çek
            const userRef = doc(db, "kullanicilar", user.uid);
            const userSnap = await getDoc(userRef);
            if (userSnap.exists()) {
                const userData = userSnap.data();
                if(userData.avatar) document.getElementById('display-avatar').style.backgroundImage = `url('${userData.avatar}')`;
                if(userData.bio) document.getElementById('bio-text').innerText = userData.bio;
                if(userData.website) { 
                    document.getElementById('bio-link').innerText = userData.website.replace(/^https?:\/\//, ''); 
                    document.getElementById('bio-link').href = userData.website.startsWith('http') ? userData.website : 'https://' + userData.website; 
                }
                
                // Altın Tik Gösterimi
                if(userData.isVerified || isAdmin || usernameLower.includes('çağatay') || usernameLower.includes('cagatay')) {
                    document.getElementById('gold-tick').style.display = 'inline-flex';
                }

                // Modal içini doldur
                document.getElementById('edit-avatar').value = userData.avatar || "";
                document.getElementById('edit-bio').value = userData.bio || "";
                document.getElementById('edit-website').value = userData.website || "";
            }

            loadPosts();
        });

        // Tab Değiştirme (Kendi gönderilerim vs Tüm Gönderiler)
        window.switchTab = function(tabName) {
            currentTab = tabName;
            document.getElementById('tab-my').classList.remove('active');
            document.getElementById('tab-admin').classList.remove('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            loadPosts();
        }

        // Gönderileri (Posts) Çek
        async function loadPosts() {
            const grid = document.getElementById('my-posts');
            grid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 40px; font-size: 13px;">Yükleniyor...</div>';
            
            let q;
            if (currentTab === 'my') {
                q = query(collection(db, "gonderiler"), where("username", "==", auth.currentUser.displayName));
            } else {
                q = query(collection(db, "gonderiler"), orderBy("createdAt", "desc"));
            }
            
            try {
                const snapshot = await getDocs(q);
                grid.innerHTML = ''; 
                
                if (currentTab === 'my') document.getElementById('post-count').innerText = snapshot.size;
                
                if (snapshot.empty) { 
                    grid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 40px; font-size: 13px;">Henüz hiç gönderi yok.</div>'; 
                    return; 
                }

                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const dataStr = encodeURIComponent(JSON.stringify(data));
                    
                    grid.insertAdjacentHTML('beforeend', `
                    <div class="grid-item" style="background-image: url('${data.imageUrl}');" onclick="openPostDetail('${doc.id}', '${dataStr}')"></div>
                    `);
                });
            } catch (error) { grid.innerHTML = `<div style="grid-column: span 3; text-align: center; color: red;">Hata oluştu.</div>`; console.log(error);}
        }

        // Gönderi Detayını Aç
        window.openPostDetail = function(docId, dataStr) {
            const data = JSON.parse(decodeURIComponent(dataStr));
            activePostId = docId;

            document.getElementById('modalPostImg').style.backgroundImage = `url('${data.imageUrl}')`;
            document.getElementById('modalPostCaption').innerHTML = `<strong>${data.username}</strong> ${data.caption || ''}`;
            document.getElementById('modalPostLikes').innerText = data.likesCount || 0;

            // Eğer gönderi benimse veya Adminsem "Sil" butonunu göster
            if (isAdmin || auth.currentUser.displayName === data.username) {
                document.getElementById('admin-controls').style.display = 'block';
            } else {
                document.getElementById('admin-controls').style.display = 'none';
            }

            document.getElementById('postDetailModal').classList.add('active'); 
            document.body.style.overflow = 'hidden';
        }

        // Gönderi Silme İşlemi
        document.getElementById('btn-delete-post').addEventListener('click', async () => {
            if(!activePostId) return;
            if(confirm("Bu gönderiyi silmek istediğine emin misin?")) {
                try {
                    document.getElementById('btn-delete-post').innerText = "Siliniyor...";
                    await deleteDoc(doc(db, "gonderiler", activePostId));
                    closePostDetailModal(); 
                    loadPosts(); 
                } catch (error) { alert("Hata: " + error.message); }
                finally { document.getElementById('btn-delete-post').innerHTML = '<span class="material-symbols-outlined">delete</span> Gönderiyi Sil'; }
            }
        });

        // Profili Düzenle ve Kaydet
        document.getElementById('btn-save-profile').addEventListener('click', async () => {
            if(!currentUserId) return;
            const btn = document.getElementById('btn-save-profile');
            btn.innerText = "Kaydediliyor...";
            try {
                await setDoc(doc(db, "kullanicilar", currentUserId), {
                    avatar: document.getElementById('edit-avatar').value,
                    bio: document.getElementById('edit-bio').value,
                    website: document.getElementById('edit-website').value
                }, { merge: true });
                closeProfileEditModal(); window.location.reload(); 
            } catch (error) { alert("Hata: " + error.message); btn.innerText = "Kaydet"; }
        });

    </script>
</body>
</html>
