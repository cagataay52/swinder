<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profilim - Swinder VIP</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=block" />
    <link href="https://fonts.googleapis.com/css2?family=Grand+Hotel&display=swap" rel="stylesheet">

    <script>if(sessionStorage.getItem("swinder_splashed")) { document.write('<style>#splash-screen { display: none !important; }</style>'); }</script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; -webkit-tap-highlight-color: transparent;}
        :root { --primary-gold: #d4af37; --text-light: #f5f5f7; --glass-bg: rgba(20, 20, 25, 0.45); --glass-border: 1px solid rgba(255, 255, 255, 0.08); --body-bg: #050505; --ring-gradient: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); }
        body.theme-black { --primary-gold: #ffffff; --text-light: #e0e0e0; --glass-bg: rgba(10, 10, 10, 0.85); --glass-border: 1px solid rgba(255, 255, 255, 0.2); --body-bg: #000000; --ring-gradient: linear-gradient(45deg, #222, #fff, #555); }
        body.theme-black .profile-ring { box-shadow: 0 0 20px rgba(255,255,255,0.15); }
        body.theme-black .btn-premium { background: #fff; color: #000; text-shadow: none; box-shadow: 0 4px 15px rgba(255,255,255,0.2);}
        body.theme-gold { --primary-gold: #ffdf00; --gold-light: #f3e5ab; --text-light: #fff; --glass-bg: rgba(30, 25, 10, 0.7); --glass-border: 1px solid rgba(255, 223, 0, 0.45); --body-bg: radial-gradient(circle at top, #1a1400 0%, #050400 100%); --ring-gradient: linear-gradient(45deg, #ffdf00, #ffaa00, #f3e5ab, #ffdf00); --video-overlay: radial-gradient(circle, rgba(255, 223, 0, 0.1) 0%, transparent 70%); }
        body.theme-gold { background: var(--body-bg) !important; }
        body.theme-gold .profile-ring { box-shadow: 0 0 35px rgba(255, 223, 0, 0.4), 0 0 10px rgba(255, 223, 0, 0.2); position: relative; }
        body.theme-gold .profile-ring::before { content: ''; position: absolute; top: -10px; left: -10px; right: -10px; bottom: -10px; background: radial-gradient(circle, rgba(255, 223, 0, 0.15) 0%, transparent 70%); border-radius: 50%; z-index: -1; filter: blur(5px); }
        body.theme-gold .header-username { text-shadow: 0 0 12px rgba(255, 223, 0, 0.5); }
        body.theme-gold .stat-item span { color: var(--primary-gold); text-shadow: 0 0 10px rgba(255, 223, 0, 0.35); transition: text-shadow 0.3s ease; }
        body.theme-gold .btn-premium { background: linear-gradient(135deg, #d4af37 0%, #ffdf00 50%, #d4af37 100%); color: #000; font-weight: 800; box-shadow: 0 5px 20px rgba(255, 223, 0, 0.35); transition: transform 0.2s ease, box-shadow 0.3s ease; }
        body.theme-gold .grid-item video::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: var(--video-overlay); pointer-events: none; }
        body { background: var(--body-bg); color: var(--text-light); overflow-x: hidden; padding-bottom: calc(55px + env(safe-area-inset-bottom)); overscroll-behavior-y: none; transition: background 0.5s ease;}
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease, visibility 0.5s; }
        .splash-logo { font-family: 'Grand Hotel', cursive; font-size: 70px; color: var(--primary-gold); animation: splashPulse 1.5s infinite alternate; text-shadow: 0 0 20px rgba(212,175,55,0.4); }
        @keyframes splashPulse { 0% { transform: scale(1); opacity: 0.8;} 100% { transform: scale(1.1); opacity: 1;} }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .ambient-blob-1 { position: absolute; top: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(212,175,55,0.12) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float1 20s infinite alternate; }
        .ambient-blob-2 { position: absolute; bottom: 10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(255,48,64,0.08) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float2 25s infinite alternate; }
        @keyframes float1 { 100% { transform: translate(10vw, 10vh); } } @keyframes float2 { 100% { transform: translate(-10vw, -10vh); } }

        header { position: sticky; top: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(20px); z-index: 100; border-bottom: var(--glass-border); padding-top: calc(15px + env(safe-area-inset-top)); transition: border-color 0.5s ease; }
        .header-username { font-size: 20px; font-weight: 700; color: var(--text-light); display: flex; align-items:center; gap:8px; transition: color 0.5s ease;}
        .header-icon { color: var(--text-light); font-size: 28px; cursor: pointer; background: none; border: none; transition: color 0.5s ease; }

        .profile-container { max-width: 600px; margin: 0 auto; padding: 20px 0; }
        .profile-header-top { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 20px; }
        .profile-ring { width: 90px; height: 90px; border-radius: 50%; padding: 3px; background: var(--ring-gradient); transition: background 0.5s ease, box-shadow 0.5s ease; cursor:pointer;}
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid var(--body-bg); background-size: cover; background-position: center; transition: border-color 0.5s ease; }
        .profile-stats { display: flex; gap: 15px; flex: 1; justify-content: space-evenly; margin-left: 20px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 13px; transition: color 0.5s ease; }
        .stat-item span { font-weight: 700; font-size: 18px; margin-bottom: 2px; }
        .profile-bio { padding: 0 20px; font-size: 14px; line-height: 1.5; margin-bottom: 15px; white-space: pre-wrap;}
        .profile-actions { padding: 0 20px; margin-bottom: 20px; }
        .btn-edit { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: var(--glass-border); color: var(--text-light); padding: 10px 0; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; }
        
        .profile-grid, .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; width: 100%; margin-top: 2px;}
        .grid-item { width: 100%; height: 0; padding-bottom: 100%; position: relative; background-color: #1a1a1a; background-size: cover; background-position: center; cursor: pointer;}
        .grid-video-icon { position:absolute; top:8px; right:8px; color:white; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.8)); font-size: 22px;}

        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(5, 5, 5, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 8px 10px max(5px, env(safe-area-inset-bottom)); border-top: 1px solid rgba(255,255,255,0.08); z-index: 900; transition: border-color 0.5s ease; }
        .nav-icon-btn { background: none; border: none; color: rgba(255,255,255,0.45); cursor: pointer; display: flex; align-items: center; justify-content: center; height: 40px; width: 40px; -webkit-tap-highlight-color: transparent;}
        .nav-icon-btn .material-symbols-outlined { font-size: 28px; transition: transform 0.2s, color 0.2s; }
        .nav-icon-btn.active { color: white; }
        .nav-icon-btn.active .material-symbols-outlined { font-variation-settings: 'FILL' 1; transform: scale(1.05); }
        .nav-icon-btn.add-btn { background: var(--ring-gradient); color: #000; width: 30px; height: 30px; border-radius: 10px; transition: background 0.5s ease; }
        .nav-icon-btn.add-btn .material-symbols-outlined { font-weight: 600; font-size: 22px; transform: none !important;}

        /* MODALLAR */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 1500; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: calc(15px + env(safe-area-inset-top)); right: 15px; background: rgba(255,255,255,0.1); border: var(--glass-border); color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 50; display: flex; justify-content: center; align-items: center;}
        
        .bottom-sheet { background: var(--body-bg); width: 100%; height: 90vh; border-radius: 24px 24px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: transform 0.4s, background 0.5s; display: flex; flex-direction: column; overflow: hidden; padding-bottom: env(safe-area-inset-bottom); }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        
        .sheet-header { padding: 20px; border-bottom: var(--glass-border); display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 600; background:rgba(10,10,12,0.95); z-index:10;}
        .list-item { display: flex; align-items: center; gap: 15px; padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 16px; font-weight: 500;}
        .list-avatar { width: 48px; height: 48px; border-radius: 50%; background: #222; background-size: cover; background-position: center; flex-shrink: 0;}
        .list-text { flex: 1; font-size: 14px; line-height: 1.4;}
        
        .glass-box { background: var(--glass-bg); border: var(--glass-border); border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; transform: scale(0.95); transition: transform 0.3s, background 0.5s ease, border-color 0.5s ease; }
        .modal-overlay.active .glass-box { transform: scale(1); }
        .form-group { margin-bottom: 15px; text-align: left; width: 100%;}
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: var(--glass-border); border-radius: 12px; color: white; outline: none; font-size: 14px; appearance: none;}
        .btn-premium { background: var(--primary-gold); color: #000; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; border: none; cursor: pointer; transition: background 0.5s ease, color 0.5s ease, box-shadow 0.5s ease;}

        .post-detail-box { background: var(--body-bg); width: 100%; height: 90vh; border-radius: 24px 24px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.4s, background 0.5s; display: flex; flex-direction: column; overflow: hidden; }
        .modal-overlay.active .post-detail-box { transform: translateY(0); }
        .post-detail-img-container { position: relative; width: 100%; height: 50vh; display: flex; justify-content: center; align-items: center; background: black; overflow: hidden; border-bottom: var(--glass-border); border-top: var(--glass-border);}
        .media-blur-bg { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(35px) brightness(0.3); z-index: 0;}

        /* YORUM VE INPUT (REELS & GONDERILER ICIN EKLENDI) */
        .chat-input-container { padding: 15px 20px; background: rgba(20,20,25,0.9); border-top: var(--glass-border); display: flex; gap: 8px; align-items: center; z-index: 10; position:relative;}
        .chat-input { flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 14px 20px; border-radius: 30px; outline: none; font-size:14px;}

        /* INSTAGRAM TARZI HİKAYE REAKSİYON CSS'LERİ */
        .story-reaction-bar { position: absolute; bottom: calc(20px + env(safe-area-inset-bottom)); left: 0; width: 100%; padding: 0 15px; display: flex; gap: 10px; align-items: center; z-index: 30; }
        .story-reply-input { flex: 1; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 14px; backdrop-filter: blur(10px); }
        .story-reply-input::placeholder { color: rgba(255,255,255,0.7); }
        .story-react-btn { font-size: 24px; background: none; border: none; cursor: pointer; transition: transform 0.2s; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); display:flex; justify-content:center; align-items:center;}
        .story-react-btn:active { transform: scale(1.2); }
        .story-send-btn { background: white; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; border: none; cursor: pointer; }

        /* REELS EKRANI */
        .reels-box { background: #000; width: 100%; height: 100dvh; position: relative; transform: translateY(100%); transition: 0.4s; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .modal-overlay.active .reels-box { transform: translateY(0); }
        .reel-item { width: 100%; height: 100dvh; scroll-snap-align: start; position: relative; overflow: hidden; display: flex; justify-content: center; align-items: center;}
        .reel-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 35%, rgba(0,0,0,0.3) 100%); z-index: 2; pointer-events: none;}
        .reel-content { position: absolute; bottom: calc(90px + env(safe-area-inset-bottom)); left:0; padding:20px; z-index: 3; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        .reel-user { display: flex; align-items: center; gap: 8px; color: white; font-weight: 600; font-size: 15px; margin-bottom: 6px; cursor: pointer;}
        .reel-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center;}
        .reel-actions { display: flex; flex-direction: column; gap: 20px; align-items: center;}
        .reel-action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));}
        .reel-action-btn.liked .material-symbols-outlined { color: #ff3040; font-variation-settings: 'FILL' 1; }

        /* KEŞFET VE BAŞKA KULLANICI PROFİLİ GÖRÜNÜMÜ CSS'LERİ */
        .search-input { flex: 1; background: rgba(255,255,255,0.1); border: var(--glass-border); color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 14px;}
        .explore-users-container { display: none; max-height: 250px; overflow-y: auto; border-bottom: var(--glass-border); -webkit-overflow-scrolling: touch;}
        .explore-scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch;}

        .up-header-top { display: flex; align-items: center; padding: 20px 20px 15px; gap: 20px;}
        .up-avatar-container { width: 86px; height: 86px; border-radius: 50%; padding: 3px; background: var(--ring-gradient); flex-shrink: 0; transition: background 0.5s;}
        .up-avatar { width: 100%; height: 100%; border-radius: 50%; background-size: cover; background-position: center; border: 3px solid var(--body-bg); transition: border-color 0.5s; cursor: pointer;}
        .up-stats { display: flex; flex: 1; justify-content: space-around; text-align: center; }
        .up-stat-item { font-size: 12px; color: rgba(255,255,255,0.7); }
        .up-stat-item span { display: block; font-size: 16px; font-weight: bold; color: white; margin-bottom: 2px;}
        .up-bio-container { padding: 0 20px 15px; }
        .up-name { font-size: 16px; font-weight: bold; color: white; margin-bottom: 4px; display: flex; align-items: center; gap: 5px; }
        .up-bio { font-size: 14px; color: rgba(255,255,255,0.85); line-height: 1.4; white-space: pre-wrap; }
        .up-actions { display: flex; gap: 10px; padding: 0 20px 20px; }
        .btn-up-action { flex: 1; padding: 8px 0; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s;}
        .btn-follow { background: transparent; border: 1px solid white; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; margin-left: 5px;}
        .btn-follow.following { background: rgba(255,255,255,0.2); border-color: transparent;}

        @media (max-width: 768px) {
            .modal-overlay { padding: 0; align-items: flex-end;}
            .glass-box { margin: 0; max-width: 100%; border-radius: 25px 25px 0 0; transform: translateY(100%); border-bottom: none;}
            .modal-overlay.active .glass-box { transform: translateY(0); }
            .post-detail-box, .bottom-sheet { height: 90vh; border-radius: 20px 20px 0 0; }
            .reels-box { height: 100dvh; max-width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div id="splash-screen"><div class="splash-logo">Swinder</div></div>
    
    <div class="ambient-bg"><div class="ambient-blob-1"></div><div class="ambient-blob-2"></div></div>

    <header>
        <div class="header-username">
            <span class="material-symbols-outlined" style="cursor:pointer;" onclick="window.location.assign('index.html')">arrow_back</span>
            <span id="display-name">Yükleniyor...</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <button class="header-icon" style="position:relative;" onclick="window.openNotifications()"><span class="material-symbols-outlined">favorite</span><span class="notification-dot" id="noti-dot" style="position: absolute; top: 0; right: 0; width: 10px; height: 10px; background: #ff3040; border-radius: 50%; display: none;"></span></button>
            <button class="header-icon" onclick="openModal('settingsModal')"><span class="material-symbols-outlined">menu</span></button>
        </div>
    </header>

    <main class="profile-container">
        <div class="profile-header-top">
            <div class="profile-ring" id="my-profile-ring"><div class="profile-avatar" id="display-avatar"></div></div>
            <div class="profile-stats">
                <div class="stat-item"><span id="post-count">0</span>Gönderi</div>
                <div class="stat-item"><span id="follower-count">0</span>Takipçi</div>
                <div class="stat-item"><span id="following-count">0</span>Takip</div>
            </div>
        </div>
        <div class="profile-bio"><strong id="bio-name">-</strong><br><span id="bio-text" style="color:gray;">Biyografi yükleniyor...</span></div>
        <div class="profile-actions"><button class="btn-edit" onclick="openModal('profileEditModal')">Profili Düzenle</button></div>
        
        <div class="profile-grid" id="my-posts"></div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-icon-btn" onclick="window.location.assign('index.html')"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn" onclick="window.openExplore()"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn add-btn" onclick="openModal('addModal')"><span class="material-symbols-outlined">add</span></button>
        <button class="nav-icon-btn" onclick="window.openReels()"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn active" onclick="window.scrollTo({top: 0, behavior: 'smooth'})"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="settingsModal">
        <div class="bottom-sheet" style="height: auto;">
            <div class="sheet-header">Ayarlar <button class="header-icon" onclick="closeModal('settingsModal')" style="margin-left:auto;"><span class="material-symbols-outlined">close</span></button></div>
            <div>
                <div class="list-item" id="btn-admin-panel" onclick="closeModal('settingsModal'); openModal('adminModal')" style="display:none; color:var(--primary-gold);"><span class="material-symbols-outlined">workspace_premium</span> VIP Yönetimi</div>
                <div class="list-item" onclick="window.logoutApp()" style="color: #ff4757;"><span class="material-symbols-outlined">logout</span> Çıkış Yap</div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="adminModal" style="z-index: 2000;"><div class="glass-box"><button class="close-btn" onclick="closeModal('adminModal')"><span class="material-symbols-outlined">close</span></button><h2 style="color:var(--primary-gold); text-align:center; margin-bottom:20px;">👑 Admin Paneli</h2><div class="form-group"><input type="text" id="admin-target-user" placeholder="Premium Yapılacak Kullanıcı Adı"></div><button class="btn-premium" onclick="window.grantPremium()">Premium Ver</button></div></div>
    
    <div class="modal-overlay" id="profileEditModal">
        <div class="glass-box" style="max-height: 90vh; overflow-y: auto;">
            <button class="close-btn" onclick="closeModal('profileEditModal')"><span class="material-symbols-outlined">close</span></button>
            <h2 style="color: white; font-size: 18px; margin-bottom: 20px; text-align: center;">Profili Düzenle</h2>
            <div class="form-group"><label style="color:gray; font-size:12px;">Profil Aura / Teması (Sadece VIP 💎)</label><select id="edit-theme" style="margin-top: 5px;"><option value="normal">Standart Swinder</option><option value="black">Swinder Black (Mat Siyah)</option><option value="gold">Swinder Royal Gold (Altın)</option></select></div>
            <div class="form-group"><label style="color:gray; font-size:12px;">Kullanıcı Adı</label><input type="text" id="edit-username" style="margin-top: 5px;"></div>
            <div class="form-group"><label style="color:gray; font-size:12px;">Doğum Tarihi</label><input type="date" id="edit-birthdate"></div>
            <div class="form-group"><label style="color:gray; font-size:12px;">Profil Fotoğrafı</label><input type="file" id="edit-avatar-file" accept="image/*" style="margin-top: 5px;"></div>
            <div class="form-group"><label style="color:gray; font-size:12px;">Biyografi</label><textarea id="edit-bio" rows="3" style="margin-top: 5px;"></textarea></div>
            <button class="btn-premium" id="btn-save-profile">Kaydet</button>
        </div>

    <script>
        // ZAMAN HESAPLAMA FONKSİYONU
        window.timeAgo = function(timeMs) {
            if(!timeMs) return "";
            const seconds = Math.floor((Date.now() - timeMs) / 1000);
            if(seconds < 60) return Math.max(1, seconds) + "sn";
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "a";
            interval = seconds / 604800;
            if (interval > 1) return Math.floor(interval) + "h";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "g";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "s";
            interval = seconds / 60;
            return Math.floor(interval) + "d";
        }

        window.openNotifications = () => { 
            openModal('notificationsModal'); 
            const dot = document.getElementById('noti-dot'); if(dot) dot.style.display='none'; 
            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
            if(window.loadNotifications) window.loadNotifications(); 
        }

        function hideSplash() { sessionStorage.setItem("swinder_splashed", "true"); const spl = document.getElementById('splash-screen'); if(spl) { spl.style.opacity = '0'; setTimeout(() => spl.style.display = 'none', 400); } }
        setTimeout(() => { hideSplash(); }, 1500);
        
        window.isVideo = function(url) { if(!url) return false; return url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i) !== null || url.includes('video'); }
        window.getVideoThumbnail = function(url) { if(!url) return ''; if(window.isVideo(url)) return url.replace(/\.(mp4|webm|ogg|mov)(\?.*)?$/i, ".jpg$2"); return url; }

        if(editThemeEl) { editThemeEl.addEventListener('change', function(e) { document.body.className = ''; if(e.target.value !== 'normal') { document.body.classList.add('theme-' + e.target.value); } }); }
    </script>

                        const fc = document.getElementById('follower-count'); if(fc) fc.innerText = (currentUserProfile.followers || []).length;
                        const fic = document.getElementById('following-count'); if(fic) fic.innerText = (currentUserProfile.following || []).length;

                        let savedTheme = currentUserProfile.profileTheme || 'normal';
                        if(savedTheme !== 'normal' && !currentUserProfile.isPremium && !isAdmin) { savedTheme = 'normal'; }
                        const et = document.getElementById('edit-theme'); if(et) et.value = savedTheme;
                        if(savedTheme !== 'normal') { document.body.classList.add('theme-' + savedTheme); }
                    }
                    
                    await window.loadAllData(); 
                    if(window.renderProfileGrid) window.renderProfileGrid(); 
                    
                    // PUSH BİLDİRİM DİNLEYİCİSİ (Açılır Bildirimler İçin)
                    let initNoti = true;
                    onSnapshot(query(collection(db, "bildirimler"), where("to", "==", safeName)), (s) => { 
                        if(!s.empty) { const nd = document.getElementById('noti-dot'); if(nd) nd.style.display = 'block'; }
                        s.docChanges().forEach(change => { 
                            if(change.type === 'added' && !initNoti) { 
                                const notiData = change.doc.data();
                                if(window.sendSystemPush) window.sendSystemPush("Swinder VIP 💖", notiData.from + " " + notiData.text); 
                            } 
                        });
                        initNoti = false;
                    });
                } else { window.location.href = "index.html"; }
            } catch (error) {} finally { hideSplash(); }
        });

        if ('serviceWorker' in navigator) { 
            navigator.serviceWorker.register('sw.js').then((reg) => {
                reg.onupdatefound = () => {
                    const installingWorker = reg.installing;
                    installingWorker.onstatechange = () => {
                        if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            if(!sessionStorage.getItem('sw_reloaded_v25')) {
                                sessionStorage.setItem('sw_reloaded_v25', 'true');
                                window.location.reload();
                            }
                        }
                    };
                };
            }).catch(err => console.log("SW Hatası:", err)); 
        }
    </script>
</body>
</html>
