<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Profilim - Swinder</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Swinder">
    <link rel="apple-touch-icon" href="https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=192&h=192&auto=format&fit=crop">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --primary-gold: #d4af37; --text-light: #f5f5f7; --text-muted: rgba(255,255,255,0.6); --glass-bg: rgba(20, 20, 25, 0.45); --glass-border: 1px solid rgba(255, 255, 255, 0.08); }
        body { background: #050505; color: var(--text-light); overflow-x: hidden; padding-bottom: 70px; }

        .ambient-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; }
        .ambient-blob-1 { position: absolute; top: -10%; left: -10%; width: 60vw; height: 60vw; background: radial-gradient(circle, rgba(212,175,55,0.15) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float1 20s infinite alternate ease-in-out; }
        .ambient-blob-2 { position: absolute; bottom: 10%; right: -10%; width: 50vw; height: 50vw; background: radial-gradient(circle, rgba(255,48,64,0.1) 0%, transparent 70%); border-radius: 50%; filter: blur(60px); animation: float2 25s infinite alternate ease-in-out; }
        @keyframes float1 { 100% { transform: translate(10vw, 10vh); } } @keyframes float2 { 100% { transform: translate(-10vw, -10vh); } }

        header { position: sticky; top: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(24px); z-index: 100; border-bottom: var(--glass-border); padding-top: calc(15px + env(safe-area-inset-top)); }
        .header-username { font-size: 20px; font-weight: 700; color: var(--text-light); display: flex; align-items:center; gap:8px;}
        .header-icon { color: var(--text-light); font-size: 28px; cursor: pointer; background: none; border: none; }

        .profile-container { max-width: 600px; margin: 0 auto; padding: 20px 0; }
        .profile-header-top { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; margin-bottom: 20px; }
        .profile-ring { width: 90px; height: 90px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; border: 3px solid #050505; background-size: cover; background-position: center; }
        .profile-stats { display: flex; gap: 15px; flex: 1; justify-content: space-evenly; margin-left: 20px; }
        .stat-item { display: flex; flex-direction: column; align-items: center; color: var(--text-light); font-size: 13px; }
        .stat-item span { font-weight: 700; font-size: 18px; margin-bottom: 2px; }
        
        .profile-bio { padding: 0 20px; font-size: 14px; line-height: 1.5; margin-bottom: 15px; }
        .profile-actions { padding: 0 20px; margin-bottom: 20px; }
        .btn-edit { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: var(--glass-border); color: var(--text-light); padding: 10px 0; border-radius: 12px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s; width: 100%; text-align: center; }
        
        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; margin-top: 2px;}
        .grid-item { aspect-ratio: 1 / 1; background-size: cover; background-position: center; cursor: pointer; transition: 0.3s;}

        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.85); backdrop-filter: blur(25px); padding: 12px 10px calc(12px + env(safe-area-inset-bottom)); border-top: var(--glass-border); z-index: 999; }
        .nav-icon-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .nav-icon-btn .material-symbols-outlined { font-size: 30px; }
        .nav-icon-btn.active { color: var(--text-light); }
        .nav-icon-btn.add-btn { background: linear-gradient(135deg, #d4af37, #aa8529); color: #000; width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center;}
        .nav-icon-btn.add-btn .material-symbols-outlined { color: #000; font-weight: 600; font-size: 28px;}

        /* MODALLAR */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1500; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; z-index: 50;}
        
        .bottom-sheet { background: var(--bg-dark); width: 100%; height: auto; border-radius: 24px 24px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 30px;}
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        .sheet-header { padding: 20px; border-bottom: var(--glass-border); display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: 600; z-index: 10; background: rgba(10,10,12,0.9);}
        .list-item { display: flex; align-items: center; gap: 15px; padding: 18px 20px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; font-size: 16px; font-weight: 500;}

        .glass-box { background: rgba(25, 25, 30, 0.4); backdrop-filter: blur(30px); border: var(--glass-border); border-radius: 24px; padding: 30px; width: 100%; max-width: 400px; transform: scale(0.95); transition: 0.3s ease;}
        .modal-overlay.active .glass-box { transform: scale(1); }
        .auth-tabs { display: flex; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tab-btn { flex: 1; background: none; border: none; color: var(--text-muted); padding: 10px; font-weight: 600; cursor: pointer; transition: 0.3s; font-size: 15px; }
        .tab-btn.active { color: var(--primary-gold); border-bottom: 2px solid var(--primary-gold); }
        .auth-form { display: none; } .auth-form.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 15px; text-align: left; width: 100%;}
        .form-group input, .form-group textarea { width: 100%; padding: 14px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; font-size: 14px;}
        .form-group input:focus { border-color: var(--primary-gold); }
        .btn-premium { background: var(--primary-gold); color: #000; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; border: none; cursor: pointer;}

        .search-input { flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 14px;}
        .explore-users-container { display: none; max-height: 250px; overflow-y: auto; border-bottom: var(--glass-border); }
        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; overflow-y: auto; flex: 1; align-content: start;}
        
        .reels-box { background: #000; width: 100%; height: 100dvh; position: relative; transform: translateY(100%); transition: 0.4s ease; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .modal-overlay.active .reels-box { transform: translateY(0); }
        .reel-item { width: 100%; height: 100dvh; scroll-snap-align: start; background-size: cover; background-position: center; position: relative; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; padding-bottom: 90px; overflow: hidden; justify-content: center; align-items: center;}
        .reel-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(to top, rgba(0,0,0,0.95) 0%, transparent 35%, rgba(0,0,0,0.3) 100%); z-index: 2; pointer-events: none;}
        .reel-content { position: absolute; bottom:90px; left:0; padding:20px; z-index: 3; display: flex; justify-content: space-between; align-items: flex-end; width: 100%; }
        
        .reel-info { flex: 1; padding-right: 15px; }
        .reel-user { display: flex; align-items: center; gap: 10px; color: white; font-weight: 600; font-size: 15px; margin-bottom: 12px; cursor: pointer; text-shadow: 0 2px 4px rgba(0,0,0,0.8);}
        .reel-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center;}
        .btn-follow { background: var(--primary-gold); border: none; color: black; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: 700; margin-left: 5px; cursor: pointer; transition: 0.3s;}
        .btn-follow.following { background: rgba(255,255,255,0.2); color: white;}
        
        .reel-actions { display: flex; flex-direction: column; gap: 20px; align-items: center; padding-bottom: 15px;}
        .reel-action-btn { background: none; border: none; color: white; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8));}
        .reel-action-btn.liked .material-symbols-outlined { color: #ff3040; font-variation-settings: 'FILL' 1; }

        /* 🔥 GÖRSEL İZLEYİCİ (ASPECT RATIO FIX) 🔥 */
        .post-detail-box { background: var(--bg-dark); width: 100%; height: 90vh; border-radius: 24px 24px 0 0; position: absolute; bottom: 0; transform: translateY(100%); transition: 0.4s; display: flex; flex-direction: column; overflow: hidden; }
        .modal-overlay.active .post-detail-box { transform: translateY(0); }
        .post-detail-img-container { position: relative; width: 100%; height: 50vh; display: flex; justify-content: center; align-items: center; background: black; overflow: hidden; border-bottom: var(--glass-border);}
        .media-blur-bg { position: absolute; top: -10%; left: -10%; width: 120%; height: 120%; background-size: cover; background-position: center; filter: blur(35px) brightness(0.3); z-index: 0; }

        .user-profile-header { display: flex; align-items: center; gap: 20px; padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.05);}
        .up-avatar { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary-gold); background-size: cover; background-position: center; flex-shrink: 0;}
        .up-info { flex: 1;}
        .up-name { font-size: 20px; font-weight: 600; margin-bottom: 5px; display: flex; align-items: center; gap: 5px;}
        .profile-stats-header { display: flex; justify-content: space-around; width: 100%; margin-bottom: 15px;}
        .ps-item { text-align: center; font-size: 13px; color: var(--text-light); }
        .ps-item span { display: block; font-size: 18px; font-weight: bold; }

        @media (max-width: 768px) {
            .modal-overlay { padding: 0; align-items: flex-end;}
            .glass-box { margin: 0; max-width: 100%; border-radius: 25px 25px 0 0; transform: translateY(100%); border-bottom: none;}
            .modal-overlay.active .glass-box { transform: translateY(0); }
            .bottom-sheet, .post-detail-box { height: 90vh; border-radius: 20px 20px 0 0; }
            .reels-box { height: 100dvh; max-width: 100%; border-radius: 0; }
        }
    </style>
</head>
<body>

    <div class="ambient-bg"><div class="ambient-blob-1"></div><div class="ambient-blob-2"></div></div>

    <header>
        <div class="header-username">
            <span class="material-symbols-outlined" style="cursor:pointer;" onclick="window.location.href='index.html'">lock</span>
            <span id="display-name">Yükleniyor...</span>
        </div>
        <button class="header-icon" onclick="openModal('settingsModal')"><span class="material-symbols-outlined">menu</span></button>
    </header>

    <main class="profile-container">
        <div class="profile-header-top">
            <div class="profile-ring"><div class="profile-avatar" id="display-avatar"></div></div>
            <div class="profile-stats">
                <div class="stat-item"><span id="post-count">0</span>Gönderi</div>
                <div class="stat-item"><span id="follower-count">0</span>Takipçi</div>
                <div class="stat-item"><span id="following-count">0</span>Takip</div>
            </div>
        </div>
        <div class="profile-bio"><strong id="bio-name">Kullanıcı</strong><br><span id="bio-text" style="color:gray;">Lüks araç ve yaşam tarzı.</span></div>
        
        <div class="profile-actions">
            <button class="btn-edit" onclick="openModal('profileEditModal')">Profili Düzenle</button>
        </div>

        <div class="profile-grid" id="my-posts"></div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-icon-btn" onclick="window.location.href='index.html'"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn" onclick="openExplore()"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn add-btn" onclick="openModal('addModal')"><span class="material-symbols-outlined" style="color:black;">add</span></button>
        <button class="nav-icon-btn" onclick="openReels()"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn active"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="authModal" style="z-index: 9999;">
        <div class="glass-box">
            <h2 style="text-align: center; margin-bottom: 15px; font-family: 'Grand Hotel', cursive; font-size: 40px; color: var(--text-light);">Swinder</h2>
            <div class="auth-tabs">
                <button class="tab-btn active" id="tab-login" onclick="switchAuthTab('login')">Giriş Yap</button>
                <button class="tab-btn" id="tab-register" onclick="switchAuthTab('register')">Kayıt Ol</button>
            </div>
            <div class="auth-form active" id="form-login">
                <div class="form-group"><input type="email" id="login-email" placeholder="E-posta Adresi"></div>
                <div class="form-group"><input type="password" id="login-pass" placeholder="Şifre"></div>
                <button class="btn-premium" id="btn-login">Oturum Aç</button>
            </div>
            <div class="auth-form" id="form-register">
                <div class="form-group"><input type="text" id="reg-name" placeholder="Kullanıcı Adı"></div>
                <div class="form-group"><input type="email" id="reg-email" placeholder="E-posta Adresi"></div>
                <div class="form-group"><input type="password" id="reg-pass" placeholder="Şifre Belirleyin"></div>
                <button class="btn-premium" id="btn-register">Hesap Oluştur</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="bottom-sheet" style="height: auto;">
            <div class="sheet-header">Ayarlar <button class="header-icon" onclick="closeModal('settingsModal')" style="margin-left:auto;"><span class="material-symbols-outlined">close</span></button></div>
            <div>
                <div class="list-item" onclick="logoutApp()" style="color: #ff4757;"><span class="material-symbols-outlined">logout</span> Çıkış Yap</div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="profileEditModal">
        <div class="glass-box" style="max-height: 90vh; overflow-y: auto;">
            <button class="close-btn" onclick="closeModal('profileEditModal')"><span class="material-symbols-outlined">close</span></button>
            <h2 style="color: white; font-size: 18px; margin-bottom: 20px; text-align: center;">Profili Düzenle</h2>
            <div class="form-group"><label style="color:gray;">Kullanıcı Adı</label><input type="text" id="edit-username"></div>
            <div class="form-group"><label style="color:gray;">Profil Fotoğrafı URL</label><input type="text" id="edit-avatar"></div>
            <div class="form-group"><label style="color:gray;">Biyografi</label><textarea id="edit-bio" rows="3"></textarea></div>
            <button class="btn-premium" id="btn-save-profile">Kaydet</button>
        </div>
    </div>

    <div class="modal-overlay" id="exploreModal"><div class="bottom-sheet"><div class="sheet-header" style="gap:10px;"><button class="header-icon" onclick="closeModal('exploreModal')"><span class="material-symbols-outlined">arrow_back</span></button><input type="text" class="search-input" id="search-input" placeholder="Kişi veya gönderi ara..." onkeyup="performSearch()"></div><div class="explore-users-container" id="explore-users-list"></div><div class="grid-view" id="explore-grid" style="padding: 2px;"></div></div></div>
    
    <div class="modal-overlay" id="userProfileModal" style="z-index: 1550;"><div class="bottom-sheet"><div class="sheet-header"><button class="header-icon" onclick="closeModal('userProfileModal')"><span class="material-symbols-outlined">arrow_back</span></button><span id="up-title" style="font-weight:bold;">Profil</span></div><div style="padding: 20px 20px 10px; display:flex; align-items:center;"><div class="up-avatar" id="up-avatar" style="width: 80px; height: 80px; border-radius:50%; background-size:cover; border:2px solid var(--primary-gold); flex-shrink:0;"></div><div class="profile-stats-header"><div class="ps-item"><span id="up-post-count">0</span>Gönderi</div><div class="ps-item"><span id="up-follower-count">0</span>Takipçi</div><div class="ps-item"><span id="up-following-count">0</span>Takip</div></div></div><div style="padding: 0 20px 15px;"><strong id="up-name" style="font-size: 16px; color: white;">-</strong><br><span id="up-bio" style="color:gray; font-size: 14px; line-height:1.4;">-</span></div><div style="padding: 0 20px 20px; display: flex; gap: 10px;"><button id="btn-follow-user" class="btn-follow" style="flex: 1; padding: 10px; font-size: 14px; border-radius: 8px; background: var(--primary-gold); color: black; border: none; font-weight: bold; cursor: pointer;" onclick="toggleFollowDB(this)">Takip Et</button></div><div class="grid-view" id="up-grid" style="border-top: var(--glass-border); padding-top: 2px;"></div></div></div>

    <div class="modal-overlay" id="postDetailModal" style="z-index: 1600;">
        <div class="post-detail-box">
            <div class="sheet-header">
                <button class="header-icon" onclick="closeModal('postDetailModal')"><span class="material-symbols-outlined">arrow_back</span></button> Gönderi
                <div id="admin-controls" style="margin-left:auto; display:none; gap:15px;">
                    <button class="header-icon" style="color:var(--primary-gold);" onclick="editPostDB()"><span class="material-symbols-outlined">edit</span></button>
                    <button class="header-icon" style="color:#ff4757;" onclick="deletePostDB()"><span class="material-symbols-outlined">delete</span></button>
                </div>
            </div>
            <div style="flex:1; overflow-y:auto; padding-bottom:30px;">
                <div class="post-detail-img-container">
                    <div class="media-blur-bg" id="pd-blur"></div>
                    <img id="pd-img" src="" style="max-width:100%; max-height:100%; object-fit:contain; position:relative; z-index:1;" />
                </div>
                <div style="padding: 15px 20px;">
                    <div style="display:flex; gap:15px; margin-bottom:15px;">
                        <button class="header-icon" id="pd-btn-like" onclick="toggleLikeDB(this)"><span class="material-symbols-outlined">favorite</span></button>
                    </div>
                    <div style="font-weight:600; margin-bottom:10px;"><span id="pd-likes">0</span> beğenme</div>
                    <div style="font-size: 14px;"><strong id="pd-user" style="margin-right:5px; cursor:pointer;" onclick="openUserProfile(this.innerText)">-</strong><span id="pd-caption" style="color:rgba(255,255,255,0.8);">-</span></div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="modal-overlay" id="addModal"><div class="glass-box"><button class="close-btn" onclick="closeModal('addModal')"><span class="material-symbols-outlined">close</span></button><h2 style="color: white; font-size: 18px; margin-bottom: 20px; text-align: center;">Yeni Gönderi Paylaş</h2><div class="form-group"><input type="text" id="add-image" placeholder="Fotoğraf URL'si..."></div><div class="form-group"><textarea id="add-caption" rows="3" placeholder="Açıklama yaz..."></textarea></div><button type="button" id="btn-submit-post" class="btn-premium">Akışta Paylaş</button></div></div>
    
    <div class="modal-overlay" id="reelsModal" style="padding:0; background: #000;"><button class="close-btn" onclick="closeModal('reelsModal')" style="z-index: 1000; top: 20px; right: 20px; background: rgba(0,0,0,0.5);"><span class="material-symbols-outlined">close</span></button><div class="reels-box" id="reels-container"></div></div>

    <script>
        if ('serviceWorker' in navigator) { window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js'); }); }
        
        function openModal(id) { document.getElementById(id).classList.add('active'); document.body.style.overflow = 'hidden'; }
        window.closeModal = function(id) { document.getElementById(id).classList.remove('active'); document.body.style.overflow = 'auto'; }
        window.switchAuthTab = function(tab) { document.getElementById('tab-login').classList.remove('active'); document.getElementById('tab-register').classList.remove('active'); document.getElementById('tab-' + tab).classList.add('active'); document.getElementById('form-login').classList.remove('active'); document.getElementById('form-register').classList.remove('active'); document.getElementById('form-' + tab).classList.add('active'); }
        document.querySelectorAll('.modal-overlay').forEach(m => { m.addEventListener('click', (e) => { if(e.target === m && m.id !== 'authModal') closeModal(m.id); }); });

        window.openExplore = () => { openModal('exploreModal'); if(window.renderExploreGrid) window.renderExploreGrid(); }
        window.openReels = () => { openModal('reelsModal'); if(window.renderReels) window.renderReels(); }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, orderBy, doc, getDoc, addDoc, setDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0", authDomain: "swinder-79534.firebaseapp.com", projectId: "swinder-79534", storageBucket: "swinder-79534.firebasestorage.app", messagingSenderId: "704644873549", appId: "1:704644873549:web:d95f561ec912b94cf2cb04" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const safeEncode = (str) => encodeURIComponent(str || '').replace(/'/g, "%27");

        window.globalPosts = []; window.globalUsersById = {}; window.globalUsersByName = {};
        const adminEmail = "kcagatay239@gmail.com"; 
        let currentUserId = null; let isAdmin = false; let activeInteractPostId = null; let currentUserProfile = null;

        document.getElementById('btn-login').addEventListener('click', async () => { try { await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-pass').value); window.location.reload(); } catch (err) { alert(err.message); }});
        document.getElementById('btn-register').addEventListener('click', async () => { const name = document.getElementById('reg-name').value.trim(); const email = document.getElementById('reg-email').value; const pass = document.getElementById('reg-pass').value; if(!name || !email || !pass) return alert("Doldurun!"); document.getElementById('btn-register').innerText = "Açılıyor..."; try { const uc = await createUserWithEmailAndPassword(auth, email, pass); await updateProfile(uc.user, { displayName: name }); window.location.reload(); } catch (e) { alert(e.message); document.getElementById('btn-register').innerText = "Hesap Oluştur"; }});
        window.logoutApp = async function() { await signOut(auth); window.location.href = "index.html"; }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                closeModal('authModal'); currentUserId = user.uid; if(user.email && user.email.toLowerCase() === adminEmail.toLowerCase()) isAdmin = true;
                document.getElementById('display-name').innerText = user.displayName; document.getElementById('bio-name').innerText = user.displayName; document.getElementById('edit-username').value = user.displayName;
                const snap = await getDoc(doc(db, "kullanicilar", user.uid));
                if(snap.exists()) {
                    currentUserProfile = { uid: user.uid, following: [], followers: [], ...snap.data() };
                    if(currentUserProfile.avatar) { document.getElementById('display-avatar').style.backgroundImage = `url('${currentUserProfile.avatar}')`; document.getElementById('edit-avatar').value = currentUserProfile.avatar; }
                    if(currentUserProfile.bio) { document.getElementById('bio-text').innerText = currentUserProfile.bio; document.getElementById('edit-bio').value = currentUserProfile.bio; }
                    document.getElementById('follower-count').innerText = (currentUserProfile.followers || []).length; document.getElementById('following-count').innerText = (currentUserProfile.following || []).length;
                }
                await loadAllData(); window.renderProfileGrid();
            } else { window.location.href = "index.html"; }
        });

        async function loadAllData() {
            const usersSnap = await getDocs(collection(db, "kullanicilar"));
            window.globalUsersById = {}; window.globalUsersByName = {};
            usersSnap.forEach(uDoc => { const d = uDoc.data(); d.uid = uDoc.id; window.globalUsersById[uDoc.id] = d; if(d.displayName) window.globalUsersByName[d.displayName] = d; });
            const postSnap = await getDocs(query(collection(db, "gonderiler"), orderBy("createdAt", "desc")));
            window.globalPosts = []; postSnap.forEach(doc => { window.globalPosts.push({ id: doc.id, ...doc.data() }); });
        }

        window.renderProfileGrid = function() {
            const grid = document.getElementById('my-posts'); grid.innerHTML = '';
            const myPosts = window.globalPosts.filter(p => p.username === auth.currentUser.displayName);
            document.getElementById('post-count').innerText = myPosts.length;
            myPosts.forEach(p => { const dataStr = safeEncode(JSON.stringify(p)); grid.insertAdjacentHTML('beforeend', `<div class="grid-item" style="background-image: url('${p.imageUrl}');" onclick="window.openPostDetail('${p.id}', '${dataStr}')"></div>`); });
        }

        // 🔥 TAKİP ET 🔥
        window.toggleFollowDB = async function(btnElement, targetName=null) {
            const user = auth.currentUser; if(!user) return;
            const tName = targetName || document.getElementById('up-title').innerText;
            const targetUser = window.globalUsersByName[tName]; if(!targetUser) return;
            const isFollowing = btnElement.classList.contains('following');
            const myRef = doc(db, "kullanicilar", user.uid); const targetRef = doc(db, "kullanicilar", targetUser.uid);
            const countEl = document.getElementById('up-follower-count'); let count = countEl ? parseInt(countEl.innerText) : 0;

            if(isFollowing) {
                btnElement.classList.remove('following'); btnElement.innerText = "Takip Et"; btnElement.style.background = "var(--primary-gold)"; btnElement.style.color = "black";
                if(countEl && tName === document.getElementById('up-title').innerText) countEl.innerText = count - 1;
                await updateDoc(myRef, { following: arrayRemove(targetUser.uid) }); await updateDoc(targetRef, { followers: arrayRemove(user.uid) });
                if(currentUserProfile && currentUserProfile.following) currentUserProfile.following = currentUserProfile.following.filter(id => id !== targetUser.uid);
            } else {
                btnElement.classList.add('following'); btnElement.innerText = "Takibi Bırak"; btnElement.style.background = "rgba(255,255,255,0.2)"; btnElement.style.color = "white";
                if(countEl && tName === document.getElementById('up-title').innerText) countEl.innerText = count + 1;
                await updateDoc(myRef, { following: arrayUnion(targetUser.uid) }); await updateDoc(targetRef, { followers: arrayUnion(user.uid) });
                if(currentUserProfile) { if(!currentUserProfile.following) currentUserProfile.following=[]; currentUserProfile.following.push(targetUser.uid); }
                await addDoc(collection(db, "bildirimler"), { to: tName, from: user.displayName, text: 'seni takip etmeye başladı.', createdAt: new Date() });
            }
        }

        // 🔥 GÖNDERİ DÜZENLE & SİL 🔥
        window.openPostDetail = function(postId, dataStr) {
            closeModal('exploreModal'); closeModal('userProfileModal');
            const data = JSON.parse(decodeURIComponent(dataStr)); activeInteractPostId = postId;
            document.getElementById('pd-img').src = data.imageUrl; document.getElementById('pd-blur').style.backgroundImage = `url('${data.imageUrl.replace(/'/g, "\\'")}')`;
            document.getElementById('pd-user').innerText = data.username; document.getElementById('pd-caption').innerText = data.caption || ''; document.getElementById('pd-likes').innerText = data.likesCount || 0;
            const btnLike = document.getElementById('pd-btn-like'); if(auth.currentUser && data.likedBy && data.likedBy.includes(auth.currentUser.displayName)) btnLike.classList.add('liked'); else btnLike.classList.remove('liked');
            document.getElementById('admin-controls').style.display = (isAdmin || auth.currentUser.displayName === data.username) ? 'flex' : 'none';
            openModal('postDetailModal');
        }

        window.editPostDB = async function() {
            if(!activeInteractPostId) return; const currentCaption = document.getElementById('pd-caption').innerText;
            const newCaption = prompt("Açıklamayı düzenle:", currentCaption);
            if(newCaption !== null) { await updateDoc(doc(db, "gonderiler", activeInteractPostId), { caption: newCaption }); document.getElementById('pd-caption').innerText = newCaption; const p = window.globalPosts.find(x => x.id === activeInteractPostId); if(p) p.caption = newCaption; window.renderProfileGrid(); }
        }
        window.deletePostDB = async function() {
            if(!activeInteractPostId) return;
            if(confirm("Gönderiyi kalıcı olarak silmek istediğine emin misin?")) { await deleteDoc(doc(db, "gonderiler", activeInteractPostId)); closeModal('postDetailModal'); await loadAllData(); window.renderProfileGrid(); }
        }

        // BEĞENİ
        window.toggleLikeDB = async function(btnElement, forcePostId=null) {
            const user = auth.currentUser; if(!user) return; const postId = forcePostId || activeInteractPostId; if(!postId) return;
            const isLiked = btnElement.classList.contains('liked'); const postRef = doc(db, "gonderiler", postId); const likeSpan = document.getElementById('pd-likes'); const postData = window.globalPosts.find(p=>p.id===postId); let currentLikes = postData ? (postData.likesCount||0) : 0;
            if(isLiked) { btnElement.classList.remove('liked'); if(likeSpan && activeInteractPostId===postId) likeSpan.innerText = currentLikes - 1; await updateDoc(postRef, { likedBy: arrayRemove(user.displayName), likesCount: currentLikes - 1 }); if(postData) postData.likesCount -= 1; } 
            else { btnElement.classList.add('liked'); if(likeSpan && activeInteractPostId===postId) likeSpan.innerText = currentLikes + 1; await updateDoc(postRef, { likedBy: arrayUnion(user.displayName), likesCount: currentLikes + 1 }); if(postData) postData.likesCount += 1; }
        }

        document.getElementById('btn-save-profile').addEventListener('click', async () => {
            if(!currentUserId) return; const btn = document.getElementById('btn-save-profile'); btn.innerText = "Kaydediliyor...";
            const newUsername = document.getElementById('edit-username').value.trim(); const avatar = document.getElementById('edit-avatar').value; const bio = document.getElementById('edit-bio').value;
            if(!newUsername) { alert("Kullanıcı adı boş bırakılamaz!"); btn.innerText = "Kaydet"; return; }
            try {
                const userRef = doc(db, "kullanicilar", currentUserId); const userSnap = await getDoc(userRef); const userData = userSnap.exists() ? userSnap.data() : {}; let updates = { avatar, bio };
                if (newUsername !== auth.currentUser.displayName) { if (!isAdmin && userData.lastUsernameChangeDate) { const diffDays = Math.abs(new Date() - new Date(userData.lastUsernameChangeDate)) / (1000 * 60 * 60 * 24); if (diffDays < 14) { alert(`14 günde bir isim değiştirebilirsiniz. Kalan: ${Math.ceil(14 - diffDays)} gün.`); btn.innerText = "Kaydet"; return; } } await updateProfile(auth.currentUser, { displayName: newUsername }); updates.displayName = newUsername; updates.lastUsernameChangeDate = new Date().toISOString(); }
                await setDoc(userRef, updates, { merge: true }); closeModal('profileEditModal'); window.location.reload(); 
            } catch (error) { alert("Hata: " + error.message); btn.innerText = "Kaydet"; }
        });

        // KEŞFET VE REELS
        window.renderExploreGrid = function() {
            const filterText = document.getElementById('search-input').value.toLowerCase(); const grid = document.getElementById('explore-grid'); grid.innerHTML = ''; const userList = document.getElementById('explore-users-list'); userList.innerHTML = '';
            if(filterText) { let matchedUsers = Object.values(window.globalUsersById).filter(u => u.displayName && u.displayName.toLowerCase().includes(filterText)); if (matchedUsers.length > 0) { userList.style.display = 'block'; matchedUsers.forEach(u => { const av = u.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100'; userList.insertAdjacentHTML('beforeend', `<div class="list-item" onclick="closeModal('exploreModal'); window.openUserProfile('${u.displayName}')" style="padding: 10px 20px;"><div class="list-avatar" style="background-image: url('${av}'); width: 40px; height: 40px;"></div><div class="list-text"><strong style="color:white; font-size:15px;">${u.displayName}</strong></div></div>`); }); } else { userList.style.display = 'none'; } } else { userList.style.display = 'none'; }
            let filteredPosts = window.globalPosts.filter(p => p.username !== auth.currentUser.displayName);
            if(filterText) filteredPosts = filteredPosts.filter(p => (p.caption||'').toLowerCase().includes(filterText) || (p.username||'').toLowerCase().includes(filterText));
            if(filteredPosts.length === 0 && (!filterText || userList.innerHTML === '')) { grid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: gray; padding: 40px; font-size: 13px;">Sonuç bulunamadı.</div>'; return;}
            filteredPosts.forEach(p => { const dataStr = safeEncode(JSON.stringify(p)); grid.insertAdjacentHTML('beforeend', `<div class="grid-item" style="background-image: url('${p.imageUrl}');" onclick="window.openPostDetail('${p.id}', '${dataStr}')"></div>`); });
        }
        window.performSearch = () => window.renderExploreGrid();

        window.openUserProfile = function(username) {
            let pInfo = window.globalUsersByName[username] || {};
            const isV = pInfo.isVerified || username.toLowerCase().includes('çağatay'); document.getElementById('up-title').innerText = username; document.getElementById('up-name').innerHTML = `${username} ${isV ? '<span class="gold-tick" style="display:inline-flex;">✓</span>' : ''}`; document.getElementById('up-bio').innerText = pInfo.bio || 'Swinder Üyesi'; document.getElementById('up-avatar').style.backgroundImage = pInfo.avatar ? `url('${pInfo.avatar}')` : `url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=200')`;
            const userPosts = window.globalPosts.filter(p => p.username === username); document.getElementById('up-post-count').innerText = userPosts.length; document.getElementById('up-follower-count').innerText = (pInfo.followers || []).length; document.getElementById('up-following-count').innerText = (pInfo.following || []).length;
            const btnFollow = document.getElementById('btn-follow-user');
            if(auth.currentUser && auth.currentUser.displayName === username) { btnFollow.style.display = 'none'; } else { btnFollow.style.display = 'block'; if(currentUserProfile && currentUserProfile.following && currentUserProfile.following.includes(pInfo.uid)) { btnFollow.classList.add('following'); btnFollow.innerText="Takibi Bırak"; btnFollow.style.background="rgba(255,255,255,0.1)"; btnFollow.style.color="white"; } else { btnFollow.classList.remove('following'); btnFollow.innerText="Takip Et"; btnFollow.style.background="var(--primary-gold)"; btnFollow.style.color="black"; } }
            const upGrid = document.getElementById('up-grid'); upGrid.innerHTML = ''; 
            if(userPosts.length === 0) upGrid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: gray; padding: 30px; font-size:13px;">Gönderi yok.</div>';
            userPosts.forEach(p => { const dataStr = safeEncode(JSON.stringify(p)); upGrid.insertAdjacentHTML('beforeend', `<div class="grid-item" style="background-image: url('${p.imageUrl}');" onclick="window.openPostDetail('${p.id}', '${dataStr}')"></div>`); });
            openModal('userProfileModal');
        }

        window.renderReels = function() {
            const rc = document.getElementById('reels-container'); rc.innerHTML = '';
            if(window.globalPosts.length === 0) { rc.innerHTML = '<div style="color:white; text-align:center; padding-top:50vh;">Reels yok.</div>'; return; }
            window.globalPosts.forEach(data => {
                const pInfo = window.globalUsersByName[data.username] || {}; const av = pInfo.avatar ? `url('${pInfo.avatar}')` : `url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100')`; const likedClass = (auth.currentUser && data.likedBy && data.likedBy.includes(auth.currentUser.displayName)) ? 'liked' : ''; const isFollowing = currentUserProfile && currentUserProfile.following && currentUserProfile.following.includes(pInfo.uid); const followBtnHtml = (auth.currentUser.displayName !== data.username) ? `<button class="btn-follow ${isFollowing ? 'following' : ''}" onclick="event.stopPropagation(); toggleFollowDB(this, '${data.username}')">${isFollowing ? 'Takibi Bırak' : 'Takip Et'}</button>` : '';
                rc.insertAdjacentHTML('beforeend', `<div class="reel-item"><div class="media-blur-bg" style="background-image: url('${data.imageUrl.replace(/'/g, "\\'")}');"></div><img src="${data.imageUrl}" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:contain; z-index:1;" ondblclick="toggleLikeDB(this.parentElement.querySelector('.btn-like'), '${data.id}')"/><div class="reel-overlay"></div><div class="reel-content"><div class="reel-info"><div class="reel-user" onclick="closeModal('reelsModal'); window.openUserProfile('${data.username}')"><div class="reel-avatar" style="background-image:${av};"></div>${data.username} ${followBtnHtml}</div><div class="reel-caption">${data.caption || ''}</div></div><div class="reel-actions"><button class="reel-action-btn btn-like ${likedClass}" onclick="toggleLikeDB(this, '${data.id}')"><span class="material-symbols-outlined">favorite</span><span class="reel-action-text" id="like-count-${data.id}">${data.likesCount||0}</span></button></div></div></div>`);
            });
        }

        document.getElementById('btn-submit-post').addEventListener('click', async () => { const user = auth.currentUser; if (!user) return; const imageUrl = document.getElementById('add-image').value; const caption = document.getElementById('add-caption').value; if (!imageUrl) return; document.getElementById('btn-submit-post').innerText = "Yükleniyor..."; try { await addDoc(collection(db, "gonderiler"), { imageUrl, caption, username: user.displayName, likesCount: 0, createdAt: new Date() }); closeModal('addModal'); document.getElementById('add-image').value = ""; await loadAllData(); renderProfileGrid(); } catch (err) {} finally { document.getElementById('btn-submit-post').innerText = "Paylaş"; }});
    </script>
</body>
</html>
