<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - Swinder</title>
    <style>
        /* --- Temel Ayarlar --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --bg-dark: #0a0a0c; --surface: #1a1a1f; --primary-gold: #d4af37; --text-light: #f5f5f7; --text-muted: #8e8e93; --glass-bg: rgba(26, 26, 31, 0.75); }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        header { position: fixed; top: 0; width: 100%; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; background: var(--glass-bg); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); z-index: 100; border-bottom: 1px solid rgba(212, 175, 55, 0.15); }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: 2px; color: var(--primary-gold); text-decoration: none; }
        .back-link { color: var(--text-light); text-decoration: none; font-size: 15px; display: flex; align-items: center; gap: 5px; transition: 0.3s; }
        .back-link:hover { color: var(--primary-gold); }

        .profile-container { max-width: 935px; margin: 100px auto 50px; padding: 0 20px; }

        .profile-header { display: flex; gap: 50px; margin-bottom: 40px; align-items: flex-start; }
        .profile-avatar-container { flex-shrink: 0; }
        .profile-ring { width: 150px; height: 150px; border-radius: 50%; padding: 4px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2); }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--bg-dark); background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=400&q=80'); background-size: cover; background-position: center; }

        .profile-info { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        .profile-username { font-size: 28px; font-weight: 300; color: var(--primary-gold); }
        .profile-stats { display: flex; gap: 40px; margin-top: 5px; }
        .stat-item { font-size: 16px; }
        .stat-item span { font-weight: 700; color: var(--text-light); font-size: 20px; }
        
        .profile-bio { font-size: 15px; line-height: 1.5; margin-top: 5px; color: var(--text-muted); }

        .profile-tabs { display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px; margin-top: 30px;}
        .tab-item { padding: 15px 20px; color: var(--primary-gold); font-size: 13px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid var(--primary-gold); margin-top: -1px; }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .grid-item { position: relative; aspect-ratio: 1 / 1; background-size: cover; background-position: center; cursor: pointer; border-radius: 8px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 0.3s ease; backdrop-filter: blur(2px); text-align: center; padding: 10px;}
        .grid-item:hover .grid-overlay { opacity: 1; }
        .overlay-title { color: white; font-size: 16px; margin-bottom: 10px; font-weight: 500;}
        .overlay-price { color: var(--primary-gold); font-size: 18px; font-weight: 700; }

        @media (max-width: 768px) { .profile-header { flex-direction: column; gap: 20px; align-items: center; text-align: center; } .profile-grid { grid-template-columns: repeat(2, 1fr); gap: 8px;} }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">SWINDER</a>
        <a href="index.html" class="back-link">← Ana Sayfaya Dön</a>
    </header>

    <main class="profile-container">
        <header class="profile-header">
            <div class="profile-avatar-container">
                <div class="profile-ring">
                    <div class="profile-avatar"></div>
                </div>
            </div>

            <div class="profile-info">
                <h1 class="profile-username" id="display-name">Yükleniyor...</h1>
                
                <div class="profile-stats">
                    <div class="stat-item"><span id="ad-count">0</span> İlan</div>
                    <div class="stat-item"><span>0</span> Takipçi</div>
                </div>

                <div class="profile-bio">
                    Burası senin özel yönetim sayfan. Sisteme yüklediğin tüm premium ilanlar aşağıda listelenmektedir.
                </div>
            </div>
        </header>

        <div class="profile-tabs">
            <div class="tab-item">▦ Aktif İlanlarım</div>
        </div>

        <div class="profile-grid" id="my-listings">
            <div style="grid-column: span 3; text-align: center; padding: 40px; color: var(--text-muted);">İlanlar yükleniyor...</div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0",
            authDomain: "swinder-79534.firebaseapp.com",
            projectId: "swinder-79534",
            storageBucket: "swinder-79534.firebasestorage.app",
            messagingSenderId: "704644873549",
            appId: "1:704644873549:web:d95f561ec912b94cf2cb04"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Kullanıcı giriş yapmış mı kontrol et
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // İsmi Ekrana Yazdır
                document.getElementById('display-name').innerText = user.displayName || "Swinder Üyesi";
                
                // Firestore'dan sadece bu kullanıcının ilanlarını çek
                const listingsGrid = document.getElementById('my-listings');
                const q = query(collection(db, "ilanlar"), where("seller", "==", user.displayName));
                
                try {
                    const querySnapshot = await getDocs(q);
                    listingsGrid.innerHTML = ''; // Yükleniyor yazısını temizle
                    
                    // Toplam ilan sayısını güncelle
                    document.getElementById('ad-count').innerText = querySnapshot.size;

                    if (querySnapshot.empty) {
                        listingsGrid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 40px;">Henüz hiç ilan vermediniz. Ana sayfaya dönüp ilk ilanınızı ekleyin!</div>';
                        return;
                    }

                    // İlanları Izgaraya (Grid) Ekle
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const firstImg = data.images.split(',')[0].trim();
                        
                        const gridHTML = `
                        <div class="grid-item" style="background-image: url('${firstImg}');">
                            <div class="grid-overlay">
                                <div class="overlay-title">${data.title}</div>
                                <div class="overlay-price">${data.price}</div>
                            </div>
                        </div>`;
                        listingsGrid.insertAdjacentHTML('beforeend', gridHTML);
                    });
                } catch (error) {
                    listingsGrid.innerHTML = `<div style="grid-column: span 3; text-align: center; color: red;">İlanlar çekilirken bir hata oluştu.</div>`;
                }

            } else {
                // Giriş yapmamışsa ana sayfaya şutla
                window.location.href = "index.html";
            }
        });
    </script>
</body>
</html>
