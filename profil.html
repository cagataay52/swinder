<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim - Swinder</title>
    <style>
        /* --- Temel Ayarlar (Premium Karanlık Tema) --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        :root { --bg-dark: #0a0a0c; --surface: #1a1a1f; --primary-gold: #d4af37; --gold-hover: #f3e5ab; --text-light: #f5f5f7; --text-muted: #8e8e93; }
        body { background-color: var(--bg-dark); color: var(--text-light); overflow-x: hidden; }

        /* --- ÜST MENÜ --- */
        header { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(212, 175, 55, 0.15); background: var(--bg-dark); }
        .logo { font-size: 22px; font-weight: 800; letter-spacing: 2px; color: var(--primary-gold); text-decoration: none; text-shadow: 0 2px 10px rgba(212,175,55,0.2); }
        .back-link { color: var(--text-muted); text-decoration: none; font-size: 14px; display: flex; align-items: center; gap: 5px; transition: 0.3s; font-weight: 500; }
        .back-link:hover { color: var(--primary-gold); }

        .profile-container { max-width: 935px; margin: 40px auto 50px; padding: 0 20px; }

        /* --- Profil Üst Kısım --- */
        .profile-header { display: flex; gap: 60px; margin-bottom: 40px; align-items: center; }
        
        .profile-avatar-container { flex-shrink: 0; }
        .profile-ring { width: 120px; height: 120px; border-radius: 50%; padding: 3px; background: linear-gradient(45deg, #d4af37, #aa8529, #f3e5ab); box-shadow: 0 5px 15px rgba(212, 175, 55, 0.15); }
        .profile-avatar { width: 100%; height: 100%; border-radius: 50%; border: 4px solid var(--bg-dark); background-image: url('https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=400&q=80'); background-size: cover; background-position: center; transition: 0.3s; }

        .profile-info { flex: 1; display: flex; flex-direction: column; gap: 15px; }
        
        .profile-top-row { display: flex; align-items: center; gap: 15px; flex-wrap: wrap;}
        .profile-username { font-size: 24px; font-weight: 400; color: var(--text-light); letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px;}
        
        /* ALTIN TİK TASARIMI */
        .gold-tick { display: none; width: 20px; height: 20px; background: var(--primary-gold); border-radius: 50%; text-align: center; line-height: 20px; font-size: 12px; color: #000; font-weight: bold; box-shadow: 0 0 10px rgba(212, 175, 55, 0.5); cursor: help; }
        
        .btn-edit { background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--text-light); padding: 6px 16px; border-radius: 8px; font-weight: 600; font-size: 13px; cursor: pointer; transition: 0.3s; }
        .btn-edit:hover { border-color: var(--primary-gold); color: var(--primary-gold); }
        
        .profile-stats { display: flex; gap: 40px; }
        .stat-item { font-size: 15px; color: var(--text-light); }
        .stat-item span { font-weight: 600; color: var(--primary-gold); font-size: 16px; margin-right: 4px; }
        
        .profile-bio { font-size: 14px; line-height: 1.5; color: var(--text-light); }
        .bio-category { color: var(--text-muted); font-size: 13px; margin-bottom: 3px; }
        .bio-link { color: #e0f2fe; text-decoration: none; font-weight: 500; font-size: 13px; margin-top: 5px; display: inline-block; transition: 0.3s;}
        .bio-link:hover { color: var(--primary-gold); text-decoration: underline; }

        /* --- Sekmeler ve Grid --- */
        .profile-tabs { display: flex; justify-content: center; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;}
        .tab-item { padding: 15px 20px; color: var(--primary-gold); font-size: 12px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border-top: 1px solid var(--primary-gold); margin-top: -1px; }

        .profile-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .grid-item { position: relative; aspect-ratio: 1 / 1; background-size: cover; background-position: center; cursor: pointer; border-radius: 4px; overflow: hidden; transition: 0.3s ease; }
        .grid-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; transition: 0.3s ease; backdrop-filter: blur(2px); text-align: center; padding: 10px;}
        .grid-item:hover .grid-overlay { opacity: 1; }
        .overlay-title { color: white; font-size: 14px; margin-bottom: 8px; font-weight: 500;}
        .overlay-price { color: var(--primary-gold); font-size: 16px; font-weight: 700; }

        /* --- PROFİL DÜZENLE MODALI --- */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 1000; padding: 15px; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .edit-box { background: var(--surface); border: 1px solid rgba(212, 175, 55, 0.3); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; position: relative; transform: scale(0.95); transition: all 0.3s ease; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        .modal-overlay.active .edit-box { transform: scale(1); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.1); border: none; color: white; font-size: 20px; width: 35px; height: 35px; border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; }
        .close-btn:hover { background: var(--primary-gold); color: #000; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 13px; }
        .form-group input, .form-group textarea { width: 100%; padding: 12px 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: white; outline: none; transition: border 0.3s; font-family: inherit; }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--primary-gold); }
        .btn-premium { background: linear-gradient(135deg, #d4af37 0%, #b58500 100%); color: #fff; padding: 10px 24px; border-radius: 10px; font-weight: 700; font-size: 15px; border: none; cursor: pointer; transition: all 0.3s ease; width: 100%; margin-top: 10px;}
        .btn-premium:hover { box-shadow: 0 6px 20px rgba(212, 175, 55, 0.4); }

        @media (max-width: 768px) {
            .profile-header { gap: 20px; flex-direction: column; text-align: center; }
            .profile-top-row { justify-content: center; }
            .profile-stats { justify-content: center; width: 100%; border-top: 1px solid rgba(255,255,255,0.1); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 12px 0; }
            .profile-grid { grid-template-columns: repeat(2, 1fr); gap: 5px;}
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">SWINDER</a>
        <a href="index.html" class="back-link">← Vitrine Dön</a>
    </header>

    <main class="profile-container">
        <header class="profile-header">
            <div class="profile-avatar-container">
                <div class="profile-ring">
                    <div class="profile-avatar" id="display-avatar"></div>
                </div>
            </div>

            <div class="profile-info">
                <div class="profile-top-row">
                    <h1 class="profile-username">
                        <span id="display-name">Yükleniyor...</span> 
                        <span class="gold-tick" id="gold-tick" title="Doğrulanmış Premium Satıcı">✓</span>
                    </h1>
                    <button class="btn-edit" onclick="openEditModal()">Profili Düzenle</button>
                </div>
                
                <div class="profile-stats">
                    <div class="stat-item"><span id="ad-count">0</span> İlan</div>
                    <div class="stat-item"><span>1.2B</span> Takipçi</div>
                    <div class="stat-item"><span>45</span> Takip</div>
                </div>

                <div class="profile-bio">
                    <div class="bio-category">Premium Showroom</div>
                    <span id="bio-text">Sanal garajın ve yayında olan tüm premium ilanların burada.</span> <br>
                    <a href="#" id="bio-link" class="bio-link" target="_blank"></a>
                </div>
            </div>
        </header>

        <div class="profile-tabs">
            <div class="tab-item">▦ Aktif İlanlar</div>
        </div>

        <div class="profile-grid" id="my-listings">
            <div style="grid-column: span 3; text-align: center; padding: 40px; color: var(--text-muted);">İlanlar yükleniyor...</div>
        </div>
    </main>

    <div class="modal-overlay" id="editModal">
        <div class="edit-box">
            <button class="close-btn" onclick="closeEditModal()">&times;</button>
            <h2 style="color: var(--primary-gold); font-weight: 300; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;">Profili Düzenle</h2>
            
            <div class="form-group">
                <label>Profil Fotoğrafı Linki (URL)</label>
                <input type="text" id="edit-avatar" placeholder="Örn: https://images.unsplash.com/photo-155535...">
            </div>
            <div class="form-group">
                <label>Hakkımda / Biyografi</label>
                <textarea id="edit-bio" rows="3" placeholder="Mağazanız veya kendiniz hakkında bilgi verin..."></textarea>
            </div>
            <div class="form-group">
                <label>Web Sitesi veya Sosyal Medya Linki</label>
                <input type="text" id="edit-website" placeholder="Örn: cagataymotors.com.tr">
            </div>
            
            <button class="btn-premium" id="btn-save-profile">Değişiklikleri Kaydet</button>
        </div>
    </div>

    <script>
        function openEditModal() { document.getElementById('editModal').classList.add('active'); document.body.style.overflow = 'hidden'; }
        function closeEditModal() { document.getElementById('editModal').classList.remove('active'); document.body.style.overflow = 'auto'; }
        document.getElementById('editModal').addEventListener('click', (e) => { if(e.target.id === 'editModal') closeEditModal(); });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0",
            authDomain: "swinder-79534.firebaseapp.com",
            projectId: "swinder-79534",
            storageBucket: "swinder-79534.firebasestorage.app",
            messagingSenderId: "704644873549",
            appId: "1:704644873549:web:d95f561ec912b94cf2cb04"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUserId = null;

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUserId = user.uid;
                document.getElementById('display-name').innerText = user.displayName || "Swinder Üyesi";
                
                // --- 1. KULLANICI PROFİL BİLGİLERİNİ ÇEK VE ALTIN TİK KONTROLÜ ---
                const userRef = doc(db, "kullanicilar", user.uid);
                const userSnap = await getDoc(userRef);

                if (userSnap.exists()) {
                    // Veritabanında kaydı varsa bilgileri ekrana bas
                    const userData = userSnap.data();
                    if(userData.avatar) document.getElementById('display-avatar').style.backgroundImage = `url('${userData.avatar}')`;
                    if(userData.bio) document.getElementById('bio-text').innerText = userData.bio;
                    if(userData.website) {
                        document.getElementById('bio-link').innerText = "🔗 " + userData.website;
                        document.getElementById('bio-link').href = userData.website.startsWith('http') ? userData.website : 'https://' + userData.website;
                    }
                    if(userData.isVerified) {
                        document.getElementById('gold-tick').style.display = 'inline-block'; // ALTIN TİKİ GÖSTER!
                    }

                    // Modal içindeki form kutularını da eski verilerle doldur
                    document.getElementById('edit-avatar').value = userData.avatar || "";
                    document.getElementById('edit-bio').value = userData.bio || "";
                    document.getElementById('edit-website').value = userData.website || "";

                } else {
                    // İLK KEZ PROFİLE GİREN KULLANICI: Otomatik olarak kurucu altın tiki verelim!
                    await setDoc(userRef, {
                        avatar: "",
                        bio: "Sanal garajın ve yayında olan tüm premium ilanların burada.",
                        website: "",
                        isVerified: true // Swinder kurucusuna Altın Tik anında tanımlanır!
                    });
                    document.getElementById('gold-tick').style.display = 'inline-block';
                }

                // --- 2. KULLANICININ İLANLARINI ÇEK ---
                const listingsGrid = document.getElementById('my-listings');
                const q = query(collection(db, "ilanlar"), where("seller", "==", user.displayName));
                
                try {
                    const querySnapshot = await getDocs(q);
                    listingsGrid.innerHTML = ''; 
                    document.getElementById('ad-count').innerText = querySnapshot.size;

                    if (querySnapshot.empty) {
                        listingsGrid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: var(--text-muted); padding: 40px; border: 1px dashed rgba(255,255,255,0.1); border-radius: 8px;">İlk ilanını ver ve garajını doldurmaya başla!</div>';
                        return;
                    }

                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const firstImg = data.images.split(',')[0].trim();
                        listingsGrid.insertAdjacentHTML('beforeend', `
                        <div class="grid-item" style="background-image: url('${firstImg}');">
                            <div class="grid-overlay"><div class="overlay-title">${data.title}</div><div class="overlay-price">${data.price}</div></div>
                        </div>`);
                    });
                } catch (error) { listingsGrid.innerHTML = `<div style="grid-column: span 3; text-align: center; color: red;">Hata oluştu.</div>`; }

            } else {
                window.location.href = "index.html";
            }
        });

        // --- 3. PROFİLİ DÜZENLE VE KAYDET ---
        document.getElementById('btn-save-profile').addEventListener('click', async () => {
            if(!currentUserId) return;
            
            const btn = document.getElementById('btn-save-profile');
            btn.innerText = "Kaydediliyor...";

            const avatar = document.getElementById('edit-avatar').value;
            const bio = document.getElementById('edit-bio').value;
            const website = document.getElementById('edit-website').value;

            try {
                // Veritabanındaki "kullanicilar" tablosunu güncelle (merge: true ile altın tik silinmez)
                await setDoc(doc(db, "kullanicilar", currentUserId), {
                    avatar: avatar,
                    bio: bio,
                    website: website
                }, { merge: true });

                closeEditModal();
                window.location.reload(); // Sayfayı yenileyip yeni bilgileri göster
            } catch (error) {
                alert("Güncelleme hatası: " + error.message);
                btn.innerText = "Değişiklikleri Kaydet";
            }
        });
    </script>
</body>
</html>
