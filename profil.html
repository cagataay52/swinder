<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Profilim - Swinder VIP</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#050505">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,300,0,0&display=block" />
    
    <script>
        if(sessionStorage.getItem("swinder_splashed")) { document.write('<style>#splash-screen { display: none !important; }</style>'); }
        const savedTheme = localStorage.getItem('swinder_theme');
        if(savedTheme && savedTheme !== 'normal') { document.write(`<style>body { background: ${savedTheme === 'gold' ? 'radial-gradient(circle at top, #1a1400 0%, #050400 100%)' : '#000000'} !important; }</style>`); }
    </script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent;}
        :root { --primary-gold: #d4af37; --glass-bg: rgba(20, 20, 25, 0.8); --glass-border: 1px solid rgba(255, 255, 255, 0.1); --body-bg: #050505; }
        body { background: var(--body-bg); color: white; padding-bottom: 80px; }
        
        #splash-screen { position: fixed; inset: 0; background: #050505; z-index: 99999; display: flex; justify-content: center; align-items: center; transition: opacity 0.5s ease; }
        
        header { position: sticky; top: 0; width: 100%; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: var(--glass-border); padding-top: calc(15px + env(safe-area-inset-top)); }
        .header-username { font-size: 20px; font-weight: bold; display: flex; align-items:center; gap:8px;}
        .header-icon { color: white; font-size: 28px; cursor: pointer; background: none; border: none; }

        .profile-header-top { display: flex; align-items: center; padding: 20px; gap: 20px; }
        .profile-avatar { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--primary-gold); background-size: cover; background-position: center; flex-shrink: 0; }
        .profile-stats { display: flex; flex: 1; justify-content: space-around; text-align: center; font-size: 13px; color: #ccc;}
        .profile-stats span { display: block; font-size: 18px; font-weight: bold; color: white; margin-bottom: 2px;}
        
        .profile-bio { padding: 0 20px 15px; font-size: 14px; line-height: 1.4; white-space: pre-wrap;}
        .profile-actions { display: flex; gap: 10px; padding: 0 20px 20px; }
        .btn-edit { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 10px 0; border-radius: 12px; font-weight: bold; cursor: pointer; text-align:center;}

        .grid-view { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; }
        .grid-item { width: 100%; aspect-ratio: 1; background-color: #1a1a1a; background-size: cover; background-position: center; cursor: pointer; position: relative;}

        .bottom-nav { display: flex; justify-content: space-around; align-items: center; position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10, 10, 12, 0.95); padding: 10px 10px calc(8px + env(safe-area-inset-bottom)); border-top: var(--glass-border); z-index: 999;}
        .nav-icon-btn { background: none; border: none; color: rgba(255,255,255,0.5); cursor: pointer; }
        .nav-icon-btn.active { color: white; }
        .nav-icon-btn .material-symbols-outlined { font-size: 30px; }

        /* ORTAK MODALLAR & X BUTONU */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 1500; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        
        .close-btn { position: absolute; top: calc(15px + env(safe-area-inset-top)); right: 15px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 5000; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: 0.2s; }
        .close-btn:active { transform: scale(0.9); }
        
        .bottom-sheet { background: var(--body-bg); width: 100%; height: 90vh; position: absolute; bottom: 0; border-radius: 20px 20px 0 0; display: flex; flex-direction: column; overflow: hidden; transform: translateY(100%); transition: 0.3s; }
        .modal-overlay.active .bottom-sheet { transform: translateY(0); }
        .sheet-header { padding: 15px 20px; border-bottom: var(--glass-border); display: flex; align-items: center; gap: 15px; font-size: 16px; font-weight: bold; background: #050505; flex-shrink: 0;}
        
        /* 🔥 CSS FIX: PROFİL AKIŞI (ÜST ÜSTE BİNME TAMAMEN ÇÖZÜLDÜ) 🔥 */
        .feed-modal { background: var(--body-bg); width: 100%; height: 100dvh; display: flex; flex-direction: column; position: absolute; bottom: 0; transform: translateY(100%); transition: transform 0.4s; }
        .modal-overlay.active .feed-modal { transform: translateY(0); }
        .feed-scroll-container { flex: 1; overflow-y: auto; scroll-snap-type: y mandatory; display: flex; flex-direction: column; background: #000; }
        .feed-post-item { width: 100%; height: calc(100dvh - 60px); scroll-snap-align: start; display: flex; flex-direction: column; border-bottom: 2px solid #111; background: var(--body-bg); flex-shrink: 0;}

        /* GERÇEK RECAP MODALI */
        .glass-box { background: linear-gradient(135deg, #111, #222); border: 1px solid var(--primary-gold); border-radius: 24px; padding: 30px; text-align: center; width: 90%; max-width: 350px;}
        .recap-row { display: flex; justify-content: space-between; padding: 15px; background: rgba(255,255,255,0.05); border-radius: 12px; margin-bottom: 10px; font-size: 15px;}
        .recap-val { font-weight: bold; color: white; font-size: 18px;}
        .search-input { flex: 1; background: rgba(255,255,255,0.1); border: var(--glass-border); color: white; padding: 12px 20px; border-radius: 30px; outline: none; font-size: 14px;}
        
        /* EKSİK OLAN REELS STİLLERİ EKLENDİ */
        .reels-box { background: #000; width: 100%; height: 100dvh; position: relative; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .reel-item { width: 100%; height: 100dvh; scroll-snap-align: start; position: relative; display: flex; justify-content: center; align-items: center;}
    </style>
</head>
<body>

    <div id="splash-screen"><div style="font-size:30px; color:var(--primary-gold); font-weight:bold;">Yükleniyor...</div></div>

    <header>
        <div class="header-username">
            <span class="material-symbols-outlined" style="cursor:pointer;" onclick="window.location.assign('index.html')">arrow_back</span>
            <span id="display-name">Yükleniyor...</span>
        </div>
        <div style="display:flex; gap:15px; align-items:center;">
            <button class="header-icon" onclick="window.logoutApp()"><span class="material-symbols-outlined" style="color:#ff4757;">logout</span></button>
        </div>
    </header>

    <main class="profile-container">
        <div class="profile-header-top">
            <div class="profile-avatar" id="display-avatar"></div>
            <div class="profile-stats">
                <div><span id="post-count">0</span>Gönderi</div>
                <div><span id="follower-count">0</span>Takipçi</div>
                <div><span id="following-count">0</span>Takip</div>
            </div>
        </div>
        <div class="profile-bio"><strong id="bio-name">-</strong><br><span id="bio-text" style="color:gray;">Biyografi yükleniyor...</span></div>
        <div class="profile-actions">
            <button class="btn-edit" onclick="openModal('profileEditModal')">Profili Düzenle</button>
            <button class="btn-edit" style="flex:0.2; color:var(--primary-gold); padding:0; display:flex; justify-content:center; align-items:center;" onclick="window.openRecap()"><span class="material-symbols-outlined">bar_chart</span></button>
        </div>
        
        <div class="grid-view" id="my-posts"></div>
    </main>

    <nav class="bottom-nav">
        <button class="nav-icon-btn" onclick="window.location.assign('index.html')"><span class="material-symbols-outlined">home</span></button>
        <button class="nav-icon-btn" onclick="window.openExplore()"><span class="material-symbols-outlined">search</span></button>
        <button class="nav-icon-btn" style="background: var(--primary-gold); color: #000; width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center;" onclick="openModal('addModal')"><span class="material-symbols-outlined" style="font-weight:600; font-size:28px;">add</span></button>
        <button class="nav-icon-btn" onclick="window.openReels()"><span class="material-symbols-outlined">movie</span></button>
        <button class="nav-icon-btn active" style="color:white;"><span class="material-symbols-outlined">person</span></button>
    </nav>

    <div class="modal-overlay" id="addModal">
        <div class="glass-box">
            <button class="close-btn" onclick="closeModal('addModal')"><span class="material-symbols-outlined">close</span></button>
            <h2 style="color: white; margin-bottom: 20px; text-align: center;">Yeni Gönderi</h2>
            <div style="margin-bottom: 15px;"><input type="file" id="add-image-file" accept="image/*, video/*" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.1); border-radius: 12px; color: white;"></div>
            <button type="button" id="btn-submit-post" style="background: var(--primary-gold); color: #000; padding: 14px; border-radius: 12px; font-weight: 700; width: 100%; border: none; cursor: pointer;">Paylaş</button>
        </div>
    </div>

    <div class="modal-overlay" id="postDetailModal" style="z-index: 1600;">
        <div class="feed-modal">
            <div class="sheet-header" style="height: 60px; display: flex; align-items: center; background: #050505; border-bottom: 1px solid rgba(255,255,255,0.1); padding: 0 15px; flex-shrink: 0; color: white; gap: 15px;">
                <button class="header-icon" onclick="closeModal('postDetailModal')" style="color:white; border:none; background:none; font-size:24px; cursor:pointer;"><span class="material-symbols-outlined">arrow_back</span></button> 
                <strong style="font-size: 18px;">Gönderiler</strong>
            </div>
            <div class="feed-scroll-container" id="feed-scroll-container"></div>
        </div>
    </div>

    <div class="modal-overlay" id="exploreModal">
        <div class="bottom-sheet">
            <div class="sheet-header" style="gap:10px;"><button class="header-icon" onclick="closeModal('exploreModal')"><span class="material-symbols-outlined">arrow_back</span></button><input type="text" style="flex: 1; background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px 20px; border-radius: 30px; outline: none;" id="search-input" placeholder="Ara..." onkeyup="window.performSearch()"></div>
            <div id="explore-users-list" style="display:none; max-height:200px; overflow-y:auto; border-bottom:1px solid rgba(255,255,255,0.1);"></div>
            <div style="flex:1; overflow-y:auto;"><div class="grid-view" id="explore-grid"></div></div>
        </div>
    </div>
    
    <div class="modal-overlay" id="reelsModal" style="padding:0; background: #000;">
        <button class="close-btn" onclick="closeModal('reelsModal')"><span class="material-symbols-outlined">close</span></button>
        <div class="reels-box" id="reels-container"></div>
    </div>

    <div class="modal-overlay" id="shareModal" style="z-index: 1750;">
        <div class="bottom-sheet" style="height: 60vh;">
            <div class="sheet-header"><button class="header-icon" onclick="closeModal('shareModal')"><span class="material-symbols-outlined">arrow_back</span></button> Kime Gönderilsin?</div>
            <div style="padding: 10px 15px; border-bottom: 1px solid rgba(255,255,255,0.1);"><input type="text" class="search-input" style="width:100%; background: rgba(255,255,255,0.1); border: none; color: white; padding: 12px 20px; border-radius: 30px; outline: none;" placeholder="Kişi ara..." onkeyup="window.filterShareList(this.value)"></div>
            <div style="flex:1; overflow-y:auto;" id="share-list-container"></div>
        </div>
    </div>

    <div class="modal-overlay" id="recapModal" style="z-index: 2000;">
        <div class="glass-box">
            <div style="font-family: 'Grand Hotel', cursive; font-size: 45px; color: var(--primary-gold); margin-bottom: 20px;">Swinder Özet</div>
            <div style="color:gray; margin-bottom:20px; font-size:13px;">Gerçek etkileşim analiziniz.</div>
            <div id="recap-loader" style="color:white; margin-bottom:15px;">Hesaplanıyor...</div>
            <div id="recap-content" style="display:none;">
                <div class="recap-row"><span>Aldığın Beğeniler</span><span class="recap-val" id="recap-likes">...</span></div>
                <div class="recap-row"><span>Toplam Eşleşme</span><span class="recap-val" id="recap-matches">...</span></div>
                <div class="recap-row"><span>Tahmini Gösterim</span><span class="recap-val" style="color:var(--primary-gold);" id="recap-views">...</span></div>
            </div>
            <button style="background:var(--primary-gold); color:black; border:none; padding:12px; width:100%; border-radius:12px; font-weight:bold; margin-top:15px; cursor:pointer;" onclick="closeModal('recapModal')">Kapat</button>
        </div>
    </div>

    <script>
        function openModal(id) { const m = document.getElementById(id); if(m){ m.classList.add('active'); document.body.style.overflow = 'hidden'; } }
        function closeModal(id) { const m = document.getElementById(id); if(m){ m.classList.remove('active'); document.body.style.overflow = 'auto'; m.querySelectorAll('video').forEach(vid => { vid.pause(); }); } }
        document.querySelectorAll('.modal-overlay').forEach(m => { m.addEventListener('click', (e) => { if(e.target === m && m.id !== 'splash-screen') closeModal(m.id); }); });
        
        window.openExplore = () => { openModal('exploreModal'); if(window.renderExploreGrid) window.renderExploreGrid(); }
        window.openReels = () => { openModal('reelsModal'); if(window.renderReels) window.renderReels(); }

        setTimeout(() => { const s = document.getElementById('splash-screen'); if(s) { s.style.opacity = '0'; setTimeout(() => s.style.display = 'none', 400); } }, 1500);
        
        window.isVideo = function(url) { if(!url) return false; return url.match(/\.(mp4|webm|ogg|mov)(\?.*)?$/i) !== null || url.includes('video'); }
        window.getVideoThumbnail = function(url) { if(!url) return ''; if(window.isVideo(url)) return url.replace(/\.(mp4|webm|ogg|mov)(\?.*)?$/i, ".jpg$2"); return url; }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, collection, getDocs, query, doc, getDoc, setDoc, updateDoc, deleteDoc, arrayUnion, arrayRemove, addDoc, where } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = { apiKey: "AIzaSyAb8OS_PIroDWGpApmPfrCkKltb_F6J__0", authDomain: "swinder-79534.firebaseapp.com", projectId: "swinder-79534", storageBucket: "swinder-79534.firebasestorage.app", messagingSenderId: "704644873549", appId: "1:704644873549:web:d95f561ec912b94cf2cb04" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app);

        const CLOUD_NAME = "dv9c3ygco"; const UPLOAD_PRESET = "ntc9cq4y";
        window.uploadMedia = async function(file) { const formData = new FormData(); formData.append("file", file); formData.append("upload_preset", UPLOAD_PRESET); const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/auto/upload`, { method: 'POST', body: formData }); const data = await res.json(); return data.secure_url; }

        window.globalPosts = []; window.globalUsersById = {}; window.globalUsersByName = {};
        let currentUserProfile = null; window.activeInteractPostId = null; window.activeShareUrl = null;

        window.logoutApp = async function() { try { await signOut(auth); window.location.href = "index.html"; } catch(e){} }

        window.loadAllData = async function() {
            try {
                const usersSnap = await getDocs(collection(db, "kullanicilar")); window.globalUsersById = {}; window.globalUsersByName = {};
                usersSnap.forEach(uDoc => { const d = uDoc.data(); d.uid = uDoc.id; window.globalUsersById[uDoc.id] = d; if(d.displayName) window.globalUsersByName[d.displayName] = d; });
                const postSnap = await getDocs(collection(db, "gonderiler")); window.globalPosts = []; 
                postSnap.forEach(doc => { window.globalPosts.push({ id: doc.id, ...doc.data() }); });
                window.globalPosts.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
            } catch(err) { console.error("Veri yükleme hatası:", err); }
        }

        // 🔥 REELS (PROFİLDE ÇALIŞMASI İÇİN EKLENDİ) 🔥
        window.renderReels = function() {
            const rc = document.getElementById('reels-container'); if(!rc) return; rc.innerHTML = ''; 
            const videos = window.globalPosts.filter(p => window.isVideo(p.imageUrl));
            if(videos.length === 0) { rc.innerHTML = '<div style="color:white; text-align:center; padding-top:50vh;">Video yok.</div>'; return; }
            
            videos.forEach(data => {
                const pInfo = window.globalUsersByName[data.username] || {}; const av = pInfo.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100'; 
                
                rc.insertAdjacentHTML('beforeend', `
                <div class="reel-item" style="width:100%; height:100dvh; scroll-snap-align:start; position:relative; display:flex; justify-content:center; align-items:center;">
                    <video src="${data.imageUrl}" preload="none" poster="${window.getVideoThumbnail(data.imageUrl)}" loop playsinline style="position:absolute; inset:0; width:100%; height:100%; object-fit:contain; z-index:1; background:black;" onclick="this.muted = !this.muted"></video>
                    <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 35%); z-index:2; pointer-events:none;"></div>
                    <div style="position:absolute; bottom:calc(90px + env(safe-area-inset-bottom)); left:0; width:100%; padding:20px; z-index:3; display:flex; justify-content:space-between; align-items:flex-end;">
                        <div>
                            <div style="display:flex; align-items:center; gap:8px; color:white; font-weight:bold; font-size:15px; margin-bottom:12px;">
                                <div style="width:40px; height:40px; border-radius:50%; border:2px solid var(--primary-gold); background-size:cover; background-position:center; background-image:url('${av.replace(/'/g, "\\'")}');"></div>
                                @${data.username}
                            </div>
                            <div style="color:white; font-size:14px; text-shadow:0 1px 2px black;">${data.caption || ''}</div>
                        </div>
                        <div style="display:flex; flex-direction:column; gap:20px; align-items:center;">
                            <button style="background:none; border:none; color:white; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px;" onclick="window.toggleLikeDB(this, '${data.id}')"><span class="material-symbols-outlined">favorite</span><span id="like-count-${data.id}">${data.likesCount||0}</span></button>
                            <button style="background:none; border:none; color:white; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:5px;" onclick="window.openShareModal('${data.imageUrl}')"><span class="material-symbols-outlined">send</span></button>
                        </div>
                    </div>
                </div>`);
            });

            if(window.reelsObserver) window.reelsObserver.disconnect();
            window.reelsObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { const vid = entry.target.querySelector('video'); if(vid) { if(entry.isIntersecting) { vid.play().catch(e=>{}); } else { vid.pause(); } } }); }, { threshold: 0.5 });
            document.querySelectorAll('.reel-item').forEach(item => window.reelsObserver.observe(item));
        }

        // 🔥 KEŞFET (PROFİLDE ÇALIŞMASI İÇİN EKLENDİ) 🔥
        window.renderExploreGrid = async function() {
            const grid = document.getElementById('explore-grid'); if(!grid) return;
            const myUid = auth.currentUser ? auth.currentUser.uid : null; const currentName = auth.currentUser ? auth.currentUser.displayName : '';
            const filterText = document.getElementById('search-input').value.toLocaleLowerCase('tr-TR'); grid.innerHTML = ''; const userList = document.getElementById('explore-users-list'); if(userList) userList.innerHTML = '';
            
            let matchedUsers = Object.values(window.globalUsersById).filter(u => u.displayName && u.displayName.toLocaleLowerCase('tr-TR').includes(filterText) && u.uid !== myUid);
            if(filterText && matchedUsers.length > 0 && userList) { 
                userList.style.display = 'block'; 
                matchedUsers.forEach(u => { const av = u.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100'; userList.insertAdjacentHTML('beforeend', `<div class="list-item" style="padding: 10px 20px; display:flex; align-items:center; gap:15px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,0.1);" onclick="alert('Lütfen kişiyi anasayfadaki keşfetten aratın.')"><div style="width: 40px; height: 40px; border-radius:50%; background-image: url('${av}'); background-size:cover; background-position:center;"></div><div><strong style="color:white; font-size:15px;">${u.displayName}</strong></div></div>`); }); 
            } else if(userList) { userList.style.display = 'none'; }
            
            let filteredPosts = window.globalPosts.filter(p => p.username !== currentName);
            if(filterText) filteredPosts = filteredPosts.filter(p => (p.caption||'').toLocaleLowerCase('tr-TR').includes(filterText) || (p.username||'').toLocaleLowerCase('tr-TR').includes(filterText));
            if(filteredPosts.length === 0 && (!filterText || (userList && userList.innerHTML === ''))) { grid.innerHTML = '<div style="grid-column: span 3; text-align: center; color: gray; padding: 40px; font-size: 13px;">Sonuç bulunamadı.</div>'; return;}
            
            filteredPosts.forEach(p => { 
                const bgUrl = window.isVideo(p.imageUrl) ? window.getVideoThumbnail(p.imageUrl) : p.imageUrl; const iconHtml = window.isVideo(p.imageUrl) ? '<span class="material-symbols-outlined" style="position:absolute; top:8px; right:8px; color:white; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); font-size: 22px;">play_circle</span>' : ''; 
                grid.insertAdjacentHTML('beforeend', `<div class="grid-item" style="width:100%; aspect-ratio:1; position:relative; background-color:#1a1a1a; background-size:cover; background-position:center; cursor:pointer; background-image: url('${bgUrl.replace(/'/g, "\\'")}');" onclick="window.openPostDetail('${p.id}', '${p.username.replace(/'/g, "\\'")}')">${iconHtml}</div>`); 
            });
        }
        window.performSearch = () => window.renderExploreGrid();

        window.renderProfileGrid = function() {
            const grid = document.getElementById('my-posts'); if(!grid) return; grid.innerHTML = ''; 
            if(!auth.currentUser || !window.globalPosts) return;
            const myPosts = window.globalPosts.filter(p => p.username === auth.currentUser.displayName); 
            const pc = document.getElementById('post-count'); if(pc) pc.innerText = myPosts.length;
            myPosts.forEach(p => { 
                const bgUrl = window.isVideo(p.imageUrl) ? window.getVideoThumbnail(p.imageUrl) : p.imageUrl; const iconHtml = window.isVideo(p.imageUrl) ? '<span class="material-symbols-outlined" style="position:absolute; top:5px; right:5px; color:white; font-size:22px; filter:drop-shadow(0 2px 4px rgba(0,0,0,0.8));">play_circle</span>' : ''; 
                grid.insertAdjacentHTML('beforeend', `<div class="grid-item" style="background-image: url('${bgUrl.replace(/'/g, "\\'")}');" onclick="window.openPostDetail('${p.id}', '${p.username.replace(/'/g, "\\'")}')">${iconHtml}</div>`); 
            });
        }

        // 🔥 GÖNDERİ DETAY EKRANI (SİL BUTONU GÜVENLİ HALE GETİRİLDİ) 🔥
        window.openPostDetail = function(startPostId, targetUsername) {
            window.activeInteractPostId = startPostId; 
            
            const container = document.getElementById('feed-scroll-container'); if(!container) return;
            container.innerHTML = ''; 

            const userPosts = window.globalPosts.filter(p => p.username === targetUsername);
            
            userPosts.forEach(data => {
                let pInfo = window.globalUsersByName[data.username] || {}; 
                const avatarUrl = pInfo.avatar || 'https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100';
                
                // Gönderi bana aitse SİL butonu göster
                const isMine = auth.currentUser && auth.currentUser.displayName === data.username;
                const deleteBtnHtml = isMine ? `<button onclick="window.deletePostDB('${data.id}')" style="background:rgba(255,0,0,0.1); border:1px solid rgba(255,0,0,0.3); border-radius:10px; padding:5px 10px; color:#ff4757; font-weight:bold; cursor:pointer; font-size:12px; display:flex; align-items:center; gap:2px;"><span class="material-symbols-outlined" style="font-size:16px;">delete</span> Sil</button>` : '';

                const mediaHtml = window.isVideo(data.imageUrl) 
                    ? `<video src="${data.imageUrl}" preload="none" poster="${window.getVideoThumbnail(data.imageUrl)}" loop playsinline style="width:100%; height:100%; object-fit:contain; background:black;" onclick="this.muted = !this.muted"></video>` 
                    : `<img src="${data.imageUrl}" loading="lazy" style="width:100%; height:100%; object-fit:contain; background:black;"/>`;

                const postHtml = `
                <div id="feed-post-${data.id}" class="feed-post-item">
                    <div style="display:flex; align-items:center; justify-content:space-between; padding:12px 15px; flex-shrink:0;">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <div style="width:34px; height:34px; border-radius:50%; background-image:url('${avatarUrl}'); background-size:cover; border:1px solid var(--primary-gold);"></div>
                            <strong style="font-size:14px; color:white;">${data.username}</strong>
                        </div>
                        ${deleteBtnHtml}
                    </div>
                    <div style="flex:1; position:relative; width:100%; background:black; display:flex; justify-content:center; align-items:center; overflow:hidden;">
                        ${mediaHtml}
                    </div>
                    <div style="padding: 15px 20px; flex-shrink:0;">
                        <div style="display:flex; gap:15px; margin-bottom:10px;">
                            <button class="header-icon btn-like" style="color:white; border:none; background:none; cursor:pointer;" onclick="window.toggleLikeDB(this, '${data.id}')"><span class="material-symbols-outlined">favorite</span></button>
                            <button class="header-icon" style="color:white; border:none; background:none; cursor:pointer;" onclick="window.openShareModal('${data.imageUrl}')"><span class="material-symbols-outlined">send</span></button>
                        </div>
                        <div style="font-weight:600; margin-bottom:5px; font-size:14px; color:white;"><span id="likes-${data.id}">${data.likesCount || 0}</span> beğenme</div>
                        <div style="font-size: 14px; color:white;"><strong>${data.username}</strong> <span style="color:rgba(255,255,255,0.8);">${data.caption || ''}</span></div>
                    </div>
                </div>`;
                container.insertAdjacentHTML('beforeend', postHtml);
            });

            openModal('postDetailModal');

            setTimeout(() => {
                const targetEl = document.getElementById('feed-post-' + startPostId);
                if(targetEl) targetEl.scrollIntoView({behavior: 'instant'});
            }, 50);

            if(window.feedObserver) window.feedObserver.disconnect();
            window.feedObserver = new IntersectionObserver((entries) => { entries.forEach(entry => { const vid = entry.target.querySelector('video'); if(vid) { if(entry.isIntersecting) { vid.play().catch(e=>{}); } else { vid.pause(); } } }); }, { threshold: 0.5 });
            document.querySelectorAll('.feed-post-item').forEach(item => window.feedObserver.observe(item));
        }

        // 🔥 GÖNDERİ SİLME MOTORU 🔥
        window.deletePostDB = async function(postId) {
            if(confirm("Bu gönderiyi kalıcı olarak silmek istediğine emin misin?")) {
                try {
                    await deleteDoc(doc(db, "gonderiler", postId));
                    alert("Gönderi başarıyla silindi!");
                    window.location.reload();
                } catch(e) { alert("Silinirken bir hata oluştu."); }
            }
        }

        // 🔥 YENİ NESİL DM PAYLAŞIM MOTORU (DÜZELTİLDİ VE AKTİF) 🔥
        window.openShareModal = async function(url) {
            window.activeShareUrl = url;
            openModal('shareModal');
            const c = document.getElementById('share-list-container'); if(!c) return;
            c.innerHTML = '<div style="text-align:center; padding:30px; color:gray;">Kişiler yükleniyor...</div>';
            
            if(!auth.currentUser) return;
            window.myShareMatches = []; 
            const snap = await getDocs(query(collection(db, "eslesmeler"), where("users", "array-contains", auth.currentUser.uid)));
            c.innerHTML = '';
            if(snap.empty) { c.innerHTML = '<div style="text-align:center; padding:30px; color:gray;">Henüz eşleşmen yok.</div>'; return; }
            
            snap.forEach(d => {
                const match = {id: d.id, ...d.data()};
                const theirIndex = match.users.indexOf(auth.currentUser.uid) === 0 ? 1 : 0;
                const theirUid = match.users[theirIndex];
                const theirName = match.userNames[theirIndex];
                const theirImg = window.globalUsersById[theirUid]?.avatar || "https://images.unsplash.com/photo-1555353540-64fd1b19584d?w=100";
                window.myShareMatches.push({ id: match.id, name: theirName, img: theirImg });
            });
            window.renderShareList();
        }

        window.renderShareList = function(filterText = "") {
            const c = document.getElementById('share-list-container'); if(!c) return; c.innerHTML = '';
            let filtered = window.myShareMatches || [];
            if(filterText) filtered = filtered.filter(m => m.name.toLowerCase().includes(filterText.toLowerCase()));
            filtered.forEach(m => {
                c.insertAdjacentHTML('beforeend', `
                    <div class="list-item" style="justify-content:space-between; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.1);">
                        <div style="display:flex; align-items:center; gap:15px;">
                            <div style="width:45px; height:45px; border-radius:50%; background-image:url('${m.img.replace(/'/g, "\\'")}'); background-size:cover;"></div>
                            <strong style="color:white; font-size:15px;">${m.name}</strong>
                        </div>
                        <button style="background:var(--primary-gold); color:black; border:none; padding:8px 16px; border-radius:20px; font-weight:bold; cursor:pointer;" onclick="window.sendShareDM('${m.id}', this)">Gönder</button>
                    </div>
                `);
            });
        }
        window.filterShareList = (text) => window.renderShareList(text);

        window.sendShareDM = async function(chatId, btnElement) {
            btnElement.innerText = "İletildi ✓";
            btnElement.style.background = "rgba(255,255,255,0.2)";
            btnElement.style.color = "white";
            btnElement.disabled = true;
            try {
                await addDoc(collection(db, `eslesmeler/${chatId}/mesajlar`), { senderId: auth.currentUser.uid, text: "[PAYLAŞIM] " + window.activeShareUrl, timestamp: new Date(), read: false });
                await updateDoc(doc(db, "eslesmeler", chatId), { lastMessage: "🖼️ Bir gönderi paylaştı.", updatedAt: new Date() });
            } catch(e) {}
        }

        window.toggleLikeDB = async function(btnElement, postId) {
            const user = auth.currentUser; if(!user) return; 
            const postRef = doc(db, "gonderiler", postId); const likeSpan = document.getElementById('likes-' + postId) || document.getElementById('like-count-' + postId); const postData = window.globalPosts.find(p=>p.id===postId); let currentLikes = postData ? (postData.likesCount||0) : 0;
            const isLiked = postData && postData.likedBy && postData.likedBy.includes(user.displayName);
            if(isLiked) { 
                if(btnElement) { btnElement.style.color = 'white'; const sp = btnElement.querySelector('span'); if(sp) sp.style.fontVariationSettings = "'FILL' 0"; }
                if(likeSpan) likeSpan.innerText = currentLikes - 1; 
                await updateDoc(postRef, { likedBy: arrayRemove(user.displayName), likesCount: currentLikes - 1 }); if(postData) { postData.likesCount -= 1; postData.likedBy = postData.likedBy.filter(n => n !== user.displayName); } 
            } else { 
                if(btnElement) { btnElement.style.color = '#ff3040'; const sp = btnElement.querySelector('span'); if(sp) sp.style.fontVariationSettings = "'FILL' 1"; }
                if(likeSpan) likeSpan.innerText = currentLikes + 1; 
                await updateDoc(postRef, { likedBy: arrayUnion(user.displayName), likesCount: currentLikes + 1 }); if(postData) { postData.likesCount += 1; if(!postData.likedBy) postData.likedBy=[]; postData.likedBy.push(user.displayName); } 
            }
        }

        // 🔥 GERÇEK VERİLERLE ÇALIŞAN RECAP (ÖZET) MOTORU (DÜZELTİLDİ) 🔥
        window.openRecap = async function() {
            try {
                if(!auth.currentUser) return;
                const rLikes = document.getElementById('recap-likes');
                const rMatches = document.getElementById('recap-matches');
                const rViews = document.getElementById('recap-views');
                
                document.getElementById('recap-loader').style.display = 'block';
                document.getElementById('recap-content').style.display = 'none';
                openModal('recapModal');

                const matchesSnap = await getDocs(query(collection(db, "eslesmeler"), where("users", "array-contains", auth.currentUser.uid)));
                const matchCount = matchesSnap.size;
                
                let totalLikes = 0;
                const myPosts = window.globalPosts.filter(p => p.username === auth.currentUser.displayName);
                myPosts.forEach(p => totalLikes += (p.likesCount || 0));
                
                const followers = (currentUserProfile && currentUserProfile.followers) ? currentUserProfile.followers.length : 0;
                const estimatedViews = (followers * 3) + (totalLikes * 4) + (matchCount * 5) + 24;

                document.getElementById('recap-loader').style.display = 'none';
                document.getElementById('recap-content').style.display = 'block';

                rLikes.innerText = totalLikes;
                rMatches.innerText = matchCount;
                rViews.innerText = estimatedViews;
            } catch (error) {
                console.error("Recap Hatası:", error);
            }
        }

        document.getElementById('btn-submit-post')?.addEventListener('click', async () => { const user = auth.currentUser; if (!user) return; const fileInput = document.getElementById('add-image-file'); const file = fileInput.files[0]; if (!file) return alert("Lütfen galeriden bir fotoğraf veya video seçin!"); document.getElementById('btn-submit-post').innerText = "Yükleniyor (Bekleyin)..."; try { const imageUrl = await window.uploadMedia(file); await addDoc(collection(db, "gonderiler"), { imageUrl, caption: "", username: user.displayName, likesCount: 0, createdAt: new Date() }); closeModal('addModal'); fileInput.value = ""; await window.loadAllData(); if(window.renderProfileGrid) window.renderProfileGrid(); } catch (err) { alert("Hata: " + err.message); } finally { document.getElementById('btn-submit-post').innerText = "Paylaş"; } });

        // 🔥 EN SON AŞAMA: AUTH SİSTEMİNİ BAŞLAT 🔥
        onAuthStateChanged(auth, async (user) => {
            try {
                if (user) {
                    const safeName = user.displayName || "Kullanıcı";
                    const snap = await getDoc(doc(db, "kullanicilar", user.uid));
                    if(snap.exists()) {
                        currentUserProfile = { uid: user.uid, following: [], followers: [], birthdate: "", profileTheme: "normal", ...snap.data() };
                        
                        document.getElementById('display-name').innerHTML = safeName; 
                        document.getElementById('bio-name').innerHTML = safeName; 
                        document.getElementById('display-avatar').style.backgroundImage = `url('${currentUserProfile.avatar}')`;
                        document.getElementById('bio-text').innerText = currentUserProfile.bio || 'Swinder VIP Üyesi';
                        document.getElementById('follower-count').innerText = (currentUserProfile.followers || []).length;
                        document.getElementById('following-count').innerText = (currentUserProfile.following || []).length;
                    }
                    
                    await window.loadAllData(); 
                    if(window.renderProfileGrid) window.renderProfileGrid(); 
                } else { window.location.href = "index.html"; }
            } catch (error) { console.error("Profil Auth Hatası:", error); } finally { hideSplash(); }
        });
    </script>
</body>
</html>
